<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #gameArea {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            grid-template-rows: repeat(10, 50px);
            gap: 2px;
        }

        .tile {
            width: 50px;
            height: 50px;
            background-color: #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #999;
            cursor: pointer;
        }

        .tile.claimed {
            background-color: #76c7c0;
        }
    </style>
</head>
<body>
    <div id="gameArea"></div>
    <script>
        const gameArea = document.getElementById('gameArea');
        const gridSize = 10; // 10x10 grid

        // Create the grid
        for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.addEventListener('click', () => claimTile(tile));
                gameArea.appendChild(tile);
            }
        }

        // Function to claim a tile
        function claimTile(tile) {
            if (!tile.classList.contains('claimed')) {
                tile.classList.add('claimed');
                tile.innerText = '✔'; // Mark the claimed tile with a checkmark
            }
        }
    </script>
</body>
</html>
