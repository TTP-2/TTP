<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Game with Characters</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <script>
    // Create the scene
    const scene = new THREE.Scene();

    // Set up the camera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    // Renderer
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Add a simple platform
    const platformGeometry = new THREE.BoxGeometry(10, 0.5, 10);
    const platformMaterial = new THREE.MeshStandardMaterial({ color: 0x808080 });
    const platform = new THREE.Mesh(platformGeometry, platformMaterial);
    platform.position.y = -0.25;
    scene.add(platform);

    // Create the player cube
    const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
    const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xff6347 });
    const player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.position.set(0, 0.5, 0);
    scene.add(player);

    // Add light to the scene
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);

    // Movement variables
    const moveSpeed = 0.1;
    let moveLeft = false;
    let moveRight = false;
    let moveForward = false;
    let moveBackward = false;

    // Handle keyboard events
    document.addEventListener("keydown", (event) => {
      switch (event.key) {
        case "ArrowLeft":
          moveLeft = true;
          break;
        case "ArrowRight":
          moveRight = true;
          break;
        case "ArrowUp":
          moveForward = true;
          break;
        case "ArrowDown":
          moveBackward = true;
          break;
      }
    });

    document.addEventListener("keyup", (event) => {
      switch (event.key) {
        case "ArrowLeft":
          moveLeft = false;
          break;
        case "ArrowRight":
          moveRight = false;
          break;
        case "ArrowUp":
          moveForward = false;
          break;
        case "ArrowDown":
          moveBackward = false;
          break;
      }
    });

    // Game loop
    function animate() {
      requestAnimationFrame(animate);

      // Update player position
      if (moveLeft) player.position.x -= moveSpeed;
      if (moveRight) player.position.x += moveSpeed;
      if (moveForward) player.position.z -= moveSpeed;
      if (moveBackward) player.position.z += moveSpeed;

      // Update camera position to follow the player
      camera.position.x = player.position.x;
      camera.position.z = player.position.z + 10;
      camera.lookAt(player.position);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
