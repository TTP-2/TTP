<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Platformer with Houses and Mountains</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let player, playerSpeed = 0.1;
    let keys = { w: false, a: false, s: false, d: false };
    let rotationSpeed = 0.05; // Speed of rotation with the arrow keys
    let rotationY = 0; // To track the rotation for the camera view
    let houses = [];
    let mountains = [];

    // Set up scene, camera, and renderer
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Set up the player (simple cube)
    player = new THREE.Mesh(
      new THREE.BoxGeometry(1, 2, 1),
      new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );
    scene.add(player);
    player.position.y = 1;

    // Create the mountains using cone geometry (simple representation)
    function createMountain(x, y, z) {
      let mountain = new THREE.Mesh(
        new THREE.ConeGeometry(5, 20, 4),  // Cone shape for mountains
        new THREE.MeshBasicMaterial({ color: 0x8B4513 })
      );
      mountain.rotation.y = Math.random() * Math.PI;
      mountain.position.set(x, y, z);
      scene.add(mountain);
      return mountain;
    }

    // Generate a few mountains in the background
    for (let i = 0; i < 5; i++) {
      let x = Math.random() * 200 - 100;  // Random x position
      let z = Math.random() * 200 - 100;  // Random z position
      let y = 0; // Base ground level
      mountains.push(createMountain(x, y, z));
    }

    // Create a simple house (cube for now)
    function createHouse(x, z) {
      let house = new THREE.Mesh(
        new THREE.BoxGeometry(6, 6, 6),  // House size
        new THREE.MeshBasicMaterial({ color: 0x8B0000 }) // Red house color
      );
      house.position.set(x, 3, z);
      scene.add(house);

      // Create a door on the front of the house
      let door = new THREE.Mesh(
        new THREE.BoxGeometry(2, 4, 0.1),
        new THREE.MeshBasicMaterial({ color: 0x654321 }) // Brown door color
      );
      door.position.set(x, 1, z + 3);  // Position the door in front of the house
      scene.add(door);
      
      // Return the house with door for interaction
      return house;
    }

    // Create a few houses on the terrain
    houses.push(createHouse(20, 30));
    houses.push(createHouse(-30, -40));
    houses.push(createHouse(50, -70));

    // Set up the ground (a simple plane)
    let ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1000, 1000),
      new THREE.MeshBasicMaterial({ color: 0x228B22, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    scene.add(ground);

    // Set the camera position
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 1, 0);

    // Event listeners for keypresses
    document.addEventListener("keydown", (e) => {
      if (e.key === "w") keys.w = true;
      if (e.key === "a") keys.a = true;
      if (e.key === "s") keys.s = true;
      if (e.key === "d") keys.d = true;
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "w") keys.w = false;
      if (e.key === "a") keys.a = false;
      if (e.key === "s") keys.s = false;
      if (e.key === "d") keys.d = false;
    });

    // Arrow keys for rotation of the view
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") rotationY += rotationSpeed;  // Rotate left
      if (e.key === "ArrowRight") rotationY -= rotationSpeed; // Rotate right
    });

    // Movement Logic for the player
    function movePlayer() {
      let movementDirection = new THREE.Vector3(0, 0, 0);

      if (keys.w) movementDirection.z -= playerSpeed;
      if (keys.s) movementDirection.z += playerSpeed;
      if (keys.a) movementDirection.x -= playerSpeed;
      if (keys.d) movementDirection.x += playerSpeed;

      // Move player based on the current rotation of the camera
      player.translateOnAxis(new THREE.Vector3(0, 0, 1), movementDirection.z);
      player.translateOnAxis(new THREE.Vector3(1, 0, 0), movementDirection.x);

      // Check if player is on top of a mountain and adjust height (simple collision detection)
      mountains.forEach(mountain => {
        let dist = player.position.distanceTo(mountain.position);
        if (dist < 10) {
          player.position.y = Math.max(1, mountain.position.y + 5); // Make the player move up
        }
      });

      // Check if the player is near a house (simple interaction detection)
      houses.forEach(house => {
        let dist = player.position.distanceTo(house.position);
        if (dist < 5) {
          alert("You are near a house! Press 'Enter' to interact.");
        }
      });

      // Update the camera position to follow the player
      camera.position.set(player.position.x, player.position.y + 5, player.position.z + 10);
    }

    // Update camera orientation to rotate the view (360 degrees)
    function updateCameraOrientation() {
      camera.rotation.y = rotationY; // Apply the Y-axis rotation based on arrow key presses
    }

    // Rendering and updating the scene
    function animate() {
      requestAnimationFrame(animate);

      // Update player position
      movePlayer();

      // Update the camera orientation based on the arrow key inputs
      updateCameraOrientation();

      // Render the scene from the camera's perspective
      renderer.render(scene, camera);
    }

    animate();

    // Adjust canvas size when window is resized
    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
