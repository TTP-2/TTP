<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platformer Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; background: #87CEEB; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player = {
      x: 100,
      y: canvas.height - 150,
      width: 50,
      height: 70,
      speed: 5,
      dx: 0,
      dy: 0
    };

    let keys = { w: false, a: false, s: false, d: false };

    let houses = [
      { x: 500, y: canvas.height - 150, width: 100, height: 150, doorX: 530, doorY: canvas.height - 120, doorWidth: 40, doorHeight: 60, inside: false },
      { x: 900, y: canvas.height - 150, width: 100, height: 150, doorX: 930, doorY: canvas.height - 120, doorWidth: 40, doorHeight: 60, inside: false }
    ];

    function drawPlayer() {
      ctx.fillStyle = "red";
      ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function movePlayer() {
      if (keys.w) player.dy = -player.speed;
      if (keys.s) player.dy = player.speed;
      if (keys.a) player.dx = -player.speed;
      if (keys.d) player.dx = player.speed;

      player.x += player.dx;
      player.y += player.dy;

      // Prevent player from moving out of bounds
      if (player.y > canvas.height - player.height) player.y = canvas.height - player.height;
      if (player.x < 0) player.x = 0;
      if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

      player.dx = 0;
      player.dy = 0;
    }

    function drawHouses() {
      houses.forEach(house => {
        ctx.fillStyle = "brown";
        ctx.fillRect(house.x, house.y, house.width, house.height);

        // Draw door
        ctx.fillStyle = "yellow";
        ctx.fillRect(house.doorX, house.doorY, house.doorWidth, house.doorHeight);
      });
    }

    function checkDoorCollision() {
      houses.forEach(house => {
        if (player.x + player.width > house.doorX && player.x < house.doorX + house.doorWidth &&
            player.y + player.height > house.doorY && player.y < house.doorY + house.doorHeight) {
          house.inside = true;
          openHouse(house);
        }
      });
    }

    function openHouse(house) {
      if (house.inside) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "lightgreen";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100); // Road
        ctx.fillStyle = "gray";
        ctx.fillRect(50, canvas.height - 80, 200, 30); // Road lines
        ctx.fillStyle = "green";
        ctx.beginPath();
        ctx.moveTo(300, canvas.height - 200);
        ctx.lineTo(500, canvas.height - 400);
        ctx.lineTo(700, canvas.height - 200);
        ctx.fill(); // Mountains
        ctx.fillStyle = "brown";
        ctx.fillRect(50, canvas.height - 200, 50, 50); // Bed
      }
    }

    function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPlayer();
      drawHouses();
      checkDoorCollision();
      movePlayer();
      requestAnimationFrame(update);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "w") keys.w = true;
      if (e.key === "a") keys.a = true;
      if (e.key === "s") keys.s = true;
      if (e.key === "d") keys.d = true;
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "w") keys.w = false;
      if (e.key === "a") keys.a = false;
      if (e.key === "s") keys.s = false;
      if (e.key === "d") keys.d = false;
    });

    update();
  </script>
</body>
</html>
