<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Movement Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Player object (cube)
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
    const player = new THREE.Mesh(geometry, material);
    scene.add(player);

    // Camera position
    camera.position.z = 5;

    // Movement and rotation control variables
    const speed = 0.1;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let rotateLeft = false, rotateRight = false;

    // Event listeners for key controls
    document.addEventListener('keydown', (event) => {
      if (event.key === 'w') moveForward = true;
      if (event.key === 's') moveBackward = true;
      if (event.key === 'a') moveLeft = true;
      if (event.key === 'd') moveRight = true;
      if (event.key === 'ArrowLeft') rotateLeft = true;
      if (event.key === 'ArrowRight') rotateRight = true;
    });

    document.addEventListener('keyup', (event) => {
      if (event.key === 'w') moveForward = false;
      if (event.key === 's') moveBackward = false;
      if (event.key === 'a') moveLeft = false;
      if (event.key === 'd') moveRight = false;
      if (event.key === 'ArrowLeft') rotateLeft = false;
      if (event.key === 'ArrowRight') rotateRight = false;
    });

    // Update loop to handle movement and rotation
    function update() {
      // Move player with WASD
      if (moveForward) player.position.z -= speed;
      if (moveBackward) player.position.z += speed;
      if (moveLeft) player.position.x -= speed;
      if (moveRight) player.position.x += speed;

      // Rotate camera with left and right arrows
      if (rotateLeft) camera.rotation.y += 0.05;
      if (rotateRight) camera.rotation.y -= 0.05;

      // Smooth camera follow effect (optional for better view)
      camera.position.x = player.position.x;
      camera.position.z = player.position.z + 5;
      camera.lookAt(player.position);
    }

    // Main animation loop
    function animate() {
      requestAnimationFrame(animate);
      update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
