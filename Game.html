<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortnite-like Game Prototype</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <script>
    // Scene setup
    const scene = new THREE.Scene();

    // Camera setup
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 30);

    // Renderer setup
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting setup
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // Create terrain with Perlin noise
    const terrainSize = 50;
    const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, 64, 64);
    const terrainMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22, wireframe: false });

    // Displace vertices to form hills and valleys
    const perlin = (x, y) => Math.sin(x * 0.2) * Math.cos(y * 0.3) * 3; // Simple terrain generator
    const vertices = terrainGeometry.attributes.position.array;
    for (let i = 0; i < vertices.length; i += 3) {
      const x = vertices[i];
      const y = vertices[i + 1];
      vertices[i + 2] = perlin(x, y);
    }
    terrainGeometry.computeVertexNormals();

    const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
    terrain.rotation.x = -Math.PI / 2;
    scene.add(terrain);

    // Player setup
    const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
    const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x0000ff });
    const player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.position.set(0, 1, 0);
    scene.add(player);

    // Gun setup
    const gunGeometry = new THREE.BoxGeometry(0.5, 0.2, 1);
    const gunMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const gun = new THREE.Mesh(gunGeometry, gunMaterial);
    gun.position.set(0.5, 1, 0.5);
    player.add(gun);

    // Controls
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let firstPersonView = false;

    document.addEventListener("keydown", (event) => {
      switch (event.key) {
        case "w":
          moveForward = true;
          break;
        case "s":
          moveBackward = true;
          break;
        case "a":
          moveLeft = true;
          break;
        case "d":
          moveRight = true;
          break;
        case "v":
          firstPersonView = !firstPersonView; // Toggle view
          break;
      }
    });

    document.addEventListener("keyup", (event) => {
      switch (event.key) {
        case "w":
          moveForward = false;
          break;
        case "s":
          moveBackward = false;
          break;
        case "a":
          moveLeft = false;
          break;
        case "d":
          moveRight = false;
          break;
      }
    });

    const playerSpeed = 0.2;

    // Simple shooting mechanic
    const bullets = [];
    document.addEventListener("click", () => {
      const bulletGeometry = new THREE.SphereGeometry(0.2, 16, 16);
      const bulletMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
      const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);
      bullet.position.set(player.position.x + gun.position.x, player.position.y + gun.position.y, player.position.z);
      scene.add(bullet);

      // Set bullet velocity
      bullet.userData.velocity = new THREE.Vector3(0, 0, -0.5);
      bullets.push(bullet);
    });

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.position.add(bullet.userData.velocity);

        // Remove bullets that are too far
        if (bullet.position.length() > 100) {
          scene.remove(bullet);
          bullets.splice(i, 1);
        }
      }
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Player movement
      if (moveForward) player.position.z -= playerSpeed;
      if (moveBackward) player.position.z += playerSpeed;
      if (moveLeft) player.position.x -= playerSpeed;
      if (moveRight) player.position.x += playerSpeed;

      // Camera view switching
      if (firstPersonView) {
        camera.position.set(player.position.x, player.position.y + 1.5, player.position.z);
        camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z - 1);
      } else {
        camera.position.set(player.position.x, player.position.y + 5, player.position.z + 10);
        camera.lookAt(player.position);
      }

      updateBullets();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
