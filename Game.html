<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxel World (Minecraft-like Game)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <script>
    // Scene setup
    const scene = new THREE.Scene();

    // Camera setup
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 20);

    // Renderer setup
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Block size
    const BLOCK_SIZE = 1;

    // Function to create a block
    function createBlock(x, y, z, color = 0x8B4513) {
      const geometry = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
      const material = new THREE.MeshStandardMaterial({ color: color });
      const block = new THREE.Mesh(geometry, material);
      block.position.set(x, y, z);
      scene.add(block);
      return block;
    }

    // Generate a simple flat terrain
    for (let x = -5; x <= 5; x++) {
      for (let z = -5; z <= 5; z++) {
        createBlock(x, 0, z, 0x228B22); // Grass-colored blocks
      }
    }

    // Add ambient light and directional light
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // Player controls
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;

    document.addEventListener("keydown", (event) => {
      switch (event.key) {
        case "w":
          moveForward = true;
          break;
        case "s":
          moveBackward = true;
          break;
        case "a":
          moveLeft = true;
          break;
        case "d":
          moveRight = true;
          break;
      }
    });

    document.addEventListener("keyup", (event) => {
      switch (event.key) {
        case "w":
          moveForward = false;
          break;
        case "s":
          moveBackward = false;
          break;
        case "a":
          moveLeft = false;
          break;
        case "d":
          moveRight = false;
          break;
      }
    });

    // Player object (just the camera for now)
    const playerSpeed = 0.1;

    function animate() {
      requestAnimationFrame(animate);

      // Player movement
      if (moveForward) camera.position.z -= playerSpeed;
      if (moveBackward) camera.position.z += playerSpeed;
      if (moveLeft) camera.position.x -= playerSpeed;
      if (moveRight) camera.position.x += playerSpeed;

      camera.lookAt(new THREE.Vector3(camera.position.x, 0, camera.position.z - 1));
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
