<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Wars</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            display: block;
        }
        #score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }
        #blast {
            position: absolute;
            top: 40px;
            right: 10px;
            color: white;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="blast">Blast: 3</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const blastDisplay = document.getElementById('blast');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 50,
            speed: 5,
            angle: 0,
            color: 'white'
        };

        const bullets = [];
        const enemies = [];
        const bulletSpeed = 7;
        const bulletSize = 10;
        let score = 0;
        let blastCount = 3;
        let keys = {};

        // Sound Effects
        const shootSound = new Audio('sounds/shoot.wav'); // Path to the shoot sound

        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function movePlayer() {
            if (keys['ArrowUp']) {
                player.x += Math.cos(player.angle) * player.speed;
                player.y += Math.sin(player.angle) * player.speed;
            }
            if (keys['ArrowLeft']) player.angle -= 0.1;
            if (keys['ArrowRight']) player.angle += 0.1;
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = player.color;
            ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);
            ctx.restore();
        }

        function drawBullets() {
            ctx.fillStyle = 'cyan';
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                ctx.fillRect(bullet.x - bulletSize / 2, bullet.y - bulletSize / 2, bulletSize, bulletSize);

                // Check for collision with enemies
                enemies.forEach((enemy, enemyIndex) => {
                    if (bullet.x < enemy.x + enemy.size && bullet.x + bullet.size > enemy.x &&
                        bullet.y < enemy.y + enemy.size && bullet.y + bullet.size > enemy.y) {
                        // Bullet hits enemy, remove the enemy
                        enemies.splice(enemyIndex, 1);
                        score++;
                        scoreDisplay.textContent = `Score: ${score}`;
                        blastCount++; // Increase blast count
                        blastDisplay.textContent = `Blast: ${blastCount}`;

                        // Create yellow packets when enemy is hit
                        const yellowPackets = [];
                        for (let i = 0; i < 4; i++) {
                            yellowPackets.push({ 
                                x: enemy.x + Math.random() * 30 - 15, 
                                y: enemy.y + Math.random() * 30 - 15, 
                                size: 5, 
                                color: 'yellow' 
                            });
                        }
                        collectYellowPackets(yellowPackets);

                        // Play the shoot sound
                        shootSound.play();
                    }
                });
            });
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                // Draw the enemy spaceship instead of a red square
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.moveTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.size / 2, enemy.y + enemy.size);
                ctx.lineTo(enemy.x - enemy.size / 2, enemy.y + enemy.size);
                ctx.closePath();
                ctx.fill();
            });
        }

        function spawnEnemies() {
            setInterval(() => {
                if (enemies.length < 5) { // Make sure only 5 enemies appear at a time
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    enemies.push({ x, y, size: 30 });
                }
            }, 1000);
        }

        function shootBullet() {
            const dx = Math.cos(player.angle) * bulletSpeed;
            const dy = Math.sin(player.angle) * bulletSpeed;
            bullets.push({ x: player.x, y: player.y, dx, dy, size: bulletSize, color: 'cyan' });
            shootSound.play(); // Play the shoot sound when you shoot a bullet
        }

        function activateBlast() {
            if (blastCount > 0) {
                blastCount--;
                enemies.forEach(enemy => {
                    let angle = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                    bullets.push({ x: player.x, y: player.y, dx: Math.cos(angle) * bulletSpeed, dy: Math.sin(angle) * bulletSpeed });
                });
                blastDisplay.textContent = `Blast: ${blastCount}`;
            }
        }

        function collectYellowPackets(packets) {
            packets.forEach(packet => {
                // Draw the yellow packet
                ctx.fillStyle = packet.color;
                ctx.fillRect(packet.x, packet.y, packet.size, packet.size);

                // Simulate collecting the yellow packets
                setTimeout(() => {
                    packet = null; // Remove yellow square after it disappears
                }, 3000); // Disappear after 3 seconds
            });
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            movePlayer();
            drawPlayer();
            drawBullets();
            drawEnemies();
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') shootBullet();
            if (e.key === 'b' || e.key === 'B') activateBlast();
        });

        spawnEnemies();
        update();
    </script>
</body>
</html>
