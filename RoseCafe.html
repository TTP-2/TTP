<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Cafe</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: auto;
        }
        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }
        .left-half {
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: calc(50% - 50px);
            height: 100%;
            clip-path: polygon(0 0, 80% 0, 100% 100%, 0 100%);
            transition: width 1s ease-in-out, clip-path 1s ease-in-out;
            position: relative;
        }
        .left-half.expanded {
            width: 100%;
            clip-path: none;
        }
        .right-half {
            width: calc(50% + 50px);
            height: 100%;
            background-image: url('coffee.png');
            background-size: cover;
            background-position: center;
            position: absolute;
            right: 0;
            clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%);
            transition: width 1s ease-in-out;
        }
        .right-half.shrunk {
            width: 0;
        }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #333;
            text-align: center;
            margin: 0;
            transition: all 1s ease-in-out;
        }
        .left-half.expanded h1 {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: left;
            font-size: 3rem;
        }
        .order-button {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1.2rem;
            opacity: 1;
            animation: slideUp 1s ease-out;
            cursor: pointer;
        }
        .left-half.expanded .order-button {
            display: none;
        }
        .input-container {
            display: none;
            flex-direction: column;
            gap: 1rem;
            position: absolute;
            top: 100px;
            left: 20px;
        }
        .left-half.expanded .input-container {
            display: flex;
            animation: fadeIn 0.5s ease-in 1s forwards;
        }
        input {
            padding: 0.8rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
            font-family: Arial, sans-serif;
        }
        .submit-button {
            padding: 0.8rem 1.5rem;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .submit-button:hover {
            background-color: #218838;
        }
        .food-list {
            list-style: none;
            padding: 0;
            margin-top: 1rem;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .food-list li {
            padding: 0.5rem 0;
            font-size: 1rem;
        }
        .order-display-container {
            position: absolute;
            top: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 300px;
        }
        .order-display {
            background-color: #f9f9f9;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-family: Arial, sans-serif;
            color: #333;
            font-size: 1rem;
            line-height: 1.5;
            opacity: 0;
            position: relative;
        }
        .left-half.expanded .order-display {
            animation: fadeIn 0.5s ease-in 1s forwards;
        }
        .delete-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .delete-button:hover {
            background-color: #c82333;
        }
        @keyframes slideUp {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="left-half" id="whiteDiv">
            <h1>Rose Cafe</h1>
            <a class="order-button" onclick="expandDiv()">Take Order</a>
            <div class="input-container">
                <input type="text" id="nameInput" placeholder="Name">
                <input type="text" id="orderInput" placeholder="Order">
                <ul class="food-list">
                    <li>Hash Browns</li>
                    <li>Coffee</li>
                    <li>Hot Chocolate</li>
                    <li>Bagel</li>
                </ul>
                <button class="submit-button" onclick="submitOrder()">Submit Order</button>
            </div>
            <div class="order-display-container" id="orderDisplayContainer"></div>
        </div>
        <div class="right-half" id="imageDiv"></div>
    </div>
    <script>
        function expandDiv() {
            const whiteDiv = document.getElementById('whiteDiv');
            const imageDiv = document.getElementById('imageDiv');
            whiteDiv.classList.add('expanded');
            imageDiv.classList.add('shrunk');
        }

        function submitOrder() {
            const name = document.getElementById('nameInput').value;
            const order = document.getElementById('orderInput').value;
            const orderDisplayContainer = document.getElementById('orderDisplayContainer');
            const whiteDiv = document.getElementById('whiteDiv');
            const imageDiv = document.getElementById('imageDiv');

            if (name && order) {
                const orderNumber = Math.floor(1000 + Math.random() * 9000); // Generate 4-digit random number
                const timestamp = new Date().toLocaleString();
                const orderId = Date.now().toString(); // Unique ID for each order
                const orderData = { name, order, orderNumber, timestamp, orderId };

                // Retrieve existing orders or initialize empty array
                let orders = JSON.parse(localStorage.getItem('orders')) || [];
                orders.push(orderData);
                localStorage.setItem('orders', JSON.stringify(orders));

                // Create new order display div
                const orderDiv = document.createElement('div');
                orderDiv.className = 'order-display';
                orderDiv.setAttribute('data-order-id', orderId);
                orderDiv.innerHTML = `Name: ${name}<br>Order: ${order}<br>Order Number: ${orderNumber}<br>Time: ${timestamp}<button class="delete-button" onclick="deleteOrder('${orderId}')">Delete</button>`;
                orderDisplayContainer.appendChild(orderDiv);

                // Clear inputs and slide back to original state
                document.getElementById('nameInput').value = '';
                document.getElementById('orderInput').value = '';
                whiteDiv.classList.remove('expanded');
                imageDiv.classList.remove('shrunk');
            }
        }

        function deleteOrder(orderId) {
            // Remove from local storage
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders = orders.filter(order => order.orderId !== orderId);
            localStorage.setItem('orders', JSON.stringify(orders));

            // Remove from DOM
            const orderDiv = document.querySelector(`[data-order-id="${orderId}"]`);
            if (orderDiv) {
                orderDiv.remove();
            }
        }

        // Load saved orders on page load
        window.onload = function() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const orderDisplayContainer = document.getElementById('orderDisplayContainer');
            orderDisplayContainer.innerHTML = ''; // Clear any existing orders to prevent duplicates
            if (orders.length > 0) {
                orders.forEach(orderData => {
                    const orderDiv = document.createElement('div');
                    orderDiv.className = 'order-display';
                    orderDiv.setAttribute('data-order-id', orderData.orderId);
                    orderDiv.innerHTML = `Name: ${orderData.name}<br>Order: ${orderData.order}<br>Order Number: ${orderData.orderNumber}<br>Time: ${orderData.timestamp}<button class="delete-button" onclick="deleteOrder('${orderData.orderId}')">Delete</button>`;
                    orderDisplayContainer.appendChild(orderDiv);
                });
            }
        };
    </script>
</body>
</html>
