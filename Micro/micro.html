<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice-Activated Smiley Face</title>
    <style>
        body {
            background-color: teal;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .face {
            position: relative;
            width: 200px;
            height: 200px;
        }
        .eye {
            background-color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: 50px;
        }
        .eye-left {
            left: 40px;
        }
        .eye-right {
            right: 40px;
        }
        .mouth {
            background-color: white;
            width: 80px;
            height: 40px;
            border-radius: 0 0 80px 80px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            transition: transform 0.1s ease;
        }
        .mouth.speaking {
            transform: translateX(-50%) scaleY(1.5);
        }
    </style>
</head>
<body>
    <div class="face">
        <div class="eye eye-left"></div>
        <div class="eye eye-right"></div>
        <div class="mouth"></div>
    </div>
    <script>
        const mouth = document.querySelector('.mouth');
        let recognition = null;

        // Check if SpeechRecognition is supported
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = function(event) {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                // Check if the transcript contains "hey micro"
                if (transcript.includes('hey micro')) {
                    // Animate the mouth
                    mouth.classList.add('speaking');
                    // Remove the speaking class after a short delay
                    setTimeout(() => {
                        mouth.classList.remove('speaking');
                    }, 500); // Longer duration for a noticeable effect
                }
            };

            recognition.onend = function() {
                // Restart recognition to keep listening
                try {
                    recognition.start();
                } catch (error) {
                    console.error('Error restarting recognition:', error);
                }
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                // Attempt to restart on error (except no-speech)
                if (event.error !== 'no-speech') {
                    setTimeout(() => {
                        try {
                            recognition.start();
                        } catch (error) {
                            console.error('Error restarting recognition:', error);
                        }
                    }, 1000);
                }
            };

            // Start recognition automatically
            try {
                recognition.start();
            } catch (error) {
                console.error('Error starting recognition:', error);
            }
        } else {
            alert('Sorry, your browser does not support Speech Recognition.');
        }
    </script>
</body>
</html>
