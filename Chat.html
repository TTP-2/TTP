<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaging Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      width: 400px;
    }
    .message-box {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 14px;
    }
    .button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Send a Message</h2>
    <input id="toEmail" class="message-box" type="email" placeholder="Recipient's email" required><br>
    <input id="subject" class="message-box" type="text" placeholder="Subject" required><br>
    <textarea id="message" class="message-box" rows="4" placeholder="Type your message here" required></textarea><br>
    <button class="button" id="sendMessageButton">Send Message</button>
  </div>

  <script>
    const sendMessageButton = document.getElementById('sendMessageButton');

    sendMessageButton.addEventListener('click', function() {
      const toEmail = document.getElementById('toEmail').value;
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value;

      if (toEmail && subject && message) {
        fetch('/send-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ toEmail, subject, message })
        })
        .then(response => response.json())
        .then(data => alert('Message sent successfully!'))
        .catch(error => alert('Error sending message.'));
      } else {
        alert('Please fill all fields');
      }
    });
  </script>

</body>
</html>
