<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Detection Radar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background-color: black; color: white; }
        canvas { background-color: black; display: block; margin: auto; }
        video { display: none; }
    </style>
</head>
<body>
    <h1>Human Detection Radar</h1>
    <canvas id="radarCanvas" width="500" height="500"></canvas>
    <video id="video" width="500" height="500" autoplay></video>
    
    <script>
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        let model, detections = [];
        let angle = 0;

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            return new Promise(resolve => video.onloadedmetadata = resolve);
        }

        async function loadModel() {
            model = await cocoSsd.load();
        }

        async function detectHumans() {
            const predictions = await model.detect(video);
            detections = predictions.filter(prediction => prediction.class === 'person');
            requestAnimationFrame(detectHumans);
        }

        function drawRadar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'green';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(250, 250, 200, 0, Math.PI * 2);
            ctx.stroke();

            let x = 250 + 200 * Math.cos(angle);
            let y = 250 + 200 * Math.sin(angle);
            ctx.strokeStyle = 'lime';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.lineTo(x, y);
            ctx.stroke();

            detections.forEach(det => {
                const centerX = det.bbox[0] + det.bbox[2] / 2;
                const centerY = det.bbox[1] + det.bbox[3] / 2;
                const px = 250 + ((centerX / video.width) * 400) - 200;
                const py = 250 + ((centerY / video.height) * 400) - 200;
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(px, py, 10, 0, Math.PI * 2);
                ctx.fill();
            });

            angle += 0.1;
            requestAnimationFrame(drawRadar);
        }

        async function startRadar() {
            await setupCamera();
            await loadModel();
            detectHumans();
            drawRadar();
        }
        
        startRadar();
    </script>
</body>
</html>
