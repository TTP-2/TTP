<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP studio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    #video-preview, #media-display {
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
    }
    #media-display img, #media-display video {
      display: block;
      margin: 10px auto;
      max-width: 100%;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h1>Media Recorder</h1>
  <div id="recording-section">
    <video id="video-preview" autoplay muted></video>
    <button id="start-record">Start Recording</button>
    <button id="stop-record" disabled>Stop Recording</button>
    <button id="send-media" disabled>Send</button>
  </div>
  <div id="media-display">
    <h2>Uploaded Media</h2>
  </div>
  <script src="script.js">
    const videoPreview = document.getElementById("video-preview");
const startRecordBtn = document.getElementById("start-record");
const stopRecordBtn = document.getElementById("stop-record");
const sendMediaBtn = document.getElementById("send-media");
const mediaDisplay = document.getElementById("media-display");

let mediaRecorder;
let recordedChunks = [];

// Get user media (camera)
navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
  videoPreview.srcObject = stream;

  // Setup MediaRecorder
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = event => {
    if (event.data.size > 0) {
      recordedChunks.push(event.data);
    }
  };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: "video/webm" });
    recordedChunks = [];
    sendMedia(blob);
  };
});

// Start recording
startRecordBtn.addEventListener("click", () => {
  mediaRecorder.start();
  startRecordBtn.disabled = true;
  stopRecordBtn.disabled = false;
  sendMediaBtn.disabled = true;
});

// Stop recording
stopRecordBtn.addEventListener("click", () => {
  mediaRecorder.stop();
  startRecordBtn.disabled = false;
  stopRecordBtn.disabled = true;
  sendMediaBtn.disabled = false;
});

// Send media
function sendMedia(blob) {
  // Display media locally
  const url = URL.createObjectURL(blob);
  const video = document.createElement("video");
  video.src = url;
  video.controls = true;
  mediaDisplay.appendChild(video);

  // Upload media to backend (example)
  const formData = new FormData();
  formData.append("file", blob);

  fetch("/upload", {
    method: "POST",
    body: formData,
  }).then(response => response.json())
    .then(data => {
      console.log("Uploaded:", data);
    });
}
const express = require("express");
const multer = require("multer");
const path = require("path");

const app = express();
const upload = multer({ dest: "uploads/" });

app.use(express.static("public"));

app.post("/upload", upload.single("file"), (req, res) => {
  res.json({ filePath: `/uploads/${req.file.filename}` });
});

// Serve uploaded files
app.use("/uploads", express.static(path.join(__dirname, "uploads")));

app.listen(3000, () => {
  console.log("Server running on http://localhost:3000");
});

  </script>
</body>
</html>
