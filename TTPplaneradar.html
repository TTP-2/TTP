<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time Plane Radar</title>
  <style>
    body {
      background: #222;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      flex-direction: column;
    }

    #radar-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plane {
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      z-index: 1;
    }

    .location {
      width: 8px;
      height: 8px;
      background: green;
      border-radius: 50%;
      position: absolute;
    }

    .location-label {
      position: absolute;
      color: white;
      font-size: 12px;
      text-align: center;
      top: 10px;
      left: -10px;
    }

    .line, .dashed-line {
      position: absolute;
      background: red;
      z-index: 1;
    }

    .line {
      height: 2px;
      background: red;
    }

    .dashed-line {
      height: 1px;
      border-top: 2px dashed red;
    }

    .zoom-buttons {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .zoom-btn {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .zoom-btn:hover {
      background-color: #45a049;
    }

    .plane-info {
      position: absolute;
      color: white;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 5px;
      border-radius: 3px;
      font-size: 14px;
      display: none;
      z-index: 2;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="radar-container">
    <!-- No world map, just the background -->
  </div>

  <div class="zoom-buttons">
    <button class="zoom-btn" id="zoom-in">Zoom In</button>
    <button class="zoom-btn" id="zoom-out">Zoom Out</button>
  </div>

  <script>
    const radarContainer = document.getElementById('radar-container');
    const radarCenter = { lat: -37.7833, lon: 175.2833 }; // Hamilton, NZ
    let radarRadius = Math.min(window.innerWidth, window.innerHeight) / 2; // Set radius to half of the smaller screen dimension
    let radarRange = 1.0; // degrees (~111 km)
    
    const planesData = {}; // To store plane data and their previous positions

    // Departure and Destination mappings for some airports
    const airportLocations = {
      "JFK": "New York, USA",
      "LHR": "London, UK",
      "CDG": "Paris, France",
      "DXB": "Dubai, UAE",
      "SYD": "Sydney, Australia",
      "SFO": "San Francisco, USA",
      "HKG": "Hong Kong",
      "ICN": "Seoul, South Korea",
      "ORD": "Chicago, USA"
    };

    // Zoom In and Zoom Out buttons functionality
    document.getElementById('zoom-in').addEventListener('click', () => {
      if (radarRange > 0.1) {
        radarRange -= 0.1; // Zoom in by decreasing range
        updateRadar();
      }
    });

    document.getElementById('zoom-out').addEventListener('click', () => {
      radarRange += 0.1; // Zoom out by increasing range
      updateRadar();
    });

    function drawLocation(lat, lon, label) {
      const x = ((lon - radarCenter.lon) / radarRange) * radarRadius + radarRadius;
      const y = ((radarCenter.lat - lat) / radarRange) * radarRadius + radarRadius;

      if (x >= 0 && x <= radarRadius * 2 && y >= 0 && y <= radarRadius * 2) {
        const location = document.createElement('div');
        location.className = 'location';
        location.style.left = `${x}px`;
        location.style.top = `${y}px`;

        const labelElement = document.createElement('div');
        labelElement.className = 'location-label';
        labelElement.innerText = label;

        location.appendChild(labelElement);
        radarContainer.appendChild(location);
      }
    }

    function updateRadar() {
      radarContainer.innerHTML = ''; // Clear previous planes and locations
      fetchAircraftData(); // Re-fetch data with updated zoom level
    }

    function fetchAircraftData() {
      const minLat = radarCenter.lat - radarRange;
      const maxLat = radarCenter.lat + radarRange;
      const minLon = radarCenter.lon - radarRange;
      const maxLon = radarCenter.lon + radarRange;

      fetch(`https://opensky-network.org/api/states/all?lamin=${minLat}&lomin=${minLon}&lamax=${maxLat}&lomax=${maxLon}`)
        .then(response => response.json())
        .then(data => {
          document.querySelectorAll('.plane').forEach(el => el.remove());
          
          // Draw predefined locations (e.g., New Zealand, London, etc.)
          const locations = [
            { lat: -37.7833, lon: 175.2833, name: "New Zealand" },
            { lat: 51.5074, lon: -0.1278, name: "London" },
            { lat: 40.7128, lon: -74.0060, name: "New York" }
          ];
          locations.forEach(loc => {
            drawLocation(loc.lat, loc.lon, loc.name);
          });

          if (data.states) {
            data.states.forEach(state => {
              const lat = state[6];
              const lon = state[5];
              const altitude = state[7] || "N/A"; // Altitude is at index 7
              const origin = state[2]; // Departure airport code
              const destination = state[3]; // Destination airport code

              // Use airport location map for user-friendly departure and destination display
              const departureLocation = airportLocations[origin] || "Unknown Location";
              const destinationLocation = airportLocations[destination] || "Unknown Location";

              if (lat && lon) {
                const x = ((lon - radarCenter.lon) / radarRange) * radarRadius * 2 + radarRadius;
                const y = ((radarCenter.lat - lat) / radarRange) * radarRadius * 2 + radarRadius;

                if (x >= 0 && x <= radarRadius * 2 && y >= 0 && y <= radarRadius * 2) {
                  const plane = document.createElement('div');
                  plane.className = 'plane';
                  plane.style.left = `${x - 4}px`; // Adjust to center the plane
                  plane.style.top = `${y - 4}px`;  // Adjust to center the plane

                  plane.addEventListener('click', () => {
                    // Create and show a label with altitude, departure, and destination info
                    const planeInfo = document.createElement('div');
                    planeInfo.className = 'plane-info';
                    planeInfo.innerHTML = `
                      <strong>Altitude:</strong> ${altitude} meters <br>
                      <strong>Departure:</strong> ${departureLocation} <br>
                      <strong>Destination:</strong> ${destinationLocation}
                    `;
                    planeInfo.style.left = `${x - 40}px`;
                    planeInfo.style.top = `${y - 30}px`; // Position the label above the plane
                    radarContainer.appendChild(planeInfo);

                    // Show the label
                    planeInfo.style.display = 'block';

                    // Hide the label after a few seconds
                    setTimeout(() => {
                      planeInfo.style.display = 'none';
                    }, 5000);
                  });

                  radarContainer.appendChild(plane);

                  // Store the plane data
                  planesData[state[0]] = {
                    prevPos: { x, y },
                    altitude,
                    origin,
                    destination
                  };
                }
              }
            });
          }
        })
        .catch(error => {
          console.error('Error fetching aircraft data:', error);
        });
    }

    fetchAircraftData();
    setInterval(fetchAircraftData, 10000);
  </script>
</body>
</html>
