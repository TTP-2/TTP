<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Storage App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            margin-top: 20px;
            font-size: 18px;
            width: 300px;
        }
        .output {
            margin-top: 20px;
            font-size: 24px;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>Text Input App</h1>
    <div id="output" class="output"></div>
    <input id="textInput" type="text" placeholder="Type something and press Enter..." />

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.4.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.4.0/firebase-firestore.js"></script>
    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Function to save the text to Firestore
        function saveText(text) {
            // Save text to Firestore collection
            db.collection("texts").add({
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                displayText(); // After saving, update the displayed text
            })
            .catch((error) => {
                console.error("Error adding document: ", error);
            });
        }

        // Function to display the text
        function displayText() {
            const outputDiv = document.getElementById('output');
            db.collection("texts").orderBy("timestamp", "desc").limit(1).get().then((querySnapshot) => {
                querySnapshot.forEach((doc) => {
                    outputDiv.innerHTML = doc.data().text;
                });
            });
        }

        // Listen for "Enter" keypress to save the text
        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const text = e.target.value;
                if (text.trim()) {
                    saveText(text);
                    e.target.value = ''; // Clear input field
                }
            }
        });

        // Load the latest saved text when the page loads
        window.onload = displayText;
    </script>
</body>
</html>
