<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Storage App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            margin-top: 20px;
            font-size: 18px;
            width: 300px;
        }
        .output {
            margin-top: 20px;
            font-size: 24px;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>Text Input App</h1>
    <div id="output" class="output"></div>
    <input id="textInput" type="text" placeholder="Type something and press Enter..." />

    <script>
        // Load saved text from localStorage
        function loadText() {
            const savedText = localStorage.getItem('storedText');
            if (savedText) {
                document.getElementById('output').innerHTML = savedText;
            }
        }

        // Save text to localStorage
        function saveText(text) {
            localStorage.setItem('storedText', text);
            document.getElementById('output').innerHTML = text;
        }

        // Listen for "Enter" keypress to save the text
        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const text = e.target.value;
                if (text.trim()) {
                    saveText(text);
                    e.target.value = ''; // Clear input field
                }
            }
        });

        // Load the text when the page loads
        window.onload = loadText;
    </script>
</body>
</html>
