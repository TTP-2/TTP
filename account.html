<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TTP Accounts</title>
  <style>
    body {
      margin: 0;
      background-color: white;
      font-family: Arial, sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }

    header {
      background-color: #ccc;
      padding: 1rem;
      text-align: center;
      font-weight: bold;
      font-size: 2rem;
      position: relative;
    }

    .quarter-circle {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: conic-gradient(
        #008080 0deg 90deg,
        #333333 90deg 180deg,
        #f0f0f0 180deg 270deg,
        #4A90E2 270deg 360deg
      );
      transition: transform 0.5s ease-in-out;
      cursor: pointer;
    }

    .quarter-circle:hover {
      transform: rotate(360deg);
    }

    h1 {
      text-align: center;
      color: black;
    }

    h4 {
      text-align: center;
      color: grey;
    }

    .news-box {
      margin: 30px auto;
      width: 80%;
      max-width: 500px;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 8px;
      background-color: #f9f9f9;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .news-box h3 {
      margin-top: 0;
      color: #4A90E2;
    }

    .dark-mode {
      background-color: #222;
      color: white;
    }

    .dark-mode .news-box {
      background-color: #333;
      color: white;
      border-color: #555;
    }

    .toggle-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 10px 15px;
      background-color: #4A90E2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    TTP Accounts
    <div class="quarter-circle"></div>
  </header>

  <button class="toggle-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>

  <h1>Welcome to TTP accounts</h1>
  <h4>Your place to manage and explore with ease.</h4>

  <div class="news-box">
    <h3>Latest Update</h3>
    <p>We're working on cool new features – stay tuned!</p>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }
  </script>

</body>
</html>
