<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TTP Accounts</title>
  <style>
    body {
      margin: 0;
      background-color: white;
    }

    header {
      background-color: #ccc;
      padding: 1rem;
      text-align: center;
      font-weight: bold;
      font-size: 2rem;
      position: relative;
    }

    .help-circle {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: white;
      overflow: hidden;
      border: 2px solid #999;
      cursor: pointer;
    }

    .help-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: white;
      border: 2px solid #333;
      padding: 2rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 1000;
      border-radius: 10px;
      text-align: center;
    }
  </style>
  <script>
    function togglePopup() {
      const popup = document.getElementById('popup');
      popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</head>
<body>
  <header>
    TTP Accounts
    <div class="help-circle" onclick="togglePopup()">
      <img src="user.png" alt="User Icon">
    </div>
  </header>

  <div id="popup" class="popup">
    Hello! This is a popup message.
  </div>
</body>
</html>
