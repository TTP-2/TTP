<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TTP Accounts</title>
  <style>
    body {
      margin: 0;
      background-color: white;
    }

    header {
      background-color: #ccc;
      padding: 1rem;
      text-align: center;
      font-weight: bold;
      font-size: 2rem;
    }

    /* Circle with four colored quarters */
    .quarter-circle {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: conic-gradient(
        #008080 0deg 90deg,   /* Teal (top left) */
        #333333 90deg 180deg, /* Dark Gray (top right) */
        #f0f0f0 180deg 270deg,/* Light Gray (bottom right) */
        #4A90E2 270deg 360deg /* Soft Blue (bottom left) */
      );
    }
  </style>
</head>
<body>
  <header>
    TTP Accounts
  </header>

  <!-- Circle with 4 quarters -->
  <div class="quarter-circle"></div>
</body>
</html>
