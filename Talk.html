<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Messaging App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f3f4f6;
        }
        .chat-container {
            height: 80vh;
            max-width: 600px;
            border-radius: 0.75rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            line-height: 1.5;
        }
        .message.sent {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        .message.received {
            background: #e5e7eb;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="chat-container bg-white w-full">
        <div class="bg-blue-600 text-white text-center py-4 text-lg font-semibold">Real-Time Chat</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="flex p-4 border-t border-gray-200 bg-white">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" class="flex-1 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="sendMessage()" class="ml-2 px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700">Send</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        let messages = [];

        // Display messages
        function displayMessages() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            messages.forEach((msg, index) => {
                const messageElement = document.createElement('div');
                messageElement.classList.add('message', index % 2 === 0 ? 'sent' : 'received');
                messageElement.textContent = msg.text;
                chatMessages.appendChild(messageElement);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Send a new message
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();
            if (messageText) {
                const message = { text: messageText };
                messages.push(message);
                socket.emit('message', message);
                displayMessages();
                messageInput.value = '';
            }
        }

        // Receive messages from server
        socket.on('message', (message) => {
            messages.push(message);
            displayMessages();
        });

        // Handle Enter key
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize chat
        displayMessages();
    </script>
</body>
</html>
