```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-center">Messaging App</h1>
        
        <!-- Username and Room Input -->
        <div id="setup" class="mb-4">
            <input id="username" type="text" placeholder="Enter your username" class="w-full p-2 mb-2 border rounded">
            <input id="room" type="text" placeholder="Enter room name" class="w-full p-2 mb-2 border rounded">
            <button onclick="createRoom()" class="w-full bg-blue-500 text-white p-2 rounded mb-2 hover:bg-blue-600">Create Room</button>
            <button onclick="joinRoom()" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">Join Room</button>
        </div>

        <!-- Chat Interface -->
        <div id="chat" class="hidden">
            <div id="roomInfo" class="text-lg font-semibold mb-2"></div>
            <div id="messages" class="h-64 overflow-y-auto border p-2 mb-2 bg-gray-50"></div>
            <input id="message" type="text" placeholder="Type a message" class="w-full p-2 mb-2 border rounded">
            <button onclick="sendMessage()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Send</button>
            <button onclick="leaveRoom()" class="w-full bg-red-500 text-white p-2 rounded mt-2 hover:bg-red-600">Leave Room</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <script>
        // Firebase configuration (replace with your Firebase project config)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoom = '';
        let username = '';
        let roomRef = null;

        function createRoom() {
            username = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('room').value.trim();
            if (username && currentRoom) {
                joinRoom();
            } else {
                alert('Please enter a username and room name.');
            }
        }

        function joinRoom() {
            username = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('room').value.trim();
            if (username && currentRoom) {
                // Set up listener for messages in the room
                roomRef = db.ref(`rooms/${currentRoom}/messages`);
                roomRef.on('child_added', (snapshot) => {
                    const data = snapshot.val();
                    displayMessage(data);
                });

                // Notify others of join
                sendSystemMessage(`${username} joined the room`);

                document.getElementById('setup').classList.add('hidden');
                document.getElementById('chat').classList.remove('hidden');
                document.getElementById('roomInfo').textContent = `Room: ${currentRoom}`;
            } else {
                alert('Please enter a username and room name.');
            }
        }

        function sendMessage() {
            const messageInput = document.getElementById('message');
            const message = messageInput.value.trim();
            if (message && roomRef) {
                roomRef.push({
                    username: username,
                    message: message,
                    timestamp: new Date().toLocaleTimeString()
                });
                messageInput.value = '';
            }
        }

        function sendSystemMessage(message) {
            if (roomRef) {
                roomRef.push({
                    username: 'System',
                    message: message,
                    timestamp: new Date().toLocaleTimeString()
                });
            }
        }

        function displayMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.className = 'p-1';
            messageElement.innerHTML = `<span class="font-bold">${data.username}</span> (${data.timestamp}): ${data.message}`;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function leaveRoom() {
            if (roomRef) {
                sendSystemMessage(`${username} left the room`);
                roomRef.off(); // Stop listening for messages
                roomRef = null;
            }
            document.getElementById('chat').classList.add('hidden');
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('messages').innerHTML = '';
            currentRoom = '';
            username = '';
        }

        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Handle Firebase connection state
        db.ref('.info/connected').on('value', (snapshot) => {
            if (!snapshot.val()) {
                displayMessage({
                    username: 'System',
                    message: 'Lost connection to server.',
                    timestamp: new Date().toLocaleTimeString()
                });
            }
        });
    </script>
</body>
</html>
