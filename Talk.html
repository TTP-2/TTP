```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-center">Messaging App</h1>
        
        <!-- Username and Room Input -->
        <div id="setup" class="mb-4">
            <input id="username" type="text" placeholder="Enter your username" class="w-full p-2 mb-2 border rounded">
            <input id="room" type="text" placeholder="Enter room name" class="w-full p-2 mb-2 border rounded">
            <button onclick="createRoom()" class="w-full bg-blue-500 text-white p-2 rounded mb-2 hover:bg-blue-600">Create Room</button>
            <button onclick="joinRoom()" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">Join Room</button>
        </div>

        <!-- Chat Interface -->
        <div id="chat" class="hidden">
            <div id="roomInfo" class="text-lg font-semibold mb-2"></div>
            <div id="messages" class="h-64 overflow-y-auto border p-2 mb-2 bg-gray-50"></div>
            <input id="message" type="text" placeholder="Type a message" class="w-full p-2 mb-2 border rounded">
            <button onclick="sendMessage()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Send</button>
            <button onclick="leaveRoom()" class="w-full bg-red-500 text-white p-2 rounded mt-2 hover:bg-red-600">Leave Room</button>
        </div>
    </div>

    <script>
        let ws = null;
        let currentRoom = '';
        let username = '';

        function createRoom() {
            username = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('room').value.trim();
            if (username && currentRoom) {
                connectWebSocket();
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('chat').classList.remove('hidden');
                document.getElementById('roomInfo').textContent = `Room: ${currentRoom}`;
            } else {
                alert('Please enter a username and room name.');
            }
        }

        function joinRoom() {
            username = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('room').value.trim();
            if (username && currentRoom) {
                connectWebSocket();
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('chat').classList.remove('hidden');
                document.getElementById('roomInfo').textContent = `Room: ${currentRoom}`;
            } else {
                alert('Please enter a username and room name.');
            }
        }

        function connectWebSocket() {
            // Update to your deployed server URL if hosted
            ws = new WebSocket('ws://localhost:3000');
            ws.onopen = () => {
                console.log('Connected to WebSocket');
                // Send join message
                ws.send(JSON.stringify({ type: 'join', room: currentRoom, username }));
            };
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'message' && data.room === currentRoom) {
                        displayMessage(data);
                    }
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                displayMessage({
                    username: 'System',
                    message: 'Disconnected from server.',
                    timestamp: new Date().toLocaleTimeString()
                });
            };
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function sendMessage() {
            const messageInput = document.getElementById('message');
            const message = messageInput.value.trim();
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                const data = {
                    type: 'message',
                    room: currentRoom,
                    username: username,
                    message: message,
                    timestamp: new Date().toLocaleTimeString()
                };
                ws.send(JSON.stringify(data));
                messageInput.value = '';
            }
        }

        function displayMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.className = 'p-1';
            messageElement.innerHTML = `<span class="font-bold">${data.username}</span> (${data.timestamp}): ${data.message}`;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function leaveRoom() {
            if (ws) {
                ws.close();
            }
            document.getElementById('chat').classList.add('hidden');
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('messages').innerHTML = '';
            currentRoom = '';
            username = '';
        }

        // Send message on Enter key
        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
