<!DOCTYPE html>
<html>
<head>
<title>Loading...</title>
<style>
    body {
        background-color: white;
        align-items: center;
    }
    progress {
        width: 373px;
        height: 50px;
    }
    h1 {
        color: black;
        text-align: center;
    }
    .container {
        border: 1px solid white;
        width: 374px;
        margin: auto;
    }
</style>
</head>
<body>
<h1>Loading TTP<sup> nz</sup></h1>
<div class="container">
<progress max="100"></progress>
</div>
  <script>
    let countdown = 3; // Start countdown at 3 seconds
    function updateCountdown() {
      document.getElementById('timer').innerText = countdown;
      countdown--;
      if (countdown < 0) {
        window.location.href = "https://example.com"; // Replace with target URL
      }
    }
    setInterval(updateCountdown, 1000); // Updates every second
  </script>

</body>
</html>
