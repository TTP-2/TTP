<!DOCTYPE html>
<html>
<head>
<title>TTP(Enter Code)</title>
<style>
    body {
        background-color: #f0f0f0;
    }
    div {
        width: 340px;
        height: 400px;
        background-color: #fff;
        margin: auto;
        margin-top: 50px;
        border-radius: 10px;
        box-shadow: 4px 4px 10px;
        text-align: center;
        padding-top: 20px;
    }
    input {
        margin-top: 50px;
        text-align: center;
        background-color: #f0f0f0;
        border: 2px solid #ccc;
        width: 200px;
        height: 50px;
        border-radius: 50px;
        font-size: 16px;
        outline: none;
    }
    p {
        font-size: 16px;
        margin-top: 30px;
    }
</style>
</head>
<body>
<div>
    <h1>TTP Code</h1>
    <input type="password" id="PW" placeholder="Enter Password...">
    <p id="Text"></p>
</div>

<script>
    document.getElementById("PW").oninput = function () {
        if (this.value === "TTP12345") {
            this.style.borderColor = "green";
            setTimeout(function () {
            window.location.href = "https://ttp-2.github.io/TTP/Staff";
            }, 3000);

        }
        else {
            this.style.borderColor = "red";
        }
    };
</script>
</body>
</html>
