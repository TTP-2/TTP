<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Micro AI</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial', sans-serif;
      background-color: #e9ecef;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      max-width: 90%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 500px;
      justify-content: space-between;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
      margin-bottom: 20px;
      font-size: 16px;
      color: #333;
    }

    .chat-box div {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .chat-box .user {
      background-color: #007bff;
      color: white;
      align-self: flex-start;
    }

    .chat-box .ai {
      background-color: #28a745;
      color: white;
      align-self: flex-end;
    }

    .input-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-container input {
      flex: 1;
      padding: 10px;
      border-radius: 25px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    .input-container button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }

    .memory-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #f1f1f1;
      border-radius: 8px;
      border: 1px solid #ddd;
      max-height: 150px;
      overflow-y: auto;
      font-size: 14px;
      color: #333;
    }

    .memory-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px;
      background-color: #f1f1f1;
      margin-bottom: 5px;
      border-radius: 8px;
    }

    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100vh;
      background-color: #fff;
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.2);
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 20px;
      z-index: 999;
    }

    .settings-panel.active {
      display: flex;
    }

    .settings-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 50%;
      padding: 10px;
      font-size: 20px;
      cursor: pointer;
      z-index: 1000;
    }

    .toggle-label {
      font-size: 16px;
      margin-right: 10px;
    }

    .clear-memory {
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 25px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 10px;
      display: inline-block;
    }

    .clear-memory:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .clear-memory:hover:enabled {
      background-color: #c82333;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-box" id="chat-box"></div>
  <div class="input-container">
    <input type="text" id="user-input" placeholder="Ask something..." onkeydown="checkEnter(event)">
    <button onclick="getAnswer()">Ask</button>
  </div>
  <div class="memory-box" id="memory-box" style="display: none;">
    <button class="clear-memory" id="clear-memory-btn" onclick="clearMemory()">Clear Memory Text</button>
  </div>
</div>

<button class="settings-btn" onclick="toggleSettings()">
  <i class="fas fa-cogs"></i>
</button>

<div class="settings-panel" id="settings-panel">
  <h3>Settings</h3>
  <div>
    <label class="toggle-label" for="light-dark-toggle">Light/Dark Mode:</label>
    <input type="checkbox" id="light-dark-toggle" onchange="toggleTheme()">
  </div>
  <div>
    <label class="toggle-label" for="color-blind-toggle">Color Blind Mode:</label>
    <input type="checkbox" id="color-blind-toggle" onchange="toggleColorBlind()">
  </div>
  <div>
    <label class="toggle-label" for="personality-select">Personality:</label>
    <select id="personality-select" onchange="setPersonality()">
      <option value="neutral">Neutral</option>
      <option value="friendly">Friendly</option>
      <option value="funny">Funny</option>
      <option value="serious">Serious</option>
      <option value="smart">Smart</option>
    </select>
  </div>
</div>

<script>
  let currentPersonality = localStorage.getItem("aiPersonality") || "neutral";

  function checkEnter(event) {
    if (event.key === "Enter") {
      getAnswer();
    }
  }

  function getAnswer() {
    const input = document.getElementById("user-input");
    const userInput = input.value;
    if (!userInput) return;

    appendMessage('User: ' + userInput, 'user');
    input.value = '';

    let aiResponse = '';

    // Handle "What is" question format
    if (userInput.toLowerCase().startsWith("what is")) {
      const subject = userInput.replace(/what is\s+/i, '').trim();
      const info = localStorage.getItem(subject.toLowerCase());

      if (info) {
        aiResponse = "AI: " + subject + " is " + info + ".";
      } else {
        aiResponse = "AI: I don't know about " + subject + " yet. You can teach me by saying '[subject] is [info]'.";
      }
    } 
    // Handle teaching format "[subject] is [info]"
    else {
      const subjectInfo = userInput.split(" is ");
      if (subjectInfo.length === 2) {
        const subject = subjectInfo[0].trim();
        const info = subjectInfo[1].trim();
        storeKnowledge(subject, info);
        aiResponse = "AI: I have learned that " + subject + " is " + info + ".";
      } else {
        aiResponse = "AI: I didn't understand that. You can teach me using '[subject] is [info]'.";
      }
    }

    appendMessage(getStyledResponse(aiResponse), 'ai');
    saveConversation(userInput, aiResponse);
    showMemory();
  }

  function storeKnowledge(subject, info) {
    localStorage.setItem(subject.toLowerCase(), info);
  }

  function appendMessage(message, sender) {
    const chatBox = document.getElementById("chat-box");
    const newMessage = document.createElement("div");
    newMessage.className = sender;
    newMessage.textContent = message;
    chatBox.appendChild(newMessage);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function saveConversation(userMessage, aiMessage) {
    let conversation = JSON.parse(localStorage.getItem("conversation")) || [];
    conversation.push({ user: userMessage, ai: aiMessage });
    localStorage.setItem("conversation", JSON.stringify(conversation));
  }

  function showMemory() {
    const memoryBox = document.getElementById("memory-box");
    const clearBtn = document.getElementById("clear-memory-btn");
    memoryBox.style.display = 'block';

    const conversation = JSON.parse(localStorage.getItem("conversation")) || [];
    clearBtn.disabled = conversation.length === 0;

    let content = '<button class="clear-memory" id="clear-memory-btn" onclick="clearMemory()" ' + (conversation.length === 0 ? 'disabled' : '') + '>Clear Memory Text</button>';

    if (conversation.length === 0) {
      content += '<p>No conversations stored yet.</p>';
    } else {
      conversation.forEach(entry => {
        content += `<div class="memory-item"><div><strong>User:</strong> ${entry.user}<br><strong>AI:</strong> ${entry.ai}</div></div>`;
      });
    }

    memoryBox.innerHTML = content;
  }

  function clearMemory() {
    localStorage.removeItem("conversation");
    showMemory();
  }

  function toggleSettings() {
    document.getElementById("settings-panel").classList.toggle("active");
  }

  function toggleTheme() {
    const darkMode = document.getElementById("light-dark-toggle").checked;
    document.body.style.backgroundColor = darkMode ? "#000" : "#e9ecef";
    document.body.style.color = darkMode ? "#fff" : "#333";
    document.querySelector('.chat-container').style.backgroundColor = darkMode ? "#222" : "#fff";
    document.querySelector('.chat-box').style.backgroundColor = darkMode ? "#333" : "#f9f9f9";
  }

  function toggleColorBlind() {
    const colorBlind = document.getElementById("color-blind-toggle").checked;
    document.querySelectorAll('.user').forEach(el => el.style.backgroundColor = colorBlind ? "#ff9900" : "#007bff");
    document.querySelectorAll('.ai').forEach(el => el.style.backgroundColor = colorBlind ? "#00ccff" : "#28a745");
  }

  function setPersonality() {
    const select = document.getElementById("personality-select");
    currentPersonality = select.value;
    localStorage.setItem("aiPersonality", currentPersonality);
  }

  function getStyledResponse(base) {
    switch (currentPersonality) {
      case "friendly":
        return "😊 " + base + " Let me know if you need more help!";
      case "funny":
        return base + " 😂 That’s what I call brain power!";
      case "serious":
        return "Here is your answer. " + base;
      case "smart":
        return "As an advanced AI, I can tell you: " + base;
      default:
        return base;
    }
  }

  window.onload = function () {
    document.getElementById("personality-select").value = currentPersonality;
    showMemory();
  };
</script>

</body>
</html>
