<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Activated Hand</title>
    <style>
        body {
            background-color: teal;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .face {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .eye {
            position: absolute;
            top: 85px;
            width: 20px;
            height: 20px;
            background-color: black;
            border-radius: 50%;
        }
        .left-eye {
            left: 60px;
        }
        .right-eye {
            right: 60px;
        }
        .mouth {
            position: absolute;
            bottom: 20px;
            width: 60px;
            height: 30px;
            background-color: black;
            border-radius: 0 0 30px 30px;
            transform: scaleX(1);
        }
        .hand {
            position: absolute;
            bottom: -40px;
            left: 50%;
            width: 30px;
            height: 80px;
            background-color: black;
            border-radius: 10px;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            animation: none;
        }
        .hand .finger {
            width: 6px;
            height: 20px;
            background-color: black;
            margin: 2px;
            border-radius: 5px;
        }
        .hand .thumb {
            width: 8px;
            height: 20px;
            background-color: black;
            margin: 2px;
            border-radius: 5px;
            transform: rotate(-20deg);
        }
        /* Wave animation */
        @keyframes wave {
            0% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(15deg);
            }
            50% {
                transform: rotate(0deg);
            }
            75% {
                transform: rotate(-15deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }
        /* Apply the waving animation */
        .wave {
            animation: wave 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="face">
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="mouth" id="mouth"></div>
        <div class="hand" id="hand">
            <div class="finger"></div>
            <div class="finger"></div>
            <div class="finger"></div>
            <div class="finger"></div>
            <div class="thumb"></div>
        </div>
    </div>

    <script>
        // Check for browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support SpeechRecognition.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Set the language for speech recognition
        recognition.interimResults = true; // Show intermediate results
        recognition.continuous = true; // Keep the mic listening all the time

        // Start listening when the page loads
        recognition.start();

        // Process the voice input
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript.toLowerCase();
            console.log("Heard: ", transcript);

            const mouth = document.getElementById("mouth");
            const hand = document.getElementById("hand");

            // If the user says "hey micro", make the face surprised and hand wave
            if (transcript.includes("hey micro")) {
                // Change the mouth to surprised
                mouth.style.borderRadius = "0"; // Straight mouth for surprise
                mouth.style.width = "80px"; // Wider mouth for surprise
                mouth.style.height = "40px"; // Taller mouth for surprise
                
                // Make the hand wave
                hand.classList.add("wave");
            } else {
                // Default to smile and no waving
                mouth.style.borderRadius = "0 0 30px 30px"; // Smile
                mouth.style.width = "60px"; // Normal width for smile
                mouth.style.height = "30px"; // Normal height for smile
                
                // Stop the hand from waving
                hand.classList.remove("wave");
            }
        }

        recognition.onspeechend = function() {
            recognition.start(); // Restart recognition to keep listening
        }

        recognition.onerror = function(event) {
            console.log("Speech recognition error:", event.error);
        }
    </script>
</body>
</html>
