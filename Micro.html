<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Micro AI</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial', sans-serif;
      background-color: #e9ecef;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.dark-theme {
      background-color: #121212;
      color: white;
    }

    .chat-container {
      width: 400px;
      max-width: 90%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 500px;
      justify-content: space-between;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .chat-container.dark-theme {
      background-color: #333;
      border-color: #444;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
      margin-bottom: 20px;
      font-size: 16px;
      color: #333;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .chat-box.dark-theme {
      background-color: #222;
      color: white;
    }

    .input-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-container input {
      flex: 1;
      padding: 10px;
      border-radius: 25px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    .input-container button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }

    .memory-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #f1f1f1;
      border-radius: 8px;
      border: 1px solid #ddd;
      max-height: 150px;
      overflow-y: auto;
      font-size: 14px;
      color: #333;
    }

    .memory-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px;
      background-color: #f1f1f1;
      margin-bottom: 5px;
      border-radius: 8px;
    }

    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100vh;
      background-color: #fff;
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.2);
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 20px;
      z-index: 999;
    }

    .settings-panel.active {
      display: flex;
    }

    .settings-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 50%;
      padding: 10px;
      font-size: 20px;
      cursor: pointer;
      z-index: 1000;
    }

    .toggle-label {
      font-size: 16px;
      margin-right: 10px;
      color: #333;
      transition: color 0.3s ease;
    }

    .toggle-label.dark-theme {
      color: white;
    }

    h3 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
      transition: color 0.3s ease;
    }

    h3.dark-theme {
      color: white;
    }

    #reset-settings {
      background-color: #f8d7da;
      color: #721c24;
      padding: 10px 20px;
      border-radius: 5px;
      border: none;
    }

    #reset-settings:hover {
      background-color: #f5c6cb;
    }
    
    #user-input {
      border: none;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-box" id="chat-box"></div>
  <div class="input-container">
    <input type="text" id="user-input" placeholder="Ask something..." onkeydown="checkEnter(event)">
    <button onclick="getAnswer()">Ask</button>
  </div>
  <div class="memory-box" id="memory-box" style="display: none;">
    <button class="clear-memory" id="clear-memory-btn" onclick="clearMemory()">Clear Memory Text</button>
  </div>
</div>

<button class="settings-btn" onclick="toggleSettings()">
  <i class="fas fa-cogs"></i>
</button>

<div class="settings-panel" id="settings-panel">
  <h3>Settings</h3>
  <div>
    <label class="toggle-label" for="username-input">Set Username:</label>
    <input type="text" id="username-input" placeholder="Enter your name" oninput="saveUsername()">
  </div>
  <div>
    <button id="reset-settings" onclick="resetSettings()">Reset to Default</button>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    loadSettings();
  });

  function checkEnter(event) {
    if (event.key === "Enter") {
      getAnswer();
    }
  }

  function getAnswer() {
    const input = document.getElementById("user-input");
    const userInput = input.value;
    if (!userInput) return;

    appendMessage('User: ' + userInput, 'user');
    input.value = '';

    let aiResponse = '';

    if (userInput.toLowerCase().startsWith("what is")) {
      const subject = userInput.replace(/what is\s+/i, '').trim();
      const info = localStorage.getItem(subject.toLowerCase());

      if (info) {
        aiResponse = "AI: " + subject + " is " + info + ".";
      } else {
        aiResponse = "AI: I don't know about " + subject + " yet. You can teach me by saying '[subject] is [info]'.";
      }
    } else {
      const subjectInfo = userInput.split(" is ");
      if (subjectInfo.length === 2) {
        const subject = subjectInfo[0].trim();
        const info = subjectInfo[1].trim();
        storeKnowledge(subject, info);
        aiResponse = "AI: I have learned that " + subject + " is " + info + ".";
      } else {
        aiResponse = "AI: I didn't understand that. You can teach me using '[subject] is [info]'.";
      }
    }

    appendMessage(aiResponse, 'ai');
    saveConversation(userInput, aiResponse);
    showMemory();
  }

  function storeKnowledge(subject, info) {
    localStorage.setItem(subject.toLowerCase(), info);
  }

  function appendMessage(message, sender) {
    const chatBox = document.getElementById("chat-box");
    const newMessage = document.createElement("div");
    newMessage.className = sender;
    newMessage.textContent = message;
    chatBox.appendChild(newMessage);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function saveConversation(userMessage, aiMessage) {
    let conversation = JSON.parse(localStorage.getItem("conversation")) || [];
    conversation.push({ user: userMessage, ai: aiMessage });
    localStorage.setItem("conversation", JSON.stringify(conversation));
  }

  function showMemory() {
    const memoryBox = document.getElementById("memory-box");
    const conversation = JSON.parse(localStorage.getItem("conversation")) || [];
    memoryBox.innerHTML = '';
    conversation.forEach((msg, index) => {
      const memoryItem = document.createElement("div");
      memoryItem.className = "memory-item";
      memoryItem.innerHTML = `<span>User: ${msg.user}</span><span>AI: ${msg.ai}</span>`;
      memoryBox.appendChild(memoryItem);
    });
    memoryBox.style.display = conversation.length > 0 ? 'block' : 'none';
  }

  function clearMemory() {
    localStorage.removeItem("conversation");
    showMemory();
  }

  function toggleSettings() {
    const settingsPanel = document.getElementById("settings-panel");
    settingsPanel.classList.toggle("active");
  }

  function saveUsername() {
    const usernameInput = document.getElementById("username-input");
    const username = usernameInput.value;
    localStorage.setItem("username", username);
  }

  function resetSettings() {
    localStorage.removeItem("darkMode");
    localStorage.removeItem("conversation");
    localStorage.removeItem("username");

    document.getElementById("light-dark-toggle").checked = false;
    document.getElementById("username-input").value = '';

    loadSettings();
  }

  function loadSettings() {
    const darkMode = localStorage.getItem("darkMode") === "true";
    document.getElementById("light-dark-toggle").checked = darkMode;

    if (darkMode) {
      document.body.classList.add("dark-theme");
      const chatBoxes = document.querySelectorAll(".chat-box, .memory-box");
      chatBoxes.forEach(box => {
        box.style.color = "white";
      });
    }

    const labels = document.querySelectorAll(".toggle-label");
    const headings = document.querySelectorAll("h3");
    labels.forEach(label => label.classList.toggle("dark-theme", darkMode));
    headings.forEach(heading => heading.classList.toggle("dark-theme", darkMode));

    const savedUsername = localStorage.getItem("username");
    document.getElementById("username-input").value = savedUsername || '';
  }
</script>

</body>
</html>
