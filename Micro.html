<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Activated Face Expressions</title>
    <style>
        body {
            background-color: teal;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        .face {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .eye {
            position: absolute;
            top: 85px;
            width: 20px;
            height: 20px;
            background-color: black;
            border-radius: 50%;
        }
        .left-eye {
            left: 60px;
        }
        .right-eye {
            right: 60px;
        }
        .mouth {
            position: absolute;
            bottom: 20px;
            width: 60px;
            height: 30px;
            background-color: black;
            border-radius: 0 0 30px 30px;
            transform: scaleX(1);
        }
        #response-text {
            font-size: 24px;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="face">
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="mouth" id="mouth"></div>
    </div>
    <div id="response-text"></div>

    <script>
        // Check for browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support SpeechRecognition.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Set the language for speech recognition
        recognition.interimResults = true; // Show intermediate results
        recognition.continuous = true; // Keep the mic listening all the time

        // Start listening when the page loads
        recognition.start();

        // Process the voice input
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript.toLowerCase();
            console.log("Heard: ", transcript);

            const mouth = document.getElementById("mouth");
            const responseText = document.getElementById("response-text");

            // Define expressions
            if (transcript.includes("hi")) {
                // Smile expression
                mouth.style.borderRadius = "0 0 30px 30px"; // Smile shape
                mouth.style.width = "60px"; // Normal width for smile
                mouth.style.height = "30px"; // Normal height for smile
                responseText.innerHTML = "Hi!";
            } else if (transcript.includes("surprised")) {
                // Surprised expression
                mouth.style.borderRadius = "50%"; // Open mouth
                mouth.style.width = "70px"; // Larger width for surprised
                mouth.style.height = "70px"; // Larger height for surprised
                responseText.innerHTML = "Wow!";
            } else if (transcript.includes("sad")) {
                // Sad expression
                mouth.style.borderRadius = "0 0 30px 30px"; // Frown shape
                mouth.style.width = "60px"; // Normal width for frown
                mouth.style.height = "20px"; // Smaller height for frown
                responseText.innerHTML = "I'm sad!";
            } else {
                // Default smile expression
                mouth.style.borderRadius = "0 0 30px 30px"; // Smile
                mouth.style.width = "60px"; // Normal width for smile
                mouth.style.height = "30px"; // Normal height for smile
                responseText.innerHTML = "How can I help you?";
            }
        }

        recognition.onspeechend = function() {
            recognition.start(); // Restart recognition to keep listening
        }

        recognition.onerror = function(event) {
            console.log("Speech recognition error:", event.error);
        }
    </script>
</body>
</html>
