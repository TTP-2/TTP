<!DOCTYPE html>
<html>
<head>
    <title>Micro (AI of TTP)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #f9f9f9;
        }
        div {
            border: 1px solid teal;
            width: 350px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input {
            margin-top: 15px;
            width: 100%;
            height: 30px;
            font-size: 15px;
            text-align: center;
            border: 1px solid teal;
            border-radius: 5px;
        }
        button {
            width: 100%;
            height: 30px;
            border: 2px solid teal;
            margin-top: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: teal;
            color: white;
        }
        p, h4 {
            text-align: center;
            margin: 10px 0;
        }
        h4 {
            color: red;
        }
    </style>
</head>
<body>
    <div>
        <h4>Note:</h4>
        <p>You can only ask Micro specific things</p>
        <h4>Things to Ask or Say:</h4>
        <p>hi</p>
        <p>can you write a story</p>
        <input id="input" type="text" placeholder="Message Micro" onkeypress="checkEnter(event)">
        <p id="Message"></p>
    </div>

    <script>
        function checkEnter(event) {
            const input = document.getElementById("input");
            const message = document.getElementById("Message");

            if (event.key === "Enter") {
                if (input.value === "hi") {
                    message.innerText = "Hello there, How can I assist you today!";
                    input.value = "";
                } 
                else if (input.value === "can you write a story") {
                    message.innerText = "Once upon a time, in a small village nestled between misty mountains, there lived a peculiar cat named Orion...";
                    input.value = "";
                } 
                else if (input.value === "can you make that shorter") {
                    message.innerText = "In a village surrounded by mountains, a cat named Orion predicted the future by gazing at stars...";
                    input.value = "";
                } 
                else {
                    message.innerText = "I'm sorry, I don't understand that request.";
                    input.value = "";
                }
            }
        }
    </script>
</body>
</html>
