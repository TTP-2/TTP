<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Activated Face</title>
    <style>
        body {
            background-color: teal;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        .face {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .eye {
            position: absolute;
            top: 85px;
            width: 20px;
            height: 20px;
            background-color: black;
            border-radius: 50%;
        }
        .left-eye {
            left: 60px;
        }
        .right-eye {
            right: 60px;
        }
        .mouth {
            position: absolute;
            bottom: 20px;
            width: 60px;
            height: 30px;
            background-color: black;
            border-radius: 0 0 30px 30px;
            transform: scaleX(1);
        }
    </style>
</head>
<body>
    <div class="face">
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="mouth" id="mouth"></div>
    </div>

    <script>
        // Check for browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support SpeechRecognition.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Set the language for speech recognition
        recognition.interimResults = true; // Show intermediate results
        recognition.continuous = true; // Keep the mic listening all the time

        // Start listening when the page loads
        recognition.start();

        // Process the voice input
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript.toLowerCase();
            console.log("Heard: ", transcript);

            const mouth = document.getElementById("mouth");

            // If the user says "hey micro", change the mouth and show response in text
            if (transcript.includes("hey micro")) {
                // Change the mouth to a smile (you can make it any shape you'd like)
                mouth.style.borderRadius = "0 0 30px 30px"; // Smile shape
                mouth.style.width = "60px"; // Normal width for smile
                mouth.style.height = "30px"; // Normal height for smile
            }
        }

        recognition.onspeechend = function() {
            recognition.start(); // Restart recognition to keep listening
        }

        recognition.onerror = function(event) {
            console.log("Speech recognition error:", event.error);
        }
    </script>
</body>
</html>
