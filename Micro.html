<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messaging Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e6f2f3;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: teal;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }
    #chat-container {
      display: flex;
      flex-direction: column;
      height: 90vh;
    }
    #messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background-color: #fff;
      border-top: 2px solid teal;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      background-color: #dcf8c6;
      border-radius: 10px;
      max-width: 60%;
    }
    .my-message {
      background-color: #d1e7ff;
      align-self: flex-end;
    }
    .image-message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 10px;
      background-color: #fff3cd;
      max-width: 60%;
    }
    #input-area {
      display: flex;
      padding: 10px;
      background-color: #f0f0f0;
      transition: background-color 0.3s;
    }
    #message-input {
      padding: 10px;
      margin-right: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      flex: 1;
    }
    #send-button {
      padding: 10px 20px;
      background-color: teal;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    canvas {
      max-width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <header>TTP Chat</header>

  <div id="chat-container">
    <div id="messages"></div>

    <div id="input-area">
      <input type="text" id="message-input" placeholder="Type a shape description..." />
      <button id="send-button">Send</button>
    </div>
  </div>

  <script>
    const sendButton = document.getElementById('send-button');
    const messageInput = document.getElementById('message-input');
    const messagesDiv = document.getElementById('messages');
    const inputArea = document.getElementById('input-area');

    let inputDarkness = 240;

    function darkenInputArea() {
      inputDarkness -= 10;
      if (inputDarkness < 0) inputDarkness = 0;
      inputArea.style.backgroundColor = `rgb(${inputDarkness}, ${inputDarkness}, ${inputDarkness})`;
    }

    function sendMessage() {
      const text = messageInput.value.trim();

      if (text) {
        generateImage(text);
        messageInput.value = '';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        darkenInputArea();
      }
    }

    function generateImage(prompt) {
      const imageContainer = document.createElement('div');
      imageContainer.classList.add('image-message', 'my-message');

      const canvas = document.createElement('canvas');
      canvas.width = 300;
      canvas.height = 200;
      const ctx = canvas.getContext('2d');

      // Default drawing settings
      let shape = 'circle';
      let color = 'black';
      let size = 20;

      // Simple parsing for shapes
      if (prompt.includes("circle")) shape = 'circle';
      if (prompt.includes("square")) shape = 'square';
      if (prompt.includes("triangle")) shape = 'triangle';

      // Simple parsing for colors
      if (prompt.includes("red")) color = 'red';
      if (prompt.includes("blue")) color = 'blue';
      if (prompt.includes("green")) color = 'green';

      // Simple parsing for size
      if (prompt.includes("small")) size = 10;
      if (prompt.includes("large")) size = 30;

      // Draw the selected shape
      ctx.fillStyle = color;
      if (shape === 'circle') {
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, size, 0, Math.PI * 2);
        ctx.fill();
      } else if (shape === 'square') {
        ctx.fillRect((canvas.width - size) / 2, (canvas.height - size) / 2, size, size);
      } else if (shape === 'triangle') {
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, (canvas.height - size) / 2);
        ctx.lineTo((canvas.width - size) / 2, (canvas.height + size) / 2);
        ctx.lineTo((canvas.width + size) / 2, (canvas.height + size) / 2);
        ctx.closePath();
        ctx.fill();
      }

      imageContainer.innerHTML = `<div><strong>"${prompt}"</strong></div>`;
      imageContainer.appendChild(canvas);
      messagesDiv.appendChild(imageContainer);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendButton.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>

</body>
</html>
