<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbox</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arial', sans-serif;
      background-color: #e9ecef;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 400px;
      max-width: 90%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 500px;
      justify-content: space-between;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
      margin-bottom: 20px;
      font-size: 16px;
      color: #333;
    }

    .chat-box div {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      background-color: #f1f1f1;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .chat-box .user {
      background-color: #007bff;
      color: white;
      align-self: flex-start;
    }

    .chat-box .ai {
      background-color: #28a745;
      color: white;
      align-self: flex-end;
    }

    .input-container {
      display: flex;
      gap: 10px;
    }

    .input-container input {
      flex: 1;
      padding: 10px;
      border-radius: 25px;
      border: 1px solid #ddd;
      font-size: 16px;
      transition: border-color 0.3s ease;
    }

    .input-container input:focus {
      border-color: #007bff;
      outline: none;
    }

    .input-container button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .input-container button:hover {
      background-color: #0056b3;
    }

    .input-container button:active {
      background-color: #004085;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-box" id="chat-box"></div>
  <div class="input-container">
    <input type="text" id="user-input" placeholder="Ask something..." onkeydown="checkEnter(event)">
    <button onclick="getAnswer()">Ask</button>
  </div>
</div>

<script>
  // Function to check if Enter key was pressed
  function checkEnter(event) {
    if (event.key === "Enter") {
      getAnswer();
    }
  }

  // Function to retrieve the knowledge from localStorage or set it
  function getAnswer() {
    const userInput = document.getElementById("user-input").value;
    if (!userInput) return;

    appendMessage('User: ' + userInput, 'user');
    document.getElementById("user-input").value = '';

    // If the input is asking about a subject
    if (userInput.toLowerCase().startsWith("what is")) {
      const subject = userInput.replace(/what is\s+/i, '').trim(); // Remove "What is" part
      const subjectInfo = localStorage.getItem(subject.toLowerCase());

      if (subjectInfo) {
        appendMessage("AI: " + subjectInfo, 'ai');
      } else {
        appendMessage("AI: I don't know about " + subject + " yet. You can teach me by stating it directly.", 'ai');
      }
      return;
    }

    // If the input is teaching the AI a subject (no special keyword needed)
    const subjectInfo = userInput.split(" is ");
    if (subjectInfo.length === 2) {
      const subject = subjectInfo[0].trim();
      const info = subjectInfo[1].trim();
      storeKnowledge(subject, info);
      appendMessage("AI: I will remember that about " + subject, 'ai');
      return;
    }

    // Default response if input doesn't match anything
    appendMessage("AI: I didn't understand that. Try asking 'What is [subject]?' or teach me with '[subject] is [info]'", 'ai');
  }

  // Function to store knowledge in localStorage
  function storeKnowledge(subject, info) {
    localStorage.setItem(subject.toLowerCase(), info);
  }

  // Function to append a message to the chatbox
  function appendMessage(message, sender) {
    const chatBox = document.getElementById("chat-box");
    const newMessage = document.createElement("div");
    newMessage.className = sender;
    newMessage.textContent = message;
    chatBox.appendChild(newMessage);
    chatBox.scrollTop = chatBox.scrollHeight; // Scroll to bottom
  }
</script>

</body>
</html>
