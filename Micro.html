<!DOCTYPE html>
<html>
<head>
    <title>Micro (AI of TTP)</title>
    <style>
        input {
            margin-top: 30px;
            width: 300px;
            height: 30px;
            font-size: 15px;
            text-align: center;
            border: 1px solid teal;
            position: absolute;
            margin-top: 6px;
            margin-left: 21px;
        }
        button {
            width: 306px;
            height: 30px;
            border: 2px solid teal;
            cursor: pointer;
        }
        button:hover {
            background-color: teal;
        }
        div {
            border: solid 1px teal;
            width: 350px;
            margin: auto;
        }
        p {
            text-align: center;
        }
        h4 {
            text-align: center;
            color: red;
        }
    </style>
</head>
<body>
    <div>
        <h4>Note:</h4>
        <p>You can either ask Micro something or search for a website.</p>
        <input id="input" type="text" placeholder="Ask Micro or enter a URL" onkeypress="checkEnter(event)">
        <br>
        <br>
        <p id="Message"></p>
    </div>
    <script>
        function checkEnter(event) {
            const input = document.getElementById("input");
            const message = document.getElementById("Message");

            if (event.key === "Enter") {
                if (input.value === "hi") {
                    message.innerText = "Hello there, How can I assist you today!";
                    input.value = "";
                } else if (input.value === "can you write a story") {
                    message.innerText = "Once upon a time...";
                    input.value = "";
                } else if (input.value === "can you make that shorter") {
                    message.innerText = "Sure, here's a shortened version...";
                    input.value = "";
                } else {
                    // Treat input as a URL and navigate to the page
                    const url = input.value.startsWith("http://") || input.value.startsWith("https://")
                        ? input.value
                        : `https://${input.value}`;
                    window.location.href = `viewer.html?url=${encodeURIComponent(url)}`;
                }
            }
        }
    </script>
</body>
</html>
