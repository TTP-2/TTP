<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #008080; /* Teal background */
            overflow: hidden;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .ai-face {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: transparent;
            position: relative;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .eye {
            width: 20px;
            height: 20px;
            background-color: #333; /* Black eyes */
            border-radius: 50%;
            position: absolute;
            transition: all 0.3s ease;
        }

        #left-eye {
            left: 40px;
            top: 50px;
        }

        #right-eye {
            right: 40px;
            top: 50px;
        }

        .mouth {
            width: 60px;
            height: 30px;
            background-color: #333;
            border-radius: 0 0 30px 30px;
            position: absolute;
            bottom: 30px;
            transition: transform 0.2s ease;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ai-face">
            <div class="eye" id="left-eye"></div>
            <div class="eye" id="right-eye"></div>
            <div class="mouth" id="mouth"></div>
        </div>
    </div>

    <audio id="greetingAudio" src="greeting.wav"></audio>

    <script>
        const audio = document.getElementById("greetingAudio");
        const mouth = document.getElementById("mouth");

        function animateMouth() {
            let talking = true;
            const interval = setInterval(() => {
                if (!talking) return;
                mouth.style.transform = `scaleY(${1 + Math.random()})`;
            }, 100);

            audio.addEventListener("ended", () => {
                clearInterval(interval);
                mouth.style.transform = "scaleY(1)";
                talking = false;
            });

            audio.play();
        }

        window.onload = animateMouth;
    </script>
</body>
</html>
