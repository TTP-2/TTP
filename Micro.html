<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 380px;
            max-width: 100%;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background-color: #f9f9f9;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-bottom: 1px solid #ddd;
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #ddd;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            margin-right: 10px;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        .button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .message {
            margin: 10px 0;
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 10px;
            display: inline-block;
            font-size: 14px;
        }

        .user-message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
        }

        .bot-message {
            background-color: #e4e6eb;
            color: #333;
            align-self: flex-start;
        }

        .bot-message i {
            font-size: 12px;
            color: #888;
        }

        .user-message i, .bot-message i {
            font-size: 12px;
            color: #888;
        }

        .message-container {
            display: flex;
            flex-direction: column;
        }

    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-input-container">
        <input type="text" id="user-input" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendMessage()">
    </div>
</div>

<script>
    // Load stored knowledge from localStorage
    let knowledgeBase = JSON.parse(localStorage.getItem('knowledgeBase')) || {};

    // Simple function to handle sending messages
    function sendMessage() {
        let userInput = document.getElementById('user-input').value.trim();
        if (userInput !== '') {
            addMessage(userInput, 'user');
            document.getElementById('user-input').value = ''; // Clear input field
            setTimeout(() => generateBotResponse(userInput), 1000); // Simulate AI response delay
        }
    }

    // Function to add messages to the chat
    function addMessage(message, sender) {
        let messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
        messageDiv.innerHTML = message;
        document.getElementById('chat-box').appendChild(messageDiv);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight; // Auto-scroll
    }

    // Function to generate bot response
    function generateBotResponse(userInput) {
        let inputLower = userInput.toLowerCase(); // Normalize input to lowercase
        // Check if the AI already knows the answer
        let response = knowledgeBase[inputLower];
        if (response) {
            addMessage(response, 'bot');
        } else {
            addMessage(`I don't know that yet. What should I say when people ask me '${inputLower}'?`, 'bot');
            listenForTeaching(inputLower); // Prompt user to teach
        }
    }

    // Function to handle teaching the AI
    function listenForTeaching(userInput) {
        // Listen for the next input to store as a response
        document.getElementById('user-input').addEventListener('keydown', function handleAnswer(event) {
            if (event.key === 'Enter') {
                let answer = document.getElementById('user-input').value.trim().toLowerCase(); // Normalize answer
                if (answer && !knowledgeBase[answer]) { // Only store if it's a new answer
                    knowledgeBase[userInput] = answer;  // Store the new knowledge
                    localStorage.setItem('knowledgeBase', JSON.stringify(knowledgeBase)); // Save to localStorage
                    addMessage(answer, 'bot');
                    addMessage("Thanks for teaching me! I'll remember that!", 'bot');
                    document.getElementById('user-input').removeEventListener('keydown', handleAnswer); // Remove listener after teaching
                    document.getElementById('user-input').value = ''; // Clear input field
                } else if (knowledgeBase[answer]) {
                    // If the answer is already known, inform the user
                    addMessage("I already know that answer!", 'bot');
                    document.getElementById('user-input').value = ''; // Clear input field
                }
            }
        });
    }
</script>

</body>
</html>
