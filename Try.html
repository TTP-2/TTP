<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple 3D Game - Minecraft Style</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #interactionMessage {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      display: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="interactionMessage">Press Y to interact with the car</div>

  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Add a simple ground
    const planeGeometry = new THREE.PlaneGeometry(100, 100);
    const planeMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = Math.PI / 2;
    scene.add(plane);

    // Player position
    camera.position.set(0, 2, 5);

    // Car setup
    const carGeometry = new THREE.BoxGeometry(2, 1, 4);
    const carMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const car = new THREE.Mesh(carGeometry, carMaterial);
    car.position.y = 0.5;
    scene.add(car);

    const interactionMessage = document.getElementById('interactionMessage');
    
    // Movement variables
    const movementSpeed = 0.1;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let isCarActive = false;

    // Event listeners for key controls
    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW':
          moveForward = true;
          break;
        case 'KeyS':
          moveBackward = true;
          break;
        case 'KeyA':
          moveLeft = true;
          break;
        case 'KeyD':
          moveRight = true;
          break;
        case 'KeyY':
          if (isNearbyCar) {
            toggleCar();
          }
          break;
      }
    });

    document.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW':
          moveForward = false;
          break;
        case 'KeyS':
          moveBackward = false;
          break;
        case 'KeyA':
          moveLeft = false;
          break;
        case 'KeyD':
          moveRight = false;
          break;
      }
    });

    let isNearbyCar = false;

    // Check proximity to car
    function checkCarProximity() {
      const distance = camera.position.distanceTo(car.position);
      if (distance < 5) {
        isNearbyCar = true;
        interactionMessage.style.display = 'block';
      } else {
        isNearbyCar = false;
        interactionMessage.style.display = 'none';
      }
    }

    function toggleCar() {
      isCarActive = !isCarActive;
      if (isCarActive) {
        camera.position.set(car.position.x, car.position.y + 2, car.position.z + 5); // Move camera above car
      } else {
        camera.position.set(0, 2, 5); // Reset camera to player position
      }
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      checkCarProximity();

      // Update camera position if driving
      if (isCarActive) {
        const forwardVector = new THREE.Vector3(0, 0, -1).applyMatrix4(car.matrixWorld);
        if (moveForward) car.position.addScaledVector(forwardVector, movementSpeed);
        if (moveBackward) car.position.addScaledVector(forwardVector, -movementSpeed);
        return; // Skip camera movement
      }

      // Update player position based on direction (not in car)
      const forwardVector = new THREE.Vector3();
      camera.getWorldDirection(forwardVector);
      forwardVector.y = 0;
      forwardVector.normalize();

      const rightVector = new THREE.Vector3();
      camera.getWorldDirection(rightVector);
      rightVector.cross(new THREE.Vector3(0, 1, 0)).normalize();

      if (moveForward) camera.position.addScaledVector(forwardVector, movementSpeed);
      if (moveBackward) camera.position.addScaledVector(forwardVector, -movementSpeed);
      if (moveLeft) camera.position.addScaledVector(rightVector, -movementSpeed);
      if (moveRight) camera.position.addScaledVector(rightVector, movementSpeed);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
