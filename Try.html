<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft-like Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <script>
    // Scene setup
    const scene = new THREE.Scene();

    // Camera setup
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    // Renderer setup
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting setup
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    // Create blocks
    const blockSize = 1;
    const blocks = [];

    // Simple block geometry
    const blockGeometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
    const blockMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });

    // Create a grid of blocks (world)
    function createWorld() {
      for (let x = -5; x < 5; x++) {
        for (let z = -5; z < 5; z++) {
          const block = new THREE.Mesh(blockGeometry, blockMaterial);
          block.position.set(x * blockSize, 0, z * blockSize);
          scene.add(block);
          blocks.push(block);
        }
      }
    }

    createWorld();

    // Controls
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;

    const playerSpeed = 0.1;
    let cameraAngleX = 0;
    let cameraAngleY = 0;

    // Arrow key controls
    document.addEventListener("keydown", (event) => {
      switch (event.key) {
        case "ArrowUp":
          moveForward = true;
          break;
        case "ArrowDown":
          moveBackward = true;
          break;
        case "ArrowLeft":
          moveLeft = true;
          break;
        case "ArrowRight":
          moveRight = true;
          break;
      }
    });

    document.addEventListener("keyup", (event) => {
      switch (event.key) {
        case "ArrowUp":
          moveForward = false;
          break;
        case "ArrowDown":
          moveBackward = false;
          break;
        case "ArrowLeft":
          moveLeft = false;
          break;
        case "ArrowRight":
          moveRight = false;
          break;
      }
    });

    // Mouse controls to look around
    let mouseX = 0;
    let mouseY = 0;
    document.addEventListener("mousemove", (event) => {
      mouseX = (event.clientX / window.innerWidth) * 2 - 1;
      mouseY = - (event.clientY / window.innerHeight) * 2 + 1;
    });

    // Function to place and break blocks
    let isPlacing = false;

    document.addEventListener("mousedown", (event) => {
      if (event.button === 0) { // Left mouse button - break block
        isPlacing = false;
        breakBlock();
      } else if (event.button === 2) { // Right mouse button - place block
        isPlacing = true;
        placeBlock();
      }
    });

    // Raycasting to detect blocks to place/break
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function getMousePosition(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
    }

    function placeBlock() {
      raycaster.update();
      const intersects = raycaster.intersectObjects(blocks);
      if (intersects.length > 0) {
        const block = intersects[0].object;
        block.material.color.set(0x00ff00); // Change color to simulate block being placed
      }
    }

    function breakBlock() {
      raycaster.update();
      const intersects = raycaster.intersectObjects(blocks);
      if (intersects.length > 0) {
        const block = intersects[0].object;
        scene.remove(block);
        blocks.splice(blocks.indexOf(block), 1);
      }
    }

    // Camera and movement update
    function update() {
      // Update mouse controls
      camera.rotation.x = mouseY * Math.PI / 180;
      camera.rotation.y = mouseX * Math.PI / 180;

      // Player movement
      if (moveForward) camera.position.z -= playerSpeed;
      if (moveBackward) camera.position.z += playerSpeed;
      if (moveLeft) camera.position.x -= playerSpeed;
      if (moveRight) camera.position.x += playerSpeed;
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      update();
      renderer.render(scene, camera);
    }

    animate();

    // Ensure the mouse doesn't change to the default behavior
    document.addEventListener('contextmenu', (e) => e.preventDefault(), false);
  </script>
</body>
</html>
