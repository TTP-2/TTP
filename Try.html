<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobbly Life Prototype</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.21.0/dist/cannon-es.js"></script>
</head>
<body>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Physics setup
    const world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.SAPBroadphase(world);

    // Lights setup
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // Create terrain (simple flat plane for now)
    const planeGeometry = new THREE.PlaneGeometry(500, 500);
    const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = - Math.PI / 2;
    scene.add(plane);

    // Physics ground
    const groundBody = new CANNON.Body({
      mass: 0,
      position: new CANNON.Vec3(0, -1, 0),
    });
    groundBody.addShape(new CANNON.Plane());
    world.addBody(groundBody);

    // Player setup (simple box for player)
    const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
    const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.position.set(0, 1, 0);
    scene.add(player);

    // Physics player
    const playerPhysics = new CANNON.Body({
      mass: 1,
      position: new CANNON.Vec3(0, 5, 0),
      shape: new CANNON.Box(new CANNON.Vec3(0.5, 1, 0.5)),
    });
    world.addBody(playerPhysics);

    // Camera setup
    camera.position.set(0, 5, 15);
    camera.lookAt(player.position);

    // Player controls
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let jump = false;
    
    // Movement speed
    const playerSpeed = 0.1;
    const jumpForce = 5;

    // Keyboard controls
    document.addEventListener("keydown", (event) => {
      if (event.key === "w") moveForward = true;
      if (event.key === "s") moveBackward = true;
      if (event.key === "a") moveLeft = true;
      if (event.key === "d") moveRight = true;
      if (event.key === " " && playerPhysics.position.y <= 2) jump = true; // Simple jumping
    });

    document.addEventListener("keyup", (event) => {
      if (event.key === "w") moveForward = false;
      if (event.key === "s") moveBackward = false;
      if (event.key === "a") moveLeft = false;
      if (event.key === "d") moveRight = false;
      if (event.key === " ") jump = false;
    });

    // Simple ragdoll-like physics update
    function updatePlayer() {
      if (moveForward) playerPhysics.velocity.z = -playerSpeed;
      if (moveBackward) playerPhysics.velocity.z = playerSpeed;
      if (moveLeft) playerPhysics.velocity.x = -playerSpeed;
      if (moveRight) playerPhysics.velocity.x = playerSpeed;
      if (jump) playerPhysics.velocity.y = jumpForce;

      // Apply gravity manually if needed
      if (playerPhysics.position.y <= 2) {
        playerPhysics.velocity.y = 0;
      }
    }

    // Update loop
    function animate() {
      requestAnimationFrame(animate);

      // Update physics
      world.step(1 / 60);
      updatePlayer();

      // Sync player position with physics body
      player.position.copy(playerPhysics.position);

      // Update camera position
      camera.position.set(player.position.x, player.position.y + 5, player.position.z + 15);
      camera.lookAt(player.position);

      // Render the scene
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
