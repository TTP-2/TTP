<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform with Buildings and Doors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.21.0/dist/cannon-es.js"></script>
</head>
<body>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Physics setup
    const world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.SAPBroadphase(world);

    // Lights setup
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // Create green platform (flat ground)
    const groundGeometry = new THREE.PlaneGeometry(500, 500);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = - Math.PI / 2;
    scene.add(ground);

    // Physics ground
    const groundBody = new CANNON.Body({
      mass: 0,
      position: new CANNON.Vec3(0, -1, 0),
    });
    groundBody.addShape(new CANNON.Plane());
    world.addBody(groundBody);

    // Player setup (simple box for player)
    const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
    const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.position.set(0, 1, 0);
    scene.add(player);

    // Physics player
    const playerPhysics = new CANNON.Body({
      mass: 1,
      position: new CANNON.Vec3(0, 5, 0),
      shape: new CANNON.Box(new CANNON.Vec3(0.5, 1, 0.5)),
    });
    world.addBody(playerPhysics);

    // Camera setup
    camera.position.set(0, 5, 15);
    camera.lookAt(player.position);

    // Player controls
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let jump = false;

    // Movement speed and jump force
    const playerSpeed = 0.1;
    const jumpForce = 5;

    // Keyboard controls
    document.addEventListener("keydown", (event) => {
      if (event.key === "w") moveForward = true;
      if (event.key === "s") moveBackward = true;
      if (event.key === "a") moveLeft = true;
      if (event.key === "d") moveRight = true;
      if (event.key === " " && playerPhysics.position.y <= 2) jump = true; // Jump
    });

    document.addEventListener("keyup", (event) => {
      if (event.key === "w") moveForward = false;
      if (event.key === "s") moveBackward = false;
      if (event.key === "a") moveLeft = false;
      if (event.key === "d") moveRight = false;
      if (event.key === " ") jump = false;
    });

    // Create buildings with doors
    function createBuilding(x, z) {
      const buildingGeometry = new THREE.BoxGeometry(10, 20, 10);
      const buildingMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });
      const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
      building.position.set(x, 10, z);
      scene.add(building);

      // Create door (hole in building)
      const doorGeometry = new THREE.BoxGeometry(3, 8, 1);
      const doorMaterial = new THREE.MeshStandardMaterial({ color: 0x0000ff });
      const door = new THREE.Mesh(doorGeometry, doorMaterial);
      door.position.set(x, 6, z + 5); // Door at the front of the building
      scene.add(door);
    }

    createBuilding(20, 20);
    createBuilding(-30, 50);

    // Object spawning functionality
    let spawnCube = false;
    let spawnSphere = false;

    document.addEventListener("keydown", (event) => {
      if (event.key === "c") spawnCube = true;
      if (event.key === "v") spawnSphere = true;
    });

    function spawnObject() {
      if (spawnCube) {
        const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
        const cubeMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        cube.position.set(player.position.x, player.position.y + 1, player.position.z);
        scene.add(cube);

        // Physics for cube
        const cubePhysics = new CANNON.Body({
          mass: 1,
          position: new CANNON.Vec3(player.position.x, player.position.y + 1, player.position.z),
        });
        cubePhysics.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
        world.addBody(cubePhysics);
        
        spawnCube = false;
      }

      if (spawnSphere) {
        const sphereGeometry = new THREE.SphereGeometry(0.5, 16, 16);
        const sphereMaterial = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        sphere.position.set(player.position.x, player.position.y + 1, player.position.z);
        scene.add(sphere);

        // Physics for sphere
        const spherePhysics = new CANNON.Body({
          mass: 1,
          position: new CANNON.Vec3(player.position.x, player.position.y + 1, player.position.z),
        });
        spherePhysics.addShape(new CANNON.Sphere(0.5));
        world.addBody(spherePhysics);

        spawnSphere = false;
      }
    }

    // Update loop
    function animate() {
      requestAnimationFrame(animate);

      // Update physics
      world.step(1 / 60);
      updatePlayer();

      // Sync player position with physics body
      player.position.copy(playerPhysics.position);

      // Camera position
      camera.position.set(player.position.x, player.position.y + 5, player.position.z + 15);
      camera.lookAt(player.position);

      spawnObject(); // Check for spawning objects

      renderer.render(scene, camera);
    }

    animate();

    function updatePlayer() {
      if (moveForward) playerPhysics.velocity.z = -playerSpeed;
      if (moveBackward) playerPhysics.velocity.z = playerSpeed;
      if (moveLeft) playerPhysics.velocity.x = -playerSpeed;
      if (moveRight) playerPhysics.velocity.x = playerSpeed;
      if (jump) playerPhysics.velocity.y = jumpForce;

      // Apply gravity manually if needed
      if (playerPhysics.position.y <= 2) {
        playerPhysics.velocity.y = 0;
      }
    }
  </script>
</body>
</html>
