<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Game with Buildings and Roads</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
  
    // Infinite plane for the ground
    const groundGeometry = new THREE.PlaneGeometry(5000, 5000);
    const groundMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = Math.PI / 2;
    scene.add(ground);
  
    // Add a long road
    const roadGeometry = new THREE.PlaneGeometry(200, 5000);
    const roadMaterial = new THREE.MeshBasicMaterial({ color: 0x808080 });
    const road = new THREE.Mesh(roadGeometry, roadMaterial);
    road.rotation.x = Math.PI / 2;
    road.position.set(0, 0.01, 0); // Slightly above the ground to avoid z-fighting
    scene.add(road);
  
    // Hills in the background
    function createHill(x, z) {
      const hillGeometry = new THREE.SphereGeometry(30, 32, 32);
      const hillMaterial = new THREE.MeshBasicMaterial({ color: 0x228B22 });
      const hill = new THREE.Mesh(hillGeometry, hillMaterial);
      hill.position.set(x, -15, z);
      scene.add(hill);
    }
  
    createHill(100, -200);
    createHill(-150, -300);
    createHill(250, 400);
  
    // Player position
    camera.position.set(0, 2, 5);
  
    // Movement variables
    const movementSpeed = 0.1;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
  
    // Rotation variables
    let cameraRotationY = 0;
    let cameraRotationX = 0;  // For vertical look
  
    // Event listeners for key controls
    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW':
          moveForward = true;
          break;
        case 'KeyS':
          moveBackward = true;
          break;
        case 'KeyA':
          moveLeft = true;
          break;
        case 'KeyD':
          moveRight = true;
          break;
        case 'ArrowLeft':
          cameraRotationY = 0.05;
          break;
        case 'ArrowRight':
          cameraRotationY = -0.05;
          break;
        case 'ArrowUp':
          cameraRotationX = 0.05;  // Look up
          break;
        case 'ArrowDown':
          cameraRotationX = -0.05; // Look down
          break;
      }
    });
  
    document.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW':
          moveForward = false;
          break;
        case 'KeyS':
          moveBackward = false;
          break;
        case 'KeyA':
          moveLeft = false;
          break;
        case 'KeyD':
          moveRight = false;
          break;
        case 'ArrowLeft':
        case 'ArrowRight':
          cameraRotationY = 0;
          break;
        case 'ArrowUp':
        case 'ArrowDown':
          cameraRotationX = 0; // Reset vertical look
          break;
      }
    });
  
    // Create old-style houses with interactive doors (code omitted for brevity)
  
    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
  
      const forwardVector = getForwardVector();
      const rightVector = getRightVector();
  
      // Update player position based on direction
      if (moveForward) camera.position.addScaledVector(forwardVector, movementSpeed);
      if (moveBackward) camera.position.addScaledVector(forwardVector, -movementSpeed);
      if (moveLeft) camera.position.addScaledVector(rightVector, -movementSpeed);
      if (moveRight) camera.position.addScaledVector(rightVector, movementSpeed);
  
      // Rotate camera based on arrow key input
      camera.rotation.y += cameraRotationY;
      camera.rotation.x += cameraRotationX; // Adjust for vertical rotation

      // Clamp vertical rotation to prevent flipping
      camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
  
      // Check proximity for house interactions (code omitted for brevity)
  
      renderer.render(scene, camera);
    }
  
    animate();
  
  </script>
</body>
</html>
