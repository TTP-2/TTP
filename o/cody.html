<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blank Website</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      flex-direction: column;
    }
    .face {
      position: relative;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      border: 4px solid black;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
    }
    .antenna {
      position: absolute;
      top: -44px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 44px;
      background-color: black;
    }
    .antenna-dot {
      position: absolute;
      top: -56px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background-color: black;
      border-radius: 50%;
    }
    .eye {
      width: 26px;
      height: 26px;
      background-color: black;
      border-radius: 50%;
      position: absolute;
      top: 38px;
      animation: blink 3s infinite;
      animation-fill-mode: forwards;
    }
    .eye.left {
      left: 32px;
    }
    .eye.right {
      right: 32px;
    }
    .mouth {
      width: 48px;
      height: 26px;
      background-color: black;
      border-radius: 0 0 48px 48px;
      position: absolute;
      bottom: 33px;
      left: 50%;
      transform: translateX(-50%);
    }
    .message {
      margin-top: 20px;
      font-size: 24px;
      color: black;
      white-space: pre-wrap;
      max-width: 90%;
      text-align: left;
    }
    @keyframes blink {
      0%, 5%, 100% {
        transform: scaleY(1);
      }
      10%, 15% {
        transform: scaleY(0.1);
      }
      20%, 95% {
        transform: scaleY(1);
      }
    }
  </style>
</head>
<body>
  <div class="face">
    <div class="antenna"></div>
    <div class="antenna-dot"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>
  <div id="message" class="message"></div>

  <script>
    const messageDiv = document.getElementById('message');

    function showMessage(text) {
      messageDiv.textContent = text;
    }

    async function fetchWikipediaSummary(query) {
      try {
        const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
        if (!response.ok) throw new Error('Not found');
        const data = await response.json();
        if (data.extract) {
          showMessage(data.extract);
        } else {
          showMessage("I couldn't find anything on that.");
        }
      } catch (error) {
        showMessage("Error getting information.");
      }
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onresult = function(event) {
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            const transcript = event.results[i][0].transcript.trim().toLowerCase();
            showMessage(transcript);

            if (transcript === "hi") {
              showMessage("Hi");
            }

            const askMatch = transcript.match(/^what is (.*?)\??$/);
            if (askMatch) {
              const query = askMatch[1].trim();
              fetchWikipediaSummary(query);
            }
          }
        }
      };

      recognition.onerror = function(event) {
        console.error('Speech recognition error:', event.error);
      };

      recognition.start();
    } else {
      showMessage('Speech recognition not supported in this browser.');
    }
  </script>
</body>
</html>
