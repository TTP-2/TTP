<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cody | chat</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      flex-direction: column;
    }
    .face {
      position: relative;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      border: 4px solid black;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
      cursor: pointer;
    }
    .antenna {
      position: absolute;
      top: -44px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 44px;
      background-color: black;
    }
    .antenna-dot {
      position: absolute;
      top: -56px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background-color: black;
      border-radius: 50%;
    }
    .eye {
      width: 26px;
      height: 26px;
      background-color: black;
      border-radius: 50%;
      position: absolute;
      top: 38px;
      animation: blink 3s infinite;
      animation-fill-mode: forwards;
    }
    .eye.left {
      left: 32px;
    }
    .eye.right {
      right: 32px;
    }
    .mouth {
      width: 48px;
      height: 26px;
      background-color: black;
      border-radius: 0 0 48px 48px;
      position: absolute;
      bottom: 33px;
      left: 50%;
      transform: translateX(-50%);
    }
    @keyframes blink {
      0%, 5%, 100% {
        transform: scaleY(1);
      }
      10%, 15% {
        transform: scaleY(0.1);
      }
      20%, 95% {
        transform: scaleY(1);
      }
    }
    #answer {
      margin-top: 20px;
      max-width: 400px;
      text-align: center;
      font-size: 16px;
      color: #333;
      padding: 0 10px;
      min-height: 80px; /* keep space for answer so page doesn’t jump */
    }
    #instructions {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
      min-height: 18px; /* keep space for instructions so page doesn’t jump */
    }
  </style>
</head>
<body>
  <div class="face" title="Click to ask a question out loud">
    <div class="antenna"></div>
    <div class="antenna-dot"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>
  <div id="instructions">Click the face and ask a question out loud.</div>
  <div id="answer"></div>

  <script>
    const face = document.querySelector('.face');
    const answerEl = document.getElementById('answer');
    const instructionsEl = document.getElementById('instructions');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      instructionsEl.textContent = 'Sorry, your browser does not support Speech Recognition.';
    }

    let recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      async function startListening() {
        answerEl.textContent = '';
        instructionsEl.textContent = 'Click the face and ask a question out loud.';
        try {
          recognition.start();
        } catch(e) {
          // Recognition may already be started; ignore
        }
      }

      face.addEventListener('click', () => {
        startListening();
      });

      recognition.onresult = async (event) => {
        const spokenText = event.results[0][0].transcript;
        instructionsEl.textContent = 'Processing your question...';

        try {
          const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(spokenText)}&format=json&no_redirect=1&skip_disambig=1`);
          if (!response.ok) throw new Error('Network response was not ok');
          const data = await response.json();

          let answerText = '';
          if (data.AbstractText) {
            answerText = data.AbstractText;
          } else if (data.RelatedTopics && data.RelatedTopics.length > 0 && data.RelatedTopics[0].Text) {
            answerText = data.RelatedTopics[0].Text;
          } else {
            answerText = "Sorry, I couldn't find an answer on the internet.";
          }
          answerEl.textContent = answerText;
          speak(answerText);
        } catch (error) {
          answerEl.textContent = "Sorry, I couldn't find an answer on the internet.";
          speak("Sorry, I couldn't find an answer on the internet.");
        }
      };

      recognition.onerror = (event) => {
        // silently ignore or could add minimal error handling
      };

      recognition.onspeechend = () => {
        recognition.stop();
      };

      recognition.onend = () => {
        // Automatically restart listening to keep it always listening
        startListening();
      };

      // Start listening as soon as page loads
      startListening();
    }
    
    function speak(text) {
      if (!('speechSynthesis' in window)) {
        return;
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
