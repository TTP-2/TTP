<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cody | chat</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      flex-direction: column;
    }
    .face {
      position: relative;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      border: 4px solid black;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
      cursor: pointer;
    }
    .antenna {
      position: absolute;
      top: -44px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 44px;
      background-color: black;
    }
    .antenna-dot {
      position: absolute;
      top: -56px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background-color: black;
      border-radius: 50%;
    }
    .eye {
      width: 26px;
      height: 26px;
      background-color: black;
      border-radius: 50%;
      position: absolute;
      top: 38px;
      animation: blink 3s infinite;
      animation-fill-mode: forwards;
    }
    .eye.left {
      left: 32px;
    }
    .eye.right {
      right: 32px;
    }
    .mouth {
      width: 48px;
      height: 26px;
      background-color: black;
      border-radius: 0 0 48px 48px;
      position: absolute;
      bottom: 33px;
      left: 50%;
      transform: translateX(-50%);
    }
    @keyframes blink {
      0%, 5%, 100% {
        transform: scaleY(1);
      }
      10%, 15% {
        transform: scaleY(0.1);
      }
      20%, 95% {
        transform: scaleY(1);
      }
    }
  </style>
</head>
<body>
  <div class="face" title="Click to ask a question out loud">
    <div class="antenna"></div>
    <div class="antenna-dot"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>
  <div id="instructions">Click the face and ask a question out loud.</div>
  <div id="answer"></div>
</body>
</html>
