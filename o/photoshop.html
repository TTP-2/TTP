<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blank White Website</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      background-color: white;
      display: flex;
      transition: background-image 0.5s ease;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }
    .sidebar {
      width: 60px;
      background-color: #f0f0f0;
      height: 100vh;
      padding-top: 15px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .highlight {
      position: absolute;
      top: 15px;
      left: 6px;
      width: 48px;
      height: 48px;
      background-color: #d0d0d0;
      border-radius: 12px;
      transition: top 0.3s ease;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar button {
      width: 48px;
      height: 48px;
      margin: 5px 0;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .sidebar button svg {
      width: 24px;
      height: 24px;
      fill: #333;
      pointer-events: none;
      transition: fill 0.3s ease;
    }
    .sidebar button.active svg {
      fill: #000;
    }
    .content {
      margin-left: 60px;
      padding: 20px;
      flex-grow: 1;
      height: 100vh;
      overflow: auto;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="highlight"></div>
    <button class="active" aria-label="Home" title="Home" data-page="home">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </button>
    <button aria-label="Pictures" title="Pictures" data-page="pictures">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3.01L15.5 12l4.5 6H4l4.5-6z"/>
      </svg>
    </button>
  </div>
  <div class="content"></div>

  <script>
    const highlight = document.querySelector('.highlight');
    const buttons = document.querySelectorAll('.sidebar button');
    const body = document.body;

    function moveHighlight(button) {
      const offsetTop = button.offsetTop;
      highlight.style.top = offsetTop + 'px';
    }

    function updateBackground(page) {
      if (page === 'home') {
        body.style.backgroundImage = "url('background.png')";
      } else {
        body.style.backgroundImage = 'none';
      }
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        moveHighlight(button);

        const page = button.getAttribute('data-page');
        updateBackground(page);
      });
    });

    // Initialize on page load
    const activeButton = document.querySelector('.sidebar button.active');
    if (activeButton) {
      moveHighlight(activeButton);
      updateBackground(activeButton.getAttribute('data-page'));
    }
  </script>
</body>
</html>
