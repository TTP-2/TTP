<!DOCTYPE html>
<html>
<head>
  <title>TTP maps</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .leaflet-control-attribution {
      display: none;
    }
    .top-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1100;
      display: flex;
      gap: 10px;
    }
    .custom-input {
      padding: 10px;
      border-radius: 50px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font-size: 16px;
      border: 1px solid #ccc;
      width: 240px;
    }
    #suggestions {
      position: absolute;
      top: 50px;
      left: 10px;
      width: 240px;
      max-height: 150px;
      overflow-y: auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 1200;
      display: none;
    }
    .suggestion-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .suggestion-item:hover {
      background-color: #f0f0f0;
    }
    .route-button {
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #007bff;
      color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      user-select: none;
    }
    .route-button.active {
      background-color: red;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="top-bar">
  <input type="text" class="custom-input" placeholder="Search places..." id="searchInput" autocomplete="off" />
  <button class="route-button" id="startRouteBtn">Start Routing</button>
</div>
<div id="suggestions"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script>
  const map = L.map('map', { maxZoom: 20, zoomControl: false }).setView([51.505, -0.09], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '',
    minZoom: 15,
    maxZoom: 20
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);

  const searchInput = document.getElementById('searchInput');
  const suggestions = document.getElementById('suggestions');
  const startRouteBtn = document.getElementById('startRouteBtn');

  let marker = null;
  let locationMarker = null;
  let routeControl = null;
  let routeMarkers = [];
  let routePoints = [];

  // Routing mode: true means user can place route points
  let routingMode = false;
  // Route active means the route is shown on map (after user presses stop button)
  let routeActive = false;

  function clearSuggestions() {
    suggestions.innerHTML = '';
    suggestions.style.display = 'none';
  }

  function showSuggestions(places) {
    clearSuggestions();
    if (places.length === 0) return;
    places.forEach(place => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';
      item.textContent = place.display_name;
      item.addEventListener('click', () => selectPlace(place));
      suggestions.appendChild(item);
    });
    suggestions.style.display = 'block';
  }

  function selectPlace(place) {
    clearSuggestions();
    searchInput.value = place.display_name;
    const lat = place.lat;
    const lon = place.lon;
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);
    map.setView([lat, lon], 15);
  }

  function debounce(func, delay) {
    let timeout;
    return function(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), delay);
    };
  }

  const fetchSuggestions = debounce(function(query) {
    if (query.length < 3) {
      clearSuggestions();
      return;
    }
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&addressdetails=1&limit=5`)
      .then(res => res.json())
      .then(data => showSuggestions(data))
      .catch(() => clearSuggestions());
  }, 300);

  searchInput.addEventListener('input', e => {
    const query = e.target.value.trim();
    fetchSuggestions(query);
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (suggestions.children.length > 0) {
        suggestions.children[0].click();
      } else {
        const query = searchInput.value.trim();
        if (!query) return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`)
          .then(res => res.json())
          .then(data => data.length > 0 ? selectPlace(data[0]) : alert('Place not found'))
          .catch(() => alert('Error searching place'));
      }
    }
  });

  document.addEventListener('click', e => {
    if (!searchInput.contains(e.target) && !suggestions.contains(e.target)) {
      clearSuggestions();
    }
  });

  map.on('locationfound', e => {
    const radius = e.accuracy / 2;
    if (locationMarker) map.removeLayer(locationMarker);
    locationMarker = L.circleMarker(e.latlng, {
      radius: 10,
      color: 'blue',
      fillColor: '#30f',
      fillOpacity: 0.7
    }).addTo(map);
    map.setView(e.latlng, 16);
  });

  map.on('locationerror', e => console.warn('Geolocation error:', e.message));
  map.locate({ setView: false, maxZoom: 16, watch: false });

  startRouteBtn.addEventListener('click', () => {
    if (!routingMode) {
      // Start routing mode: allow placing points, but do NOT show route or change button text yet
      routingMode = true;
      routeActive = false;
      routePoints = [];
      routeMarkers.forEach(m => map.removeLayer(m));
      routeMarkers = [];
      if (routeControl) {
        map.removeControl(routeControl);
        routeControl = null;
      }
      alert('Routing mode started. Click two points on the map to set your route.');
      // Button text and color remain "Start Routing"
    } else {
      // Stop routing mode: show the route if 2 points are set, else clear any partial route
      if (routePoints.length === 2) {
        // Show route on map
        routeControl = L.Routing.control({
          waypoints: routePoints,
          routeWhileDragging: false,
          addWaypoints: false,
          show: false,
          createMarker: () => null
        }).addTo(map);
        routeActive = true;
      } else {
        // If less than 2 points, clear markers and route
        routeMarkers.forEach(m => map.removeLayer(m));
        routeMarkers = [];
        if (routeControl) {
          map.removeControl(routeControl);
          routeControl = null;
        }
        routePoints = [];
        routeActive = false;
      }
      routingMode = false;
      startRouteBtn.textContent = 'Start Routing';
      startRouteBtn.classList.remove('active');
    }
  });

  map.on('click', e => {
    if (!routingMode) return;

    if (routePoints.length >= 2) {
      alert('You already set two points. Press "Stop Routing" to finish.');
      return;
    }

    routePoints.push(e.latlng);
    const newMarker = L.marker(e.latlng).addTo(map);
    routeMarkers.push(newMarker);

    // Do NOT change button text or color here, only on button click
  });
</script>

</body>
</html>
