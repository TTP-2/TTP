<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #editor-container {
            display: flex;
            height: 100vh;
        }

        textarea {
            width: 50%;
            height: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            outline: none;
            background-color: #f4f4f4;
        }

        iframe {
            width: 50%;
            height: 100%;
            border: none;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">HTML Live Editor</div>

    <div id="editor-container">
        <!-- Code input section -->
        <textarea id="code-input" placeholder="Write your HTML, CSS, and JavaScript here..."></textarea>
        
        <!-- Live preview -->
        <iframe id="live-preview"></iframe>
    </div>

    <script>
        const codeInput = document.getElementById('code-input');
        const livePreview = document.getElementById('live-preview');

        // Function to update the live preview whenever the user types
        codeInput.addEventListener('input', updatePreview);

        function updatePreview() {
            const code = codeInput.value;
            livePreview.srcdoc = code; // Set the code into the iframe
        }

        // Default content to get started
        codeInput.value = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Code</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            color: #007bff;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Live Editor!</h1>
    <p>Write your HTML, CSS, and JavaScript here to see it in action.</p>

    <script>
        alert('Welcome to your live editor!');
    </script>
</body>
</html>
            `;
            
        // Initialize with default content
        updatePreview();
    </script>

</body>
</html>
