<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Staff</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 1200px;
      width: 100%;
      padding: 20px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    h3 {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 30px;
    }
    .staff-card {
      display: inline-block;
      margin: 20px;
      text-align: center;
      background-color: #fafafa;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      width: 200px;
    }
    .staff-image {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #333;
      margin-bottom: 15px;
      object-fit: cover;
    }
    .staff-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }
    .staff-email {
      font-size: 1rem;
      color: #666;
      margin-bottom: 10px;
    }
    .staff-title {
      font-size: 1rem;
      color: #444;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Our Staff</h3>

    <div class="staff-card">
      <img src="Finn.png" alt="Staff Photo" class="staff-image">
      <h5 class="staff-name">Finn Williams</h5>
      <p class="staff-email">f1*******@gmail.com</p>
      <p class="staff-title">Boss</p>
    </div>
  </div>
</body>
</html>
