<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #editor-container {
            display: flex;
            height: 100vh;
        }

        textarea {
            width: 50%;
            height: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            outline: none;
            background-color: #f4f4f4;
            resize: none;
        }

        iframe {
            width: 50%;
            height: 100%;
            border: none;
        }

        #run-button {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            z-index: 1000;
        }

        #run-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <button id="run-button">Run Code</button>

    <div id="editor-container">
        <!-- Code input section -->
        <textarea id="code-input" placeholder="Write your HTML, CSS, and JavaScript here..."></textarea>
        
        <!-- Live preview -->
        <iframe id="live-preview"></iframe>
    </div>

    <script>
        const codeInput = document.getElementById('code-input');
        const livePreview = document.getElementById('live-preview');
        const runButton = document.getElementById('run-button');

        // Function to update the live preview with the code from the editor
        function updatePreview() {
            const code = codeInput.value;
            livePreview.srcdoc = code; // Set the code into the iframe
        }

        // Add event listener to the run button
        runButton.addEventListener('click', updatePreview);

        // Default content to get started
        codeInput.value = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Code</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            color: #007bff;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Live Editor!</h1>
    <p>Write your HTML, CSS, and JavaScript here to see it in action.</p>

    <script>
        alert('Welcome to your live editor!');
    </script>
</body>
</html>
            `;
            
        // Initialize with default content
        updatePreview();
    </script>

</body>
</html>
