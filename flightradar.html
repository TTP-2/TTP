<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Drawing with Motion</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        video { border: 2px solid black; margin-top: 10px; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <h1>Draw in the Air with Your Hand</h1>
    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let model, prevX = null, prevY = null;

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            return new Promise(resolve => video.onloadedmetadata = resolve);
        }

        async function detectHands() {
            model = await handpose.load();
            setInterval(async () => {
                const predictions = await model.estimateHands(video);
                if (predictions.length > 0) {
                    const x = predictions[0].landmarks[8][0]; // Index finger tip X
                    const y = predictions[0].landmarks[8][1]; // Index finger tip Y
                    ctx.fillStyle = 'red';
                    if (prevX !== null && prevY !== null) {
                        ctx.strokeStyle = 'red';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(prevX, prevY);
                        ctx.lineTo(x, y);
                        ctx.stroke();
                    }
                    prevX = x;
                    prevY = y;
                }
            }, 100);
        }

        async function startDrawing() {
            await setupCamera();
            detectHands();
        }
        
        startDrawing();
    </script>
</body>
</html>
