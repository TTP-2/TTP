<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        video { border: 2px solid black; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <h1>Real-Time Human Detector</h1>
    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            return new Promise(resolve => video.onloadedmetadata = resolve);
        }
        
        async function detectHumans() {
            const model = await cocoSsd.load();
            setInterval(async () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const predictions = await model.detect(video);
                predictions.forEach(prediction => {
                    if (prediction.class === 'person') {
                        ctx.strokeStyle = 'red';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(
                            prediction.bbox[0], prediction.bbox[1],
                            prediction.bbox[2], prediction.bbox[3]
                        );
                        ctx.fillStyle = 'red';
                        ctx.fillText('Person', prediction.bbox[0], prediction.bbox[1] - 5);
                    }
                });
            }, 500);
        }
        
        async function startDetection() {
            await setupCamera();
            detectHumans();
        }
        
        startDetection();
    </script>
</body>
</html>
