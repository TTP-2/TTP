<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        video, canvas { border: 2px solid black; margin-top: 10px; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <h1>Real-Time Motion Detector</h1>
    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let previousFrame = null;

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            return new Promise(resolve => video.onloadedmetadata = resolve);
        }

        function detectMotion() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            if (previousFrame) {
                let motionDetected = false;
                for (let i = 0; i < frame.data.length; i += 4) {
                    let diff = Math.abs(frame.data[i] - previousFrame.data[i]) +
                               Math.abs(frame.data[i + 1] - previousFrame.data[i + 1]) +
                               Math.abs(frame.data[i + 2] - previousFrame.data[i + 2]);
                    if (diff > 50) {  
                        motionDetected = true;
                        frame.data[i] = 255;  
                        frame.data[i + 1] = 0;
                        frame.data[i + 2] = 0;
                    }
                }
                if (motionDetected) {
                    console.log("Motion detected!");
                }
            }
            previousFrame = frame;
            ctx.putImageData(frame, 0, 0);
            requestAnimationFrame(detectMotion);
        }

        async function startDetection() {
            await setupCamera();
            detectMotion();
        }
        
        startDetection();
    </script>
</body>
</html>
