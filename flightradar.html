<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        
        async function fetchFlights() {
            const url = 'https://opensky-network.org/api/states/all';
            try {
                const response = await fetch(url);
                const data = await response.json();
                updateMap(data.states);
            } catch (error) {
                console.error("Error fetching flight data:", error);
            }
        }
        
        function updateMap(flights) {
            map.eachLayer(layer => {
                if (layer instanceof L.Marker) map.removeLayer(layer);
            });
            
            flights.forEach(flight => {
                if (flight[5] !== null && flight[6] !== null) {
                    L.marker([flight[6], flight[5]]).addTo(map)
                     .bindPopup(`Flight: ${flight[1] || 'Unknown'}`);
                }
            });
        }
        
        fetchFlights();
        setInterval(fetchFlights, 10000);
    </script>
</body>
</html>
