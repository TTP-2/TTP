<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Messaging</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #chatContainer { width: 50%; margin: auto; border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
        .message { padding: 5px; border-bottom: 1px solid #ddd; text-align: left; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Simple Messaging</h1>
    <input type="text" id="username" placeholder="Enter your name">
    <div id="chatContainer"></div>
    <input type="text" id="messageInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
    
    <script>
        function sendMessage() {
            const username = document.getElementById('username').value.trim();
            const messageText = document.getElementById('messageInput').value.trim();
            if (username && messageText) {
                const chatContainer = document.getElementById('chatContainer');
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.innerHTML = `<strong>${username}:</strong> ${messageText}`;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight; // Auto-scroll
                document.getElementById('messageInput').value = ''; // Clear input
            } else {
                alert('Please enter your name and a message!');
            }
        }
    </script>
</body>
</html>
