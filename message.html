<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging Platform with Secret Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .chat-container {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        input[type="text"] {
            width: 70%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 25%;
            padding: 10px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            background-color: #e7f5e7;
            word-wrap: break-word;
        }

        .input-container {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>

        <!-- Secret Code Input -->
        <div class="input-container">
            <input type="text" id="secretCode" placeholder="Enter Secret Code">
        </div>

        <!-- Message Input -->
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Type a message...">
        </div>

        <!-- Send Button -->
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const SECRET_CODE = "1234";  // Set the secret code here

        function sendMessage() {
            const secretCode = document.getElementById("secretCode").value;
            const message = document.getElementById("messageInput").value;

            if (secretCode === SECRET_CODE && message.trim() !== "") {
                let chatBox = document.getElementById("chatBox");
                let newMessage = document.createElement("div");
                newMessage.classList.add("message");
                newMessage.textContent = message;
                chatBox.appendChild(newMessage);

                // Clear the input fields
                document.getElementById("secretCode").value = "";
                document.getElementById("messageInput").value = "";

                // Scroll to the bottom of the chat
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                alert("Incorrect secret code or empty message. Please try again.");
            }
        }
    </script>
</body>
</html>
