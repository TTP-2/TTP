<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTP - AI Projects</title>
    <style>
        /* General Reset and Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f7f7;
            color: #333;
            line-height: 1.6;
            padding-bottom: 80px; /* Adjust for footer */
        }

        /* Header Styling */
        header {
            background-color: #004d4d;
            color: white;
            text-align: center;
            padding: 30px 20px;
            font-size: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: center;
            background-color: #003d3d;
            padding: 10px 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            margin: 0 15px;
            font-size: 18px;
            transition: background-color 0.3s ease;
        }
        nav a:hover {
            background-color: #007f7f;
            border-radius: 5px;
        }

        /* Container for Content */
        .container {
            padding: 40px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Section Headings */
        h2 {
            font-size: 28px;
            color: #004d4d;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        /* Footer Styling */
        footer {
            background-color: #008080;
            color: white;
            text-align: center;
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Video Section */
        .video-container {
            display: flex;
            justify-content: center;
            padding: 40px 0;
            background-color: #f0f0f0;
            border-top: 2px solid #ccc;
        }
        video {
            width: 80%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

    </style>
</head>
<body>
    <header>
        Welcome to TTP
    </header>
    <nav>
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
    </nav>
    <div class="container" id="home">
        <h2>About TTP</h2>
        <p>TTP is dedicated to developing AI projects that push the boundaries of technology. Explore our latest work below.</p>
    </div>
    <div class="container" id="projects">
        <h2>Our Projects</h2>
        <p>Coming soon! Stay tuned for updates on our AI innovations.</p>
    </div>

    <!-- Video Section at the Bottom -->
    <div class="video-container">
        <video controls>
            <source src="HarryAndMe.mp4" type="video/mp4">
            Your browser does not support the audio tag.
        </video>
    </div>

    <footer>
        &copy; 2025 TTP - All Rights Reserved
    </footer>
</body>
</html>
