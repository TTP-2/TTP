    .movie {
        border: 1px solid black;

    button {
        border: 1px solid black;
        border-radius: 50px;

        height: 30px;
        text-align: center;
        transition: background-color 1.0s;
    }
    button:hover {
        background-color: teal;
        cursor: pointer;
    }
    img {
        width: 100px;
        height: 100px;
        border-radius: 50px;
        border: 1px black solid;
        filter: blur(5px);
    }
    .Div {
        width: 100px;

    .NoBlur {
