<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP Studios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #333;
      color: white;
      padding: 20px;
    }
    h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    .button-container {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .button-container button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .button-container button:hover {
      background-color: #45a049;
    }
    #videoContainer, #recordContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }
    #preview {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .media-item {
      position: relative;
      text-align: center;
      width: 300px;
    }
    video, img {
      width: 300px;
      height: auto;
      border-radius: 8px;
      border: 2px solid #ddd;
      margin-bottom: 20px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }
    .name-input {
      margin-top: 20px;
      padding: 10px;
      font-size: 1rem;
      width: 200px;
      text-align: center;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    #imagePreview, #videoPreview {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    #videoPreview video {
      width: 300px;
    }
  </style>
</head>
<body>
  <header>
    <h1>TTP Studios - Camera Preview</h1>
  </header>
  <div class="button-container">
    <button id="startCameraButton">Start Camera</button>
    <button id="takePictureButton" style="display: none;">Take Picture</button>
  </div>

  <div id="videoContainer">
    <video id="videoElement" width="640" height="480" autoplay></video>
  </div>

  <div id="recordContainer" style="display:none;">
    <button id="startRecordButton">Start Recording</button>
    <button id="stopRecordButton" style="display:none;">Stop Recording</button>
    <video id="videoPreview" controls></video>
  </div>

  <!-- Input Box for Name -->
  <input type="text" id="nameInput" class="name-input" placeholder="Enter Name">

  <!-- Image and Video Previews -->
  <div id="imagePreview">
    <h2>Images</h2>
    <div id="previewImages"></div>
  </div>
  <div id="videoPreview">
    <h2>Videos</h2>
    <div id="previewVideos"></div>
  </div>

  <script>
    const startCameraButton = document.getElementById('startCameraButton');
    const takePictureButton = document.getElementById('takePictureButton');
    const videoElement = document.getElementById('videoElement');
    const previewImages = document.getElementById('previewImages');
    const previewVideos = document.getElementById('previewVideos');
    const nameInput = document.getElementById('nameInput');
    const startRecordButton = document.getElementById('startRecordButton');
    const stopRecordButton = document.getElementById('stopRecordButton');
    const videoPreview = document.getElementById('videoPreview');
    const recordContainer = document.getElementById('recordContainer');
    let currentStream;
    let mediaRecorder;
    let recordedChunks = [];

    async function initCamera() {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        videoElement.srcObject = currentStream;
        startCameraButton.style.display = 'none';
        takePictureButton.style.display = 'inline-block';
        recordContainer.style.display = 'block';
      } catch (error) {
        console.error('Error accessing camera:', error);
      }
    }

    function startRecording() {
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(currentStream);
      mediaRecorder.ondataavailable = function (event) {
        recordedChunks.push(event.data);
      };
      mediaRecorder.onstop = function () {
        const videoBlob = new Blob(recordedChunks, { type: 'video/mp4' });
        const videoUrl = URL.createObjectURL(videoBlob);
        saveToLocalStorage(videoUrl, 'video');
        videoPreview.src = videoUrl;
      };
      mediaRecorder.start();
      startRecordButton.style.display = 'none';
      stopRecordButton.style.display = 'inline-block';
    }

    function stopRecording() {
      mediaRecorder.stop();
      startRecordButton.style.display = 'inline-block';
      stopRecordButton.style.display = 'none';
    }

    function takePicture() {
      const canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 480;
      const context = canvas.getContext('2d');
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL('image/jpeg');
      saveToLocalStorage(imageData, 'image');
      displayPreview(imageData, 'image');
    }

    function saveToLocalStorage(data, type) {
      const mediaArray = JSON.parse(localStorage.getItem(type)) || [];
      const name = nameInput.value || 'Anonymous';  // Use entered name, or default to 'Anonymous'
      mediaArray.push({ data, name });
      localStorage.setItem(type, JSON.stringify(mediaArray));
    }

    function displayPreview(data, type) {
      const mediaItem = document.createElement('div');
      mediaItem.classList.add('media-item');
      if (type === 'image') {
        const img = document.createElement('img');
        img.src = data;
        mediaItem.appendChild(img);
        previewImages.appendChild(mediaItem);
      } else if (type === 'video') {
        const video = document.createElement('video');
        video.src = data;
        video.controls = true;
        mediaItem.appendChild(video);
        previewVideos.appendChild(mediaItem);
      }

      // Display name under the media
      const nameDisplay = document.createElement('p');
      const name = nameInput.value || 'Anonymous';
      nameDisplay.textContent = name;
      mediaItem.appendChild(nameDisplay);

      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.onclick = () => {
        const mediaItems = JSON.parse(localStorage.getItem(type)) || [];
        const updatedItems = mediaItems.filter(item => item.data !== data);
        localStorage.setItem(type, JSON.stringify(updatedItems));
        mediaItem.remove();
      };
      mediaItem.appendChild(deleteButton);
    }

    function loadMediaFromLocalStorage() {
      const imageArray = JSON.parse(localStorage.getItem('image')) || [];
      const videoArray = JSON.parse(localStorage.getItem('video')) || [];
      imageArray.forEach(item => {
        displayPreview(item.data, 'image');
      });
      videoArray.forEach(item => {
        displayPreview(item.data, 'video');
      });
    }

    startCameraButton.addEventListener('click', initCamera);
    takePictureButton.addEventListener('click', takePicture);
    startRecordButton.addEventListener('click', startRecording);
    stopRecordButton.addEventListener('click', stopRecording);

    window.onload = loadMediaFromLocalStorage;
  </script>
</body>
</html>
