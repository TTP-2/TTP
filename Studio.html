<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP Studios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #333;
      color: white;
      padding: 20px;
    }
    h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    .button-container {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .button-container button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .button-container button:hover {
      background-color: #45a049;
    }
    #videoContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }
    #preview {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    video, img {
      width: 300px;
      height: auto;
      border-radius: 8px;
      border: 2px solid #ddd;
      margin-bottom: 20px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }
    .media-item {
      position: relative;
    }
    .media-item button {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .media-item button:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <header>
    <h1>TTP Studios - Camera Preview</h1>
  </header>
  <div class="button-container">
    <button id="startCameraButton">Start Camera</button>
    <button id="takePictureButton" style="display: none;">Take Picture</button>
  </div>
  <div id="videoContainer">
    <video id="videoElement" width="640" height="480" autoplay></video>
  </div>
  <div id="preview"></div>

  <script>
    const startCameraButton = document.getElementById('startCameraButton');
    const takePictureButton = document.getElementById('takePictureButton');
    const videoElement = document.getElementById('videoElement');
    const preview = document.getElementById('preview');
    let currentStream;

    async function initCamera() {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
        videoElement.srcObject = currentStream;
        startCameraButton.style.display = 'none';
        takePictureButton.style.display = 'inline-block';
      } catch (error) {
        console.error('Error accessing camera:', error);
      }
    }

    function takePicture() {
      const canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 480;
      const context = canvas.getContext('2d');
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL('image/jpeg');
      saveToLocalStorage(imageData);
      displayPreview(imageData);
    }

    function saveToLocalStorage(imageData) {
      const imageArray = JSON.parse(localStorage.getItem('images')) || [];
      imageArray.push(imageData);
      localStorage.setItem('images', JSON.stringify(imageArray));
    }

    function displayPreview(imageData) {
      const mediaItem = document.createElement('div');
      mediaItem.classList.add('media-item');
      const img = document.createElement('img');
      img.src = imageData;
      mediaItem.appendChild(img);
      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.onclick = () => {
        const mediaItems = JSON.parse(localStorage.getItem('images')) || [];
        const updatedItems = mediaItems.filter(item => item !== imageData);
        localStorage.setItem('images', JSON.stringify(updatedItems));
        mediaItem.remove();
      };
      mediaItem.appendChild(deleteButton);
      preview.appendChild(mediaItem);
    }

    function loadImagesFromLocalStorage() {
      const imageArray = JSON.parse(localStorage.getItem('images')) || [];
      imageArray.forEach(imageData => {
        displayPreview(imageData);
      });
    }

    startCameraButton.addEventListener('click', initCamera);
    takePictureButton.addEventListener('click', takePicture);

    window.onload = loadImagesFromLocalStorage;
  </script>
</body>
</html>
