<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP studio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #preview {
      margin-top: 20px;
      max-width: 90%;
    }
    video {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <h1>Select an Image or Video</h1>
  <button id="uploadButton">Choose File</button>
  <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;">
  
  <div id="preview"></div>

  <script>
    const uploadButton = document.getElementById('uploadButton');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    // Load previously saved file from localStorage
    const savedData = localStorage.getItem('fileData');
    const savedType = localStorage.getItem('fileType');

    if (savedData && savedType) {
      displayMedia(savedType, savedData);
    }

    // Open file picker when button is clicked
    uploadButton.addEventListener('click', () => {
      fileInput.click();
    });

    // Handle file selection
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        const fileType = file.type;

        const reader = new FileReader();
        reader.onload = function(event) {
          const fileData = event.target.result;

          // Save file data and type to localStorage
          localStorage.setItem('fileData', fileData);
          localStorage.setItem('fileType', fileType);

          // Display the selected file
          displayMedia(fileType, fileData);
        };

        reader.readAsDataURL(file);
      }
    });

    // Function to display media
    function displayMedia(type, data) {
      // Clear previous preview
      preview.innerHTML = '';

      if (type.startsWith('image/')) {
        // Display image
        const img = document.createElement('img');
        img.src = data;
        img.alt = "Selected Image";
        img.style.maxWidth = '100%';
        preview.appendChild(img);
      } else if (type.startsWith('video/')) {
        // Display video
        const video = document.createElement('video');
        video.src = data;
        video.controls = true;
        preview.appendChild(video);
      } else {
        alert('Unsupported file type.');
      }
    }
  </script>
</body>
</html>
