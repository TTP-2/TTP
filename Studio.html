<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP Studios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .button-container {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .button-container button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .button-container button:hover {
      background-color: #45a049;
    }

    #videoContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    #preview {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    video, img {
      width: 300px;
      height: auto;
      border-radius: 8px;
      border: 2px solid #ddd;
      margin-bottom: 20px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }

    .media-item {
      position: relative;
    }

    .media-item button {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .media-item button:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <header>
    <h1>TTP Studios - Record Video & Take Picture</h1>
  </header>

  <div class="button-container">
    <button id="recordVideoButton">Record Video</button>
    <button id="takePictureButton">Take Picture</button>
  </div>

  <div id="videoContainer">
    <video id="videoElement" width="640" height="480" autoplay></video>
    <button id="startRecordingButton" style="display:none;">Start Recording</button>
    <button id="stopRecordingButton" style="display:none;">Stop Recording</button>
  </div>

  <div id="preview"></div>

  <script>
    const recordVideoButton = document.getElementById('recordVideoButton');
    const takePictureButton = document.getElementById('takePictureButton');
    const videoElement = document.getElementById('videoElement');
    const preview = document.getElementById('preview');
    const startRecordingButton = document.getElementById('startRecordingButton');
    const stopRecordingButton = document.getElementById('stopRecordingButton');
    
    let mediaRecorder;
    let videoChunks = [];
    let currentStream;

    // Access the camera and display video stream
    async function initCamera() {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });
        videoElement.srcObject = currentStream;
        startRecordingButton.style.display = 'inline-block';
      } catch (error) {
        console.error('Error accessing camera:', error);
      }
    }

    // Start recording video
    function startRecording() {
      videoChunks = [];
      mediaRecorder = new MediaRecorder(currentStream);
      mediaRecorder.ondataavailable = event => {
        videoChunks.push(event.data);
      };
      mediaRecorder.onstop = () => {
        const videoBlob = new Blob(videoChunks, { type: 'video/webm' });
        const videoURL = URL.createObjectURL(videoBlob);
        uploadFile(videoBlob, 'video');
        displayPreview(videoURL, 'video');
      };
      mediaRecorder.start();
      startRecordingButton.style.display = 'none';
      stopRecordingButton.style.display = 'inline-block';
    }

    // Stop recording video
    function stopRecording() {
      mediaRecorder.stop();
      stopRecordingButton.style.display = 'none';
      startRecordingButton.style.display = 'inline-block';
    }

    // Take a picture
    function takePicture() {
      const canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 480;
      const context = canvas.getContext('2d');
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL('image/jpeg');
      uploadFile(imageData, 'image');
      displayPreview(imageData, 'image');
    }

    // Upload file to server
    async function uploadFile(fileData, type) {
      const formData = new FormData();
      formData.append('file', fileData);
      formData.append('type', type);

      try {
        await fetch('http://localhost:3000/upload', {
          method: 'POST',
          body: formData,
        });
      } catch (error) {
        console.error('Error uploading file:', error);
      }
    }

    // Display preview of uploaded video or image
    function displayPreview(fileURL, type) {
      const mediaItem = document.createElement('div');
      mediaItem.classList.add('media-item');
      
      const element = type === 'video' ? document.createElement('video') : document.createElement('img');
      element.src = fileURL;
      element.controls = type === 'video';
      mediaItem.appendChild(element);

      // Optionally, you can add a delete button or other functionality here
      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.onclick = () => mediaItem.remove();
      mediaItem.appendChild(deleteButton);

      preview.appendChild(mediaItem);
    }

    // Fetch previously saved media from server on page load
    async function fetchSavedMedia() {
      try {
        const response = await fetch('http://localhost:3000/files');
        const files = await response.json();
        files.forEach(file => {
          displayPreview(file.url, file.type);
        });
      } catch (error) {
        console.error('Error fetching media:', error);
      }
    }

    // Event listeners
    recordVideoButton.addEventListener('click', initCamera);
    startRecordingButton.addEventListener('click', startRecording);
    stopRecordingButton.addEventListener('click', stopRecording);
    takePictureButton.addEventListener('click', takePicture);

    // Fetch saved media on page load
    window.onload = fetchSavedMedia;
    const express = require('express');
const multer = require('multer');
const cors = require('cors');
const path = require('path');
const fs = require('fs');

const app = express();
const PORT = 3000;

// Enable CORS
app.use(cors());

// Serve static files from the uploads folder
app.use(express.static('uploads'));

// Multer setup for file upload
const storage = multer.diskStorage({
  destination: (req, file, cb) => cb(null, 'uploads/'),
  filename: (req, file, cb) => cb(null, Date.now() + path.extname(file.originalname)),
});

const upload = multer({ storage });

// Handle file uploads
app.post('/upload', upload.single('file'), (req, res) => {
  const fileUrl = `${req.protocol}://${req.get('host')}/uploads/${req.file.filename}`;
  console.log('Uploaded file:', fileUrl);

  // Save file metadata
  const dataPath = 'uploads/data.json';
  const existingData = fs.existsSync(dataPath) ? JSON.parse(fs.readFileSync(dataPath)) : [];
  existingData.push({ url: fileUrl, type: req.body.type });

  fs.writeFileSync(dataPath, JSON.stringify(existingData, null, 2));
  res.status(200).json({ message: 'File uploaded successfully!' });
});

// Get all uploaded files
app.get('/files', (req, res) => {
  const dataPath = 'uploads/data.json';
  if (fs.existsSync(dataPath)) {
    const files = JSON.parse(fs.readFileSync(dataPath));
    res.json(files);
  } else {
    res.json([]);
  }
});

// Start the server
app.listen(PORT, () => {
  console.log(`Server is running on http://localhost:${PORT}`);
});

  </script>
</body>
</html>
