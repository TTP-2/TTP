<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP studios
  </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #preview {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    video, img {
      max-width: 300px;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 5px;
      object-fit: contain;
    }
    video {
      height: 200px;
    }
    img {
      max-height: 200px;
    }
  </style>
</head>
<body>
  <h1>Upload Videos and Images</h1>
  <button id="uploadButton">Choose Files</button>
  <input type="file" id="fileInput" accept="video/*,image/*" multiple style="display: none;">
  
  <div id="preview"></div>

  <script>
    const uploadButton = document.getElementById('uploadButton');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    // Replace with your server's base URL
    const SERVER_URL = 'http://localhost:3000';

    // Fetch and display all saved files on page load
    async function fetchFiles() {
      const response = await fetch(`${SERVER_URL}/files`);
      const files = await response.json();
      preview.innerHTML = ''; // Clear preview area

      files.forEach(file => {
        if (file.type.startsWith('video/')) {
          const video = document.createElement('video');
          video.src = file.url;
          video.controls = true;
          preview.appendChild(video);
        } else if (file.type.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = file.url;
          preview.appendChild(img);
        }
      });
    }

    // Handle file uploads
    fileInput.addEventListener('change', async () => {
      const files = fileInput.files;

      const formData = new FormData();
      Array.from(files).forEach(file => {
        formData.append('files', file);
      });

      // Upload files to the server
      await fetch(`${SERVER_URL}/upload`, {
        method: 'POST',
        body: formData,
      });

      // Refresh the preview area
      fetchFiles();
    });

    // Open file picker when button is clicked
    uploadButton.addEventListener('click', () => {
      fileInput.click();
    });

    // Fetch files on initial load
    fetchFiles();
    const express = require('express');
const multer = require('multer');
const cors = require('cors');
const path = require('path');
const fs = require('fs');

const app = express();
const PORT = 3000;

// Enable CORS
app.use(cors());
app.use(express.static('uploads')); // Serve uploaded files

// Configure Multer for file uploads
const storage = multer.diskStorage({
  destination: (req, file, cb) => cb(null, 'uploads/'),
  filename: (req, file, cb) => cb(null, Date.now() + path.extname(file.originalname)),
});

const upload = multer({ storage });

// Endpoint to upload files
app.post('/upload', upload.array('files'), (req, res) => {
  const files = req.files.map(file => ({
    url: `${req.protocol}://${req.get('host')}/${file.filename}`,
    type: file.mimetype,
  }));

  // Save file metadata to a JSON file (or database)
  const dataPath = 'uploads/data.json';
  const existingData = fs.existsSync(dataPath) ? JSON.parse(fs.readFileSync(dataPath)) : [];
  fs.writeFileSync(dataPath, JSON.stringify([...existingData, ...files], null, 2));

  res.status(200).json(files);
});

// Endpoint to fetch all files
app.get('/files', (req, res) => {
  const dataPath = 'uploads/data.json';
  if (fs.existsSync(dataPath)) {
    const files = JSON.parse(fs.readFileSync(dataPath));
    res.json(files);
  } else {
    res.json([]);
  }
});

// Start the server
app.listen(PORT, () => {
  console.log(`Server running on http://localhost:${PORT}`);
});

  </script>
</body>
</html>
