<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Multiple Videos and Images</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #preview {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    video, img {
      max-width: 300px;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 5px;
      object-fit: contain;
    }
    video {
      height: 200px; /* Standard height for videos */
    }
    img {
      max-height: 200px; /* Limit height for images */
    }
  </style>
</head>
<body>
  <h1>Upload Multiple Videos and Images</h1>
  <button id="uploadButton">Choose Files</button>
  <input type="file" id="fileInput" accept="video/*,image/*" multiple style="display: none;">
  
  <div id="preview"></div>

  <script>
    const uploadButton = document.getElementById('uploadButton');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    // Open file picker when button is clicked
    uploadButton.addEventListener('click', () => {
      fileInput.click();
    });

    // Handle file selection
    fileInput.addEventListener('change', () => {
      const files = fileInput.files;

      // Loop through each file and display it
      Array.from(files).forEach(file => {
        if (file.type.startsWith('video/')) {
          // Create and append video element
          const video = document.createElement('video');
          video.src = URL.createObjectURL(file);
          video.controls = true;
          preview.appendChild(video);
        } else if (file.type.startsWith('image/')) {
          // Create and append image element
          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          preview.appendChild(img);
        } else {
          alert('Unsupported file type. Only videos and images are allowed.');
        }
      });
    });
  </script>
</body>
</html>
