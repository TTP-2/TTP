<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP Studios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #preview {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    video, img {
      max-width: 300px;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 5px;
      object-fit: contain;
    }
    video {
      height: 200px;
    }
    img {
      max-height: 200px;
    }
  </style>
</head>
<body>
  <h1>TTP Studios - Record Video & Take Picture</h1>
  <button id="recordVideoButton">Record Video</button>
  <button id="takePictureButton">Take Picture</button>

  <div id="videoContainer">
    <video id="videoElement" width="640" height="480" autoplay></video>
    <button id="startRecordingButton" style="display:none;">Start Recording</button>
    <button id="stopRecordingButton" style="display:none;">Stop Recording</button>
  </div>

  <div id="preview"></div>

  <script>
    const recordVideoButton = document.getElementById('recordVideoButton');
    const takePictureButton = document.getElementById('takePictureButton');
    const videoElement = document.getElementById('videoElement');
    const preview = document.getElementById('preview');
    const startRecordingButton = document.getElementById('startRecordingButton');
    const stopRecordingButton = document.getElementById('stopRecordingButton');
    
    let mediaRecorder;
    let videoChunks = [];
    let currentStream;

    // Access the camera and display video stream
    async function initCamera() {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });
        videoElement.srcObject = currentStream;
        startRecordingButton.style.display = 'inline-block';
      } catch (error) {
        console.error('Error accessing camera:', error);
      }
    }

    // Start recording video
    function startRecording() {
      videoChunks = [];
      mediaRecorder = new MediaRecorder(currentStream);
      mediaRecorder.ondataavailable = event => {
        videoChunks.push(event.data);
      };
      mediaRecorder.onstop = () => {
        const videoBlob = new Blob(videoChunks, { type: 'video/webm' });
        const videoURL = URL.createObjectURL(videoBlob);
        uploadFile(videoBlob, 'video');
        displayPreview(videoURL, 'video');
      };
      mediaRecorder.start();
      startRecordingButton.style.display = 'none';
      stopRecordingButton.style.display = 'inline-block';
    }

    // Stop recording video
    function stopRecording() {
      mediaRecorder.stop();
      stopRecordingButton.style.display = 'none';
      startRecordingButton.style.display = 'inline-block';
    }

    // Take a picture
    function takePicture() {
      const canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 480;
      const context = canvas.getContext('2d');
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL('image/jpeg');
      uploadFile(imageData, 'image');
      displayPreview(imageData, 'image');
    }

    // Upload file to server
    async function uploadFile(fileData, type) {
      const formData = new FormData();
      formData.append('file', fileData);
      formData.append('type', type);

      try {
        await fetch('http://localhost:3000/upload', {
          method: 'POST',
          body: formData,
        });
      } catch (error) {
        console.error('Error uploading file:', error);
      }
    }

    // Display preview of uploaded video or image
    function displayPreview(fileURL, type) {
      const previewElement = type === 'video' ? document.createElement('video') : document.createElement('img');
      previewElement.src = fileURL;
      if (type === 'video') {
        previewElement.controls = true;
      }
      preview.appendChild(previewElement);
    }

    // Event listeners
    recordVideoButton.addEventListener('click', initCamera);
    startRecordingButton.addEventListener('click', startRecording);
    stopRecordingButton.addEventListener('click', stopRecording);
    takePictureButton.addEventListener('click', takePicture);
    const express = require('express');
const multer = require('multer');
const cors = require('cors');
const path = require('path');
const fs = require('fs');

const app = express();
const PORT = 3000;

// Enable CORS
app.use(cors());

// Serve static files from the uploads folder
app.use(express.static('uploads'));

// Multer setup for file upload
const storage = multer.diskStorage({
  destination: (req, file, cb) => cb(null, 'uploads/'),
  filename: (req, file, cb) => cb(null, Date.now() + path.extname(file.originalname)),
});

const upload = multer({ storage });

// Handle file uploads
app.post('/upload', upload.single('file'), (req, res) => {
  const fileUrl = `${req.protocol}://${req.get('host')}/uploads/${req.file.filename}`;
  console.log('Uploaded file:', fileUrl);

  // Save file metadata
  const dataPath = 'uploads/data.json';
  const existingData = fs.existsSync(dataPath) ? JSON.parse(fs.readFileSync(dataPath)) : [];
  existingData.push({ url: fileUrl, type: req.body.type });

  fs.writeFileSync(dataPath, JSON.stringify(existingData, null, 2));
  res.status(200).json({ message: 'File uploaded successfully!' });
});

// Get all uploaded files
app.get('/files', (req, res) => {
  const dataPath = 'uploads/data.json';
  if (fs.existsSync(dataPath)) {
    const files = JSON.parse(fs.readFileSync(dataPath));
    res.json(files);
  } else {
    res.json([]);
  }
});

// Start the server
app.listen(PORT, () => {
  console.log(`Server is running on http://localhost:${PORT}`);
});

  </script>
</body>
</html>
