<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persistent Videos and Images</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #preview {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    video, img {
      max-width: 300px;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 5px;
      object-fit: contain;
    }
    video {
      height: 200px;
    }
    img {
      max-height: 200px;
    }
  </style>
</head>
<body>
  <h1>Upload Videos and Images</h1>
  <button id="uploadButton">Choose Files</button>
  <input type="file" id="fileInput" accept="video/*,image/*" multiple style="display: none;">
  
  <div id="preview"></div>

  <script>
    const uploadButton = document.getElementById('uploadButton');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    const SERVER_URL = 'http://localhost:3000';  // Adjust the URL if necessary

    // Fetch and display all saved files on page load
    async function fetchFiles() {
      try {
        const response = await fetch(`${SERVER_URL}/files`);
        const files = await response.json();
        preview.innerHTML = ''; // Clear preview area

        files.forEach(file => {
          if (file.type.startsWith('video/')) {
            const video = document.createElement('video');
            video.src = file.url;
            video.controls = true;
            preview.appendChild(video);
          } else if (file.type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = file.url;
            preview.appendChild(img);
          }
        });
      } catch (error) {
        console.error('Error fetching files:', error);
      }
    }

    // Handle file uploads
    fileInput.addEventListener('change', async () => {
      const files = fileInput.files;
      const formData = new FormData();
      Array.from(files).forEach(file => {
        formData.append('files', file);
      });

      try {
        await fetch(`${SERVER_URL}/upload`, {
          method: 'POST',
          body: formData,
        });

        // Refresh the preview area
        fetchFiles();
      } catch (error) {
        console.error('Error uploading files:', error);
      }
    });

    // Open file picker when button is clicked
    uploadButton.addEventListener('click', () => {
      fileInput.click();
    });

    // Fetch files on initial load
    fetchFiles();
    const express = require('express');
const multer = require('multer');
const cors = require('cors');
const path = require('path');
const fs = require('fs');

const app = express();
const PORT = 3000;

// Enable CORS for cross-origin requests
app.use(cors());

// Static file serving (uploads/ folder)
app.use(express.static('uploads'));

// Configure Multer for file uploads
const storage = multer.diskStorage({
  destination: (req, file, cb) => cb(null, 'uploads/'),
  filename: (req, file, cb) => cb(null, Date.now() + path.extname(file.originalname)),
});

const upload = multer({ storage });

// Endpoint to upload files
app.post('/upload', upload.array('files'), (req, res) => {
  const files = req.files.map(file => ({
    url: `${req.protocol}://${req.get('host')}/${file.filename}`,
    type: file.mimetype,
  }));

  // Save metadata to data.json file
  const dataPath = 'uploads/data.json';
  const existingData = fs.existsSync(dataPath) ? JSON.parse(fs.readFileSync(dataPath)) : [];
  fs.writeFileSync(dataPath, JSON.stringify([...existingData, ...files], null, 2));

  res.status(200).json(files);
});

// Endpoint to get all saved files
app.get('/files', (req, res) => {
  const dataPath = 'uploads/data.json';
  if (fs.existsSync(dataPath)) {
    const files = JSON.parse(fs.readFileSync(dataPath));
    res.json(files);
  } else {
    res.json([]);
  }
});

// Start the server
app.listen(PORT, () => {
  console.log(`Server is running on http://localhost:${PORT}`);
});

  </script>
</body>
</html>
