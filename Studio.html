<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>TTP Studios</title><style>body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 0; } header { background-color: #333; color: white; padding: 20px; } h1 { margin: 0; font-size: 2.5rem; } .button-container { margin-top: 20px; display: flex; justify-content: center; gap: 20px; } .button-container button { padding: 15px 30px; font-size: 1.2rem; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.3s; } .button-container button:hover { background-color: #45a049; } #videoContainer { display: flex; flex-direction: column; align-items: center; margin-top: 30px; } #preview { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; } video, img { width: 300px; height: auto; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 20px; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); } .media-item { position: relative; } .media-item button { position: absolute; bottom: 10px; left: 10px; padding: 10px; background-color: rgba(0, 0, 0, 0.5); color: white; border: none; border-radius: 5px; font-size: 0.9rem; cursor: pointer; transition: background-color 0.3s; } .media-item button:hover { background-color: #333; }</style></head><body><header><h1>TTP Studios - Record Video & Take Picture</h1></header><div class="button-container"><button id="recordVideoButton">Record Video</button><button id="takePictureButton">Take Picture</button></div><div id="videoContainer"><video id="videoElement" width="640" height="480" autoplay></video><button id="startRecordingButton" style="display:none;">Start Recording</button><button id="stopRecordingButton" style="display:none;">Stop Recording</button></div><div id="preview"></div><script>const recordVideoButton = document.getElementById('recordVideoButton'); const takePictureButton = document.getElementById('takePictureButton'); const videoElement = document.getElementById('videoElement'); const preview = document.getElementById('preview'); const startRecordingButton = document.getElementById('startRecordingButton'); const stopRecordingButton = document.getElementById('stopRecordingButton'); let mediaRecorder; let videoChunks = []; let currentStream; async function initCamera() { try { currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); videoElement.srcObject = currentStream; startRecordingButton.style.display = 'inline-block'; } catch (error) { console.error('Error accessing camera:', error); } } function startRecording() { videoChunks = []; mediaRecorder = new MediaRecorder(currentStream); mediaRecorder.ondataavailable = event => { videoChunks.push(event.data); }; mediaRecorder.onstop = () => { const videoBlob = new Blob(videoChunks, { type: 'video/webm' }); const videoURL = URL.createObjectURL(videoBlob); uploadFile(videoBlob, 'video'); displayPreview(videoURL, 'video'); }; mediaRecorder.start(); startRecordingButton.style.display = 'none'; stopRecordingButton.style.display = 'inline-block'; } function stopRecording() { mediaRecorder.stop(); stopRecordingButton.style.display = 'none'; startRecordingButton.style.display = 'inline-block'; } function takePicture() { const canvas = document.createElement('canvas'); canvas.width = 640; canvas.height = 480; const context = canvas.getContext('2d'); context.drawImage(videoElement, 0, 0, canvas.width, canvas.height); const imageData = canvas.toDataURL('image/jpeg'); uploadFile(imageData, 'image'); displayPreview(imageData, 'image'); } async function uploadFile(fileData, type) { const formData = new FormData(); formData.append('file', fileData); formData.append('type', type); try { await fetch('http://localhost:3000/upload', { method: 'POST', body: formData, }); } catch (error) { console.error('Error uploading file:', error); } } function displayPreview(fileURL, type) { const mediaItem = document.createElement('div'); mediaItem.classList.add('media-item'); const element = type === 'video' ? document.createElement('video') : document.createElement('img'); element.src = fileURL; element.controls = type === 'video'; mediaItem.appendChild(element); const deleteButton = document.createElement('button'); deleteButton.textContent = 'Delete'; deleteButton.onclick = () => mediaItem.remove(); mediaItem.appendChild(deleteButton); preview.appendChild(mediaItem); } async function fetchSavedMedia() { try { const response = await fetch('http://localhost:3000/files'); const files = await response.json(); files.forEach(file => { displayPreview(file.url, file.type); }); } catch (error) { console.error('Error fetching media:', error); } } recordVideoButton.addEventListener('click', initCamera); startRecordingButton.addEventListener('click', startRecording); stopRecordingButton.addEventListener('click', stopRecording); takePictureButton.addEventListener('click', takePicture); window.onload = fetchSavedMedia;</script></body></html>
