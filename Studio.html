<!docktype html>
<html>
  <head>
    <title>TTP Studio</title>
    <style>
    button {
        border: none;
        background-color: teal;
        width: 150px;
        height: 60px;
        border-radius: 40px;
    }
    button:hover {
        background-color: white;
        border: teal solid 3px;
    }
    button:active {
        border: orange solid 3px;
    }
    p {
      color: teal;
    }
    </style>
  </head>
  <body>
    <h1>Welcome To TTP Studio</h1>
    <hr>
    <h4>Pick Your Own movie</h4>
    <button>Drama</button>
    <button>Comedy</button>
    <button>Violence</button>
    <br>
    <br>
    <button>Random</button>
    <button onclick="Other()">Other</button>
    <p id="P"></p>
    <script>
        function Other() {
            document.getElementById('P').innerHTML = "Please choose one!";
        }
    </script>
  </body>
</html>
