<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP studios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #preview {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    video {
      Width: 426
      height: 300px; 
      border: 1px solid black;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Select Multiple Videos (Standard Quality)</h1>
  <button id="uploadButton">Choose Files</button>
  <input type="file" id="fileInput" accept="video/*" multiple style="display: none;">
  
  <div id="preview"></div>

  <script>
    const uploadButton = document.getElementById('uploadButton');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    // Open file picker when button is clicked
    uploadButton.addEventListener('click', () => {
      fileInput.click();
    });

    // Handle file selection
    fileInput.addEventListener('change', () => {
      const files = fileInput.files;

      // Clear previous preview
      preview.innerHTML = '';

      Array.from(files).forEach(file => {
        if (file.type.startsWith('video/')) {
          const video = document.createElement('video');
          video.src = URL.createObjectURL(file);
          video.controls = true;
          video.width = 854; // Width for standard quality
          video.height = 480; // Height for standard quality
          preview.appendChild(video);
        } else {
          alert('Please select only video files.');
        }
      });
    });
  </script>
</body>
</html>
