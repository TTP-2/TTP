<!DOCTYPE html>
<html>
<head>
<title>TTP</title
<link rel="icon" href="IMG.png" type="image/png">
<style>
    h1 {
        text-align: center;
    }
    h3 {
        text-align: center;
    }
    p {
        text-align: center;
    }
    .movie {
        border: 1px solid black;
        width: 360px;
        height: 100px;
        margin: auto;
        transition: background-color 3.0s, color 3.0s;
    }
    .game {
        border: 1px solid black;
        width: 360px;
        height: 100px;
        margin: auto;
        transition: background-color 3.0s, color 3.0s;
    }
    .movie:hover {
        background-color: black;
        color: white;
        cursor: pointer;
    }
    .game:hover {
        background-color: black;
        color: white;
        cursor: pointer;
    }
    input {
        border: 1px solid black;
        border-radius: 50px;
        width: 300px;
        height: 30px;
        text-align: center;
    }
    div {
        width: 300px;
        margin: auto
    }
    button {
        border: 1px solid black;
        border-radius: 50px;
        width: 300px;
        height: 30px;
        text-align: center;
        transition: background-color 1.0s;
    }
    button:hover {
        background-color: teal;
        cursor: pointer;
    }
    img {
        width: 100px;
        height: 100px;
        border-radius: 50px;
    }
</style>
</head>
<body>
<h1>TTP studios</h1>
<hr>
<div class="movie">
    <h3>Movies</h3>
    <p>TTP makes movies, episodes and stop-motion</p>
</div>
<br>
<div class="game">
    <h3>Games</h3>
    <p>TTP also makes games 3D and 2D!</p>
</div>
<hr>
<div>
    <input type="password" placeholder="Password">
    <br>
    <br>
    <button onclick="function()">OK</button>
</div>
    <img src="IMG.jpg" alt="image">
</body>
</html>
