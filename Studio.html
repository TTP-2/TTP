<!DOCTYPE html>
<html>
<head>
<title>TTP</title>
<link rel="icon" type="icon" href="https://github.com/TTP-2/TTP/blob/main/Studio.png?raw=true">
<style>
    h1 {
        text-align: center;
    }
    h3 {
        text-align: center;
    }
    p {
        text-align: center;
    }
    h4 {
        text-align: center;
    }
    .movie {
        border: 1px solid black;
        width: 360px;
        height: 100px;
        margin: auto;
        transition: background-color 3.0s, color 3.0s;
    }
    .game {
        border: 1px solid black;
        width: 360px;
        height: 100px;
        margin: auto;
        transition: background-color 3.0s, color 3.0s;
    }
    .movie:hover {
        background-color: black;
        color: white;
        cursor: pointer;
    }
    .game:hover {
        background-color: black;
        color: white;
        cursor: pointer;
    }
    input {
        border: 1px solid black;
        border-radius: 50px;
        width: 300px;
        height: 30px;
        text-align: center;
    }
    div {
        width: 300px;
        margin: auto
    }
    button {
        border: 1px solid black;
        border-radius: 50px;
        width: 300px;
        height: 30px;
        text-align: center;
        transition: background-color 1.0s;
    }
    button:hover {
        background-color: teal;
        cursor: pointer;
    }
    a {
        color: black;
        text-decoration: none;
    }
</style>
</head>
<body>
<h1>TTP studios</h1>
<hr>
<div class="movie">
    <h3>Movies</h3>
    <p>TTP makes movies, episodes and stop-motion</p>
</div>
<br>
<div class="game">
    <h3>Games</h3>
    <p>TTP also makes games 3D and 2D!</p>
</div>
<hr>
<a href="https://ttp-2.github.io/TTP/Micro.html">
</body>
</html>
