<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTP messages</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
        #messages { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; max-height: 200px; overflow-y: auto; }
        .message { margin: 5px 0; padding: 5px; border-bottom: 1px solid #eee; }
        input { padding: 10px; width: 80%; font-size: 16px; }
    </style>
</head>
<body>
    <h1>TTP <sup>messages</sup></h1>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="Write a message..." />

    <script>
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');

        // Function to load saved messages from localStorage
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('messages')) || [];
            messagesDiv.innerHTML = messages.map(msg => `<div class="message">${msg}</div>`).join('');
        }

        // Function to save a new message to localStorage
        function saveMessage(message) {
            const messages = JSON.parse(localStorage.getItem('messages')) || [];
            messages.push(message); // Add the new message to the array
            localStorage.setItem('messages', JSON.stringify(messages)); // Save the updated array to localStorage
        }

        // Event listener for pressing Enter key
        messageInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const message = messageInput.value.trim(); // Get and trim the input
                if (message) {
                    // Display the message
                    const newMessage = document.createElement('div');
                    newMessage.classList.add('message');
                    newMessage.textContent = message;
                    messagesDiv.appendChild(newMessage);

                    // Save the message to localStorage
                    saveMessage(message);

                    // Clear the input field after submission
                    messageInput.value = '';
                }
            }
        });

        // Load messages when the page is loaded
        loadMessages();
    </script>
</body>
</html>
