
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTP Studios - Take Pictures</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #333;
      color: white;
      padding: 20px;
    }
    h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    .button-container {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .button-container button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .button-container button:hover {
      background-color: #45a049;
    }
    #videoContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }
    #preview {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .media-item {
      position: relative;
      text-align: center;
      width: 300px;
    }
    img {
      width: 300px;
      height: auto;
      border-radius: 8px;
      border: 2px solid #ddd;
      margin-bottom: 20px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }
    .name-input {
      margin-top: 20px;
      padding: 10px;
      font-size: 1rem;
      width: 200px;
      text-align: center;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    #imagePreview {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
    }
    #editor {
      width: 50%;
      height: 100%;
      border-right: 1px solid #ccc;
      padding: 10px;
      box-sizing: border-box;
    }
    #output {
      width: 50%;
      height: 100%;
      border-left: 1px solid #ccc;
      background: #f9f9f9;
      overflow: auto;
    }
    textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      font-size: 16px;
      box-sizing: border-box;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>TTP Studios - Camera Preview</h1>
  </header>
  <div class="button-container">
    <button id="startCameraButton">Start Camera</button>
    <button id="takePictureButton" style="display: none;">Take Picture</button>
  </div>

  <div id="videoContainer">
    <video id="videoElement" width="640" height="480" autoplay></video>
  </div>

  <!-- Input Box for Name -->
  <input type="text" id="nameInput" class="name-input" placeholder="Enter Name">

  <!-- Image Previews -->
  <div id="imagePreview">
    <div id="previewImages"></div>
  </div>
  <br></br>
    <div id="editor">
    <textarea id="code" placeholder="Type your HTML code here...">
    </textarea>
  </div>
  <div id="output">
    <iframe id="preview"></iframe>
  </div>

  <script>
    const startCameraButton = document.getElementById('startCameraButton');
    const takePictureButton = document.getElementById('takePictureButton');
    const videoElement = document.getElementById('videoElement');
    const previewImages = document.getElementById('previewImages');
    const nameInput = document.getElementById('nameInput');
    let currentStream;

    async function initCamera() {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
        videoElement.srcObject = currentStream;
        startCameraButton.style.display = 'none';
        takePictureButton.style.display = 'inline-block';
      } catch (error) {
        console.error('Error accessing camera:', error);
      }
    }

    function takePicture() {
      const canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 480;
      const context = canvas.getContext('2d');
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL('image/jpeg');
      saveToLocalStorage(imageData);
      displayPreview(imageData);
    }

    function saveToLocalStorage(imageData) {
      const imageArray = JSON.parse(localStorage.getItem('image')) || [];
      const name = nameInput.value || 'Anonymous';  // Use entered name, or default to 'Anonymous'
      imageArray.push({ data: imageData, name });
      localStorage.setItem('image', JSON.stringify(imageArray));
    }

    function displayPreview(imageData) {
      const mediaItem = document.createElement('div');
      mediaItem.classList.add('media-item');
      const img = document.createElement('img');
      img.src = imageData;
      mediaItem.appendChild(img);
      previewImages.appendChild(mediaItem);

      // Display name under the image
      const nameDisplay = document.createElement('p');
      const name = nameInput.value || 'Anonymous';
      nameDisplay.textContent = name;
      mediaItem.appendChild(nameDisplay);

      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.onclick = () => {
        const imageItems = JSON.parse(localStorage.getItem('image')) || [];
        const updatedItems = imageItems.filter(item => item.data !== imageData);
        localStorage.setItem('image', JSON.stringify(updatedItems));
        mediaItem.remove();
      };
      mediaItem.appendChild(deleteButton);
    }

    function loadImagesFromLocalStorage() {
      const imageArray = JSON.parse(localStorage.getItem('image')) || [];
      imageArray.forEach(item => {
        displayPreview(item.data);
      });
    }

    startCameraButton.addEventListener('click', initCamera);
    takePictureButton.addEventListener('click', takePicture);

    window.onload = loadImagesFromLocalStorage;
        const codeInput = document.getElementById('code');
    const previewFrame = document.getElementById('preview');

    // Function to update the iframe content
    function updatePreview() {
      const code = codeInput.value;
      const previewDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      previewDoc.open();
      previewDoc.write(code);
      previewDoc.close();
    }

    // Update preview on input
    codeInput.addEventListener('input', updatePreview);

    // Initial preview
    updatePreview();
  </script>
</body>
</html>
