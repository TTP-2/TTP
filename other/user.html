<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TTP talk|user</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f0f0f0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      align-items: center;
    }

    #messages {
      padding: 10px;
      flex: 1;
      overflow-y: auto;
      width: 100%;
      max-width: 400px;
    }

    .message {
      display: inline-block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 6px;
      box-shadow: 0 0 3px rgba(0,0,0,0.1);
      color: white;
    }

    #input {
      padding: 8px 12px;
      font-size: 14px;
      border: none;
      outline: none;
      width: 100%;
      max-width: 400px;
      margin: 0 auto 10px auto;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    iframe {
      width: 100%;
      max-width: 400px;
      height: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin: 0 auto 10px auto;
      background: white;
    }
  </style>
</head>
<body>
  <div id="messages"></div>
  <input id="input" type="text" placeholder="Type a message and press Enter..." />
  <iframe src="" id="chatFrame"></iframe>

  <script>
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const chatFrame = document.getElementById('chatFrame');
    let messageCount = 0;

    function getDarkBlueShade(count) {
      const base = 240; // starting at light blue
      const step = 10;
      const blueValue = Math.max(base - count * step, 60); // limit how dark it gets
      return `rgb(0, 0, ${blueValue})`;
    }

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && input.value.trim() !== '') {
        messageCount++;
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        messageDiv.textContent = input.value;
        messageDiv.style.backgroundColor = getDarkBlueShade(messageCount);
        messages.appendChild(messageDiv);
        messages.scrollTop = messages.scrollHeight;
        input.value = '';
      }
    });
  </script>
</body>
</html>
