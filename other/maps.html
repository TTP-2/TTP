<!DOCTYPE html>
<html>
<head>
  <title>TTP maps</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 100vh;
      width: 100%;
      position: relative;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .leaflet-control-attribution {
      display: none;
    }
    .custom-input {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1100;
      background: white;
      padding: 10px;
      border-radius: 50px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font-size: 16px;
      border: 1px solid #ccc;
      width: 240px;
      transition: border 0.3s ease;
    }
    .custom-input:focus {
      outline: none;
      border: none;
    }
    /* Dropdown container */
    #suggestions {
      position: absolute;
      top: 50px;
      left: 10px;
      width: 240px;
      max-height: 150px;
      overflow-y: auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 1200;
      display: none;
    }
    /* Each suggestion item */
    .suggestion-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .suggestion-item:last-child {
      border-bottom: none;
    }
    .suggestion-item:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

<div id="map"></div>

<input type="text" class="custom-input" placeholder="Search places..." id="searchInput" autocomplete="off" />
<div id="suggestions"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var map = L.map('map', {
    minZoom: 15,
    maxZoom: 20,
    zoomControl: false
  }).setView([51.505, -0.09], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '',
    minZoom: 15,
    maxZoom: 20
  }).addTo(map);

  L.control.zoom({ position: 'topright' }).addTo(map);

  var searchInput = document.getElementById('searchInput');
  var suggestions = document.getElementById('suggestions');

  var marker = null; // marker for searched place
  var locationMarker = null; // blue circle for user location

  // Function to clear suggestions
  function clearSuggestions() {
    suggestions.innerHTML = '';
    suggestions.style.display = 'none';
  }

  // Function to create and add suggestions to dropdown
  function showSuggestions(places) {
    clearSuggestions();
    if (places.length === 0) return;
    places.forEach(place => {
      var item = document.createElement('div');
      item.className = 'suggestion-item';
      item.textContent = place.display_name;
      item.addEventListener('click', () => {
        selectPlace(place);
      });
      suggestions.appendChild(item);
    });
    suggestions.style.display = 'block';
  }

  // Select place (from suggestion or enter)
  function selectPlace(place) {
    clearSuggestions();
    searchInput.value = place.display_name;

    var lat = place.lat;
    var lon = place.lon;

    // Remove old marker if exists
    if (marker) {
      map.removeLayer(marker);
    }
    // Add marker to map
    marker = L.marker([lat, lon]).addTo(map);

    // Zoom and center map on location
    map.setView([lat, lon], 15);
  }

  // Debounce helper to limit API calls
  function debounce(func, delay) {
    let timeout;
    return function(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), delay);
    };
  }

  // Fetch suggestions from Nominatim
  const fetchSuggestions = debounce(function(query) {
    if (query.length < 3) {
      clearSuggestions();
      return;
    }
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&addressdetails=1&limit=5`)
      .then(res => res.json())
      .then(data => {
        showSuggestions(data);
      })
      .catch(() => clearSuggestions());
  }, 300);

  // Listen for input typing
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    fetchSuggestions(query);
  });

  // Listen for Enter key to search first suggestion or exact typed query
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault(); // prevent form submit if any

      if (suggestions.children.length > 0) {
        // Select the first suggestion
        suggestions.children[0].click();
      } else {
        // If no suggestions, do a search by the typed query directly
        var query = searchInput.value.trim();
        if (query.length === 0) return;

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`)
          .then(res => res.json())
          .then(data => {
            if (data.length > 0) {
              selectPlace(data[0]);
            } else {
              alert('Place not found');
            }
          })
          .catch(() => alert('Error searching place'));
      }
    }
  });

  // Hide suggestions if clicking outside
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !suggestions.contains(e.target)) {
      clearSuggestions();
    }
  });

  // Geolocation: show blue circle marker for user location
  function onLocationFound(e) {
    var radius = e.accuracy / 2;

    if (locationMarker) {
      map.removeLayer(locationMarker);
    }

    locationMarker = L.circleMarker(e.latlng, {
      radius: 10,
      color: 'blue',
      fillColor: '#30f',
      fillOpacity: 0.7
    }).addTo(map);

    // Center map to user location and zoom in
    map.setView(e.latlng, 16);
  }

  function onLocationError(e) {
    console.warn('Geolocation error:', e.message);
    // Optionally show alert or fallback location here
  }

  map.on('locationfound', onLocationFound);
  map.on('locationerror', onLocationError);

  // Ask for location when page loads
  map.locate({ setView: false, maxZoom: 16, watch: false });

</script>

</body>
</html>
