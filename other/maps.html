<!DOCTYPE html>
<html>
<head>
  <title>Leaflet Map with Geolocation, Search & Autocomplete</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 100vh;
      width: 100%;
      position: relative;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .leaflet-control-attribution {
      display: none;
    }
    .custom-input {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1100;
      background: white;
      padding: 10px;
      border-radius: 50px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font-size: 16px;
      border: 1px solid #ccc;
      width: 240px;
      transition: border 0.3s ease;
    }
    .custom-input:focus {
      outline: none;
      border: none;
    }
    #suggestions {
      position: absolute;
      top: 50px;
      left: 10px;
      width: 240px;
      max-height: 150px;
      overflow-y: auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 1200;
      display: none;
    }
    .suggestion-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .suggestion-item:last-child {
      border-bottom: none;
    }
    .suggestion-item:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

<div id="map"></div>

<input type="text" class="custom-input" placeholder="Search places..." id="searchInput" autocomplete="off" />
<div id="suggestions"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var map = L.map('map', {
    minZoom: 15,
    maxZoom: 20,
    zoomControl: false
  }).setView([51.505, -0.09], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '',
    minZoom: 15,
    maxZoom: 20
  }).addTo(map);

  L.control.zoom({ position: 'topright' }).addTo(map);

  var searchInput = document.getElementById('searchInput');
  var suggestions = document.getElementById('suggestions');

  var marker = null; // current searched place marker
  var locationMarker = null; // user location marker

  // Geolocation: try to get user position and place red marker
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      var lat = position.coords.latitude;
      var lon = position.coords.longitude;

      // Create a red marker for user location
      var redIcon = L.icon({
        iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon-red.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
        shadowSize: [41, 41]
      });

      locationMarker = L.marker([lat, lon], {icon: redIcon}).addTo(map).bindPopup("You are here").openPopup();

      // Center and zoom to user location
      map.setView([lat, lon], 15);
    }, function(error) {
      console.log("Geolocation error: " + error.message);
      // keep default view if error or denied
    });
  }

  // Clear suggestions dropdown
  function clearSuggestions() {
    suggestions.innerHTML = '';
    suggestions.style.display = 'none';
  }

  // Show suggestions in dropdown
  function showSuggestions(places) {
    clearSuggestions();
    if (places.length === 0) return;
    places.forEach(place => {
      var item = document.createElement('div');
      item.className = 'suggestion-item';
      item.textContent = place.display_name;
      item.addEventListener('click', () => {
        selectPlace(place);
      });
      suggestions.appendChild(item);
    });
    suggestions.style.display = 'block';
  }

  // Select a place from search or suggestions
  function selectPlace(place) {
    clearSuggestions();
    searchInput.value = place.display_name;

    var lat = place.lat;
    var lon = place.lon;

    // Remove old searched place marker if any
    if (marker) {
      map.removeLayer(marker);
    }

    // Add new marker for searched place
    marker = L.marker([lat, lon]).addTo(map);

    // Center map to searched place
    map.setView([lat, lon], 15);
  }

  // Debounce function to limit API calls while typing
  function debounce(func, delay) {
    let timeout;
    return function(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), delay);
    };
  }

  // Fetch suggestions from Nominatim for autocomplete
  const fetchSuggestions = debounce(function(query) {
    if (query.length < 3) {
      clearSuggestions();
      return;
    }
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&addressdetails=1&limit=5`)
      .then(res => res.json())
      .then(data => {
        showSuggestions(data);
      })
      .catch(() => clearSuggestions());
  }, 300);

  // Listen to input typing
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    fetchSuggestions(query);
  });

  // Listen to Enter key press
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();

      if (suggestions.children.length > 0) {
        // Select first suggestion on Enter
        suggestions.children[0].click();
      } else {
        // If no suggestions, search typed query
        var query = searchInput.value.trim();
        if (query.length === 0) return;

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`)
          .then(res => res.json())
          .then(data => {
            if (data.length > 0) {
              selectPlace(data[0]);
            } else {
              alert('Place not found');
            }
          })
          .catch(() => alert('Error searching place'));
      }
    }
  });

  // Close suggestions if clicking outside
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !suggestions.contains(e.target)) {
      clearSuggestions();
    }
  });
</script>

</body>
</html>
