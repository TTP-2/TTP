<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time Warp Scan</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    video, canvas {
      border-radius: 12px;
      max-width: 100%;
    }

    #canvas {
      position: absolute;
    }

    .scan-line {
      position: absolute;
      width: 100%;
      height: 2px;
      background: cyan;
      animation: moveLine 5s linear forwards;
    }

    @keyframes moveLine {
      from { top: 0; }
      to { top: 100%; }
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background: cyan;
      color: black;
      border-radius: 6px;
      cursor: pointer;
    }

    .container {
      position: relative;
      width: 480px;
      height: 360px;
    }
  </style>
</head>
<body>

  <h1>Time Warp Scan</h1>

  <div class="container">
    <video id="video" width="480" height="360" autoplay muted></video>
    <canvas id="canvas" width="480" height="360"></canvas>
    <div class="scan-line" id="scanLine"></div>
  </div>

  <button onclick="startTimeWarp()">Start Time Warp Scan</button>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scanLine = document.getElementById('scanLine');

    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
      video.srcObject = stream;
    });

    function startTimeWarp() {
      const height = canvas.height;
      let y = 0;

      scanLine.style.animation = 'none';
      void scanLine.offsetWidth; // reset animation
      scanLine.style.animation = 'moveLine 5s linear forwards';

      const interval = setInterval(() => {
        ctx.drawImage(video, 0, y, canvas.width, 1, 0, y, canvas.width, 1);
        y++;
        if (y >= height) {
          clearInterval(interval);
        }
      }, 1000 / 60); // 60 lines per second = ~6s for 360px height
    }
  </script>

</body>
</html>
