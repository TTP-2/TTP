<!DOCTYPE html>
<html>
<head>
  <title>Online HTML Editor</title>
</head>
<body>
  <button id="button">Background color</button>

  <script>
    const button = document.getElementById('button');
    button.onclick = () => {
      document.body.style.backgroundColor = "lightblue";
    };
  </script>
</body>
</html>
