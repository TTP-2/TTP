<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Time Warp Scan</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .wrapper {
      position: relative;
      width: 640px;
      height: 480px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #canvas {
      z-index: 2;
    }

    #scanLine {
      position: absolute;
      width: 100%;
      height: 2px;
      background: cyan;
      z-index: 3;
      top: 0;
      display: none;
    }

    #countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      z-index: 4;
      display: none;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 18px;
      background: cyan;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .wrapper {
        width: 100vw;
        height: 75vh;
      }
    }
  </style>
</head>
<body>
  <h1>Time Warp Scan</h1>

  <div class="wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="scanLine"></div>
    <div id="countdown"></div>
  </div>

  <button onclick="startScan()">Start Scan</button>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const scanLine = document.getElementById("scanLine");
    const countdown = document.getElementById("countdown");

    navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
      video.srcObject = stream;
    });

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startScan() {
      const width = canvas.width = video.videoWidth || 640;
      const height = canvas.height = video.videoHeight || 480;
      let y = 0;

      // Clear canvas
      ctx.clearRect(0, 0, width, height);

      // Countdown
      countdown.style.display = 'block';
      for (let i = 3; i > 0; i--) {
        countdown.textContent = i;
        await sleep(1000);
      }
      countdown.style.display = 'none';

      scanLine.style.display = 'block';
      scanLine.style.top = '0px';

      // Perform scan line by line
      const interval = setInterval(() => {
        if (y >= height) {
          clearInterval(interval);
          scanLine.style.display = 'none';
          return;
        }

        // Draw only the 1-pixel row at current scan line
        ctx.drawImage(video, 0, y, width, 1, 0, y, width, 1);
        scanLine.style.top = `${y}px`;
        y++;
      }, 10); // Controls speed of scan
    }
  </script>
</body>
</html>
