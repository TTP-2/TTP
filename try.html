<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pitch to Binary Letter</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      user-select: none;
      color: green;
      font-family: monospace;
      overflow-wrap: break-word;
      padding: 10px;
    }
    .center-line {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background-color: green;
      transform: translateX(-1px);
      z-index: 10;
    }
    .mic-button, .translate-button {
      position: fixed;
      bottom: 10px;
      padding: 10px 15px;
      background-color: black;
      color: green;
      border: 1px solid green;
      cursor: pointer;
      font-size: 16px;
      z-index: 20;
      user-select: none;
    }
    .mic-button {
      right: 10px;
    }
    .translate-button {
      right: 130px;
    }
    #textInput {
      position: fixed;
      bottom: 60px;
      right: 10px;
      width: 300px;
      padding: 8px;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid green;
      background-color: black;
      color: green;
      outline: none;
      z-index: 20;
    }
    .bottom-line {
      position: fixed;
      height: 2px;
      background-color: green;
      bottom: 100px;
      left: 50%;
      right: 0;
      z-index: 10;
    }
    #outputText {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 12px;
      line-height: 1.2;
      color: limegreen;
      white-space: pre-wrap;
      max-width: 45vw;
      max-height: 90vh;
      overflow-y: auto;
      z-index: 15;
      user-select: text;
    }
  </style>
</head>
<body>
  <input type="text" id="textInput" placeholder="Type sentence and press Enter" autocomplete="off" />
  <button class="mic-button" id="micButton">Start Mic</button>
  <button class="translate-button" id="translateButton">Translate</button>
  <div class="center-line"></div>
  <div class="bottom-line"></div>

  <pre id="outputText"></pre>

  <script>
    const letterToCode = {
      A: "01", B: "10", C: "11", D: "00",
      E: "01", F: "10", G: "11", H: "00",
      I: "01", J: "10", K: "11", L: "00",
      M: "01", N: "10", O: "11", P: "00",
      Q: "01", R: "10", S: "11", T: "00",
      U: "01", V: "10", W: "11", X: "00",
      Y: "01", Z: "10",
      " ": "00"
    };

    // Inverse map: code to letter, first found wins for duplicates
    const codeToLetter = {};
    for (const [letter, code] of Object.entries(letterToCode)) {
      if (!(code in codeToLetter)) {
        codeToLetter[code] = letter;
      }
    }

    // Pitch ranges for letters, 30 Hz steps from 100 Hz up, for simplicity
    const letterPitchRanges = {};
    const baseFreq = 100;
    const step = 30;
    const letters = Object.keys(letterToCode);
    letters.forEach((letter, i) => {
      letterPitchRanges[letter] = [baseFreq + i * step, baseFreq + (i + 1) * step];
    });

    const outputText = document.getElementById('outputText');
    const micButton = document.getElementById('micButton');
    const translateButton = document.getElementById('translateButton');
    const textInput = document.getElementById('textInput');

    let audioContext;
    let analyserNode;
    let microphoneStream;
    let dataArray;
    let rafId;

    micButton.onclick = () => {
      if (audioContext) {
        stopMic();
        micButton.textContent = 'Start Mic';
      } else {
        startMic();
        micButton.textContent = 'Stop Mic';
      }
    };

    translateButton.onclick = () => {
      const codes = outputText.textContent.trim().split(/\s+/);
      let translated = '';
      for (const code of codes) {
        translated += (codeToLetter[code] || '?');
      }
      alert("Translated text:\n" + translated);
    };

    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        playTextPitches(textInput.value.toUpperCase());
        textInput.value = '';
      }
    });

    async function startMic() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("Microphone access not supported.");
        return;
      }
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      microphoneStream = audioContext.createMediaStreamSource(stream);
      analyserNode = audioContext.createAnalyser();
      analyserNode.fftSize = 2048;
      microphoneStream.connect(analyserNode);
      dataArray = new Float32Array(analyserNode.fftSize);

      detectPitch();
    }

    function stopMic() {
      if (microphoneStream) microphoneStream.disconnect();
      if (analyserNode) analyserNode.disconnect();
      if (audioContext) audioContext.close();
      audioContext = null;
      cancelAnimationFrame(rafId);
    }

    function autoCorrelate(buffer, sampleRate) {
      let SIZE = buffer.length;
      let rms = 0;
      for (let i = 0; i < SIZE; i++) {
        let val = buffer[i];
        rms += val * val;
      }
      rms = Math.sqrt(rms / SIZE);
      if (rms < 0.01) return -1;

      let r1 = 0, r2 = SIZE - 1, threshold = 0.2;
      for (let i = 0; i < SIZE / 2; i++) {
        if (Math.abs(buffer[i]) < threshold) {
          r1 = i;
          break;
        }
      }
      for (let i = 1; i < SIZE / 2; i++) {
        if (Math.abs(buffer[SIZE - i]) < threshold) {
          r2 = SIZE - i;
          break;
        }
      }

      buffer = buffer.slice(r1, r2);
      SIZE = buffer.length;

      let c = new Array(SIZE).fill(0);
      for (let lag = 0; lag < SIZE; lag++) {
        for (let i = 0; i < SIZE - lag; i++) {
          c[lag] = c[lag] + buffer[i] * buffer[i + lag];
        }
      }

      let d = 0;
      while (c[d] > c[d + 1]) d++;
      let maxPos = d;
      let maxVal = -1;
      for (let i = d; i < SIZE; i++) {
        if (c[i] > maxVal) {
          maxVal = c[i];
          maxPos = i;
        }
      }

      let T0 = maxPos;

      let x1 = c[T0 - 1];
      let x2 = c[T0];
      let x3 = c[T0 + 1];
      let a = (x1 + x3 - 2 * x2) / 2;
      let b = (x3 - x1) / 2;
      if (a)
        T0 = T0 - b / (2 * a);

      let freq = sampleRate / T0;
      if (freq > 1000 || freq < 80) return -1;
      return freq;
    }

    function detectPitch() {
      analyserNode.getFloatTimeDomainData(dataArray);
      const pitch = autoCorrelate(dataArray, audioContext.sampleRate);

      if (pitch !== -1) {
        let detectedLetter = null;
        for (const [letter, [low, high]] of Object.entries(letterPitchRanges)) {
          if (pitch >= low && pitch < high) {
            detectedLetter = letter;
            break;
          }
        }
        if (detectedLetter) {
          const code = letterToCode[detectedLetter];
          outputText.textContent += code + " ";
          outputText.scrollTop = outputText.scrollHeight;
        }
      }
      rafId = requestAnimationFrame(detectPitch);
    }

    async function playTextPitches(text) {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      for (const char of text) {
        const freq = getFrequencyForLetter(char);
        if (freq) {
          await playTone(freq, 500);
          await sleep(100);
        }
      }
    }

    function getFrequencyForLetter(letter) {
      // Map letter to baseFreq + index*step, same as detection
      const idx = letters.indexOf(letter);
      if (idx >= 0) {
        return baseFreq + idx * step + step / 2; // center freq in the range
      }
      return null;
    }

    function playTone(frequency, duration) {
      return new Promise(resolve => {
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        osc.type = 'sine';
        osc.frequency.value = frequency;

        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime); // volume

        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);

        osc.start();
        setTimeout(() => {
          osc.stop();
          resolve();
        }, duration);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
