<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTP - AI Projects</title>
    <style>
        /* Same CSS as before */
        .styled-input {
            padding: 12px 20px;
            font-size: 16px;
            width: 100%;
            max-width: 400px;
            margin: 10px 0;
            border: 2px solid #008080;
            border-radius: 8px;
            background-color: #f4f4f4;
            color: #333;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .styled-input:focus {
            border-color: #00cccc;
            outline: none;
            background-color: #e0f7f7;
            box-shadow: 0 4px 8px rgba(0, 204, 204, 0.5);
        }
    </style>
</head>
<body>
    <footer>
        <div class="container" style="text-align: center;">
            <h3>Stay in Touch</h3>
            <input type="text" id="bottomInput" placeholder="Type your message..." class="styled-input" onkeydown="checkEnter(event)">
        </div>
    </footer>

    <script>
        function checkEnter(event) {
            if (event.key === 'Enter') {
                const userInput = document.getElementById('bottomInput').value;
                if (userInput.trim()) {
                    // Redirect to another website with the input value
                    window.location.href = `anotherpage.html?input=${encodeURIComponent(userInput)}`;
                }
            }
        }
    </script>
</body>
</html>
