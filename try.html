<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Te Ao Mārama School - 3D Model</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Basic Ground
    const groundGeometry = new THREE.PlaneGeometry(500, 500);
    const groundMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = - Math.PI / 2;
    scene.add(ground);

    // Building 1 - Rectangular Block
    function createBuilding(x, y, z, width, height, depth, color) {
      const geometry = new THREE.BoxGeometry(width, height, depth);
      const material = new THREE.MeshBasicMaterial({ color: color });
      const building = new THREE.Mesh(geometry, material);
      building.position.set(x, y, z);
      scene.add(building);
    }

    createBuilding(0, 5, 0, 50, 20, 30, 0x00ffcc); // Main Building
    createBuilding(60, 5, 0, 30, 20, 30, 0xccccff); // Side Building
    createBuilding(-60, 5, 0, 30, 20, 30, 0xffcc00); // Another Side Building

    // Courtyard - Empty Space in the Middle
    const courtyardGeometry = new THREE.PlaneGeometry(100, 100);
    const courtyardMaterial = new THREE.MeshBasicMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });
    const courtyard = new THREE.Mesh(courtyardGeometry, courtyardMaterial);
    courtyard.rotation.x = - Math.PI / 2;
    courtyard.position.set(0, 0.1, 0);
    scene.add(courtyard);

    // Camera Position
    camera.position.set(0, 10, 100);

    // Basic Lighting
    const light = new THREE.PointLight(0xffffff, 1, 1000);
    light.position.set(0, 50, 50);
    scene.add(light);

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    animate();

    // Handling Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
