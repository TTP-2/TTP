<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Movement with Camera Rotation</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
  <script>
    const socket = io();

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Camera movement variables
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let cameraRotationY = 0;
    let isNearHouse = false;

    // Create a simple ground and house
    createGround(0, 0, 0x00ff00);
    const housePosition = { x: 15, z: 0 };
    const house = createHouse(housePosition.x, housePosition.z);

    camera.position.set(0, 2, 5);

    // Mouse movement for camera rotation
    let mouseX = 0;
    let mouseY = 0;
    let prevMouseX = 0;

    // Handle mouse movement for camera rotation
    document.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX / window.innerWidth) * 2 - 1; // Normalize the mouse position (-1 to 1)
      cameraRotationY = (mouseX - prevMouseX) * Math.PI; // Calculate rotation amount
      prevMouseX = mouseX;
    });

    // Create ground
    function createGround(x, z, color) {
      const geometry = new THREE.PlaneGeometry(100, 100);
      const material = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(geometry, material);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(x, 0, z);
      scene.add(plane);
    }

    // Create a simple house
    function createHouse(x, z) {
      const houseGroup = new THREE.Group();

      // Walls of the house
      const wallGeometry = new THREE.BoxGeometry(10, 6, 10);
      const wallMaterial = new THREE.MeshBasicMaterial({ color: 0x8B4513 }); // Brown color
      const walls = new THREE.Mesh(wallGeometry, wallMaterial);
      walls.position.set(x, 3, z);
      scene.add(walls);

      // Roof of the house
      const roofGeometry = new THREE.ConeGeometry(7, 4, 4);
      const roofMaterial = new THREE.MeshBasicMaterial({ color: 0xB22222 }); // Firebrick color
      const roof = new THREE.Mesh(roofGeometry, roofMaterial);
      roof.position.set(x, 7, z);
      roof.rotation.y = Math.PI / 4; // Make the roof slanted
      scene.add(roof);

      // Door of the house
      const doorGeometry = new THREE.BoxGeometry(2, 4, 1);
      const doorMaterial = new THREE.MeshBasicMaterial({ color: 0x3e2723 }); // Dark brown
      const door = new THREE.Mesh(doorGeometry, doorMaterial);
      door.position.set(x, 2, z + 5);
      scene.add(door);

      return houseGroup;
    }

    // Teleport to the house
    function checkProximityToHouse() {
      const distance = Math.sqrt(
        Math.pow(camera.position.x - housePosition.x, 2) +
        Math.pow(camera.position.z - housePosition.z, 2)
      );
      isNearHouse = distance < 5; // Adjust the range for proximity
    }

    // Keyboard controls for movement
    document.addEventListener('keydown', (event) => {
      if (event.code === 'KeyW') moveForward = true;
      if (event.code === 'KeyS') moveBackward = true;
      if (event.code === 'KeyA') moveLeft = true;
      if (event.code === 'KeyD') moveRight = true;
      if (event.code === 'KeyY' && isNearHouse) {
        camera.position.set(housePosition.x, 2, housePosition.z + 5); // Teleport to the house's entrance
      }
    });

    document.addEventListener('keyup', (event) => {
      if (event.code === 'KeyW') moveForward = false;
      if (event.code === 'KeyS') moveBackward = false;
      if (event.code === 'KeyA') moveLeft = false;
      if (event.code === 'KeyD') moveRight = false;
    });

    // Update the camera position based on user input
    function updateCameraPosition() {
      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      direction.y = 0;
      direction.normalize();

      const rightVector = new THREE.Vector3();
      camera.getWorldDirection(rightVector);
      rightVector.y = 0;
      rightVector.cross(new THREE.Vector3(0, 1, 0)).normalize();

      // Apply movement based on keyboard input
      if (moveForward) camera.position.addScaledVector(direction, 0.1);
      if (moveBackward) camera.position.addScaledVector(direction, -0.1);
      if (moveLeft) camera.position.addScaledVector(rightVector, -0.1);
      if (moveRight) camera.position.addScaledVector(rightVector, 0.1);

      // Apply rotation based on mouse movement
      camera.rotation.y += cameraRotationY;
    }

    // Animate the scene
    function animate() {
      requestAnimationFrame(animate);

      // Check if player is near the house
      checkProximityToHouse();

      // Update the camera position
      updateCameraPosition();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
