<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minecraft-like Game with Babylon.js</title>
    <style>
        body { margin: 0; }
        canvas { width: 100%; height: 100%; display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="info">
        <p>Controls:</p>
        <p>WASD: Move</p>
        <p>Space: Jump</p>
        <p>Left Click: Remove Block</p>
        <p>Right Click: Place Block</p>
    </div>
    <canvas id="renderCanvas"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        function createScene() {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.5, 0.8, 1, 1);

            // Camera
            const camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 5, -10), scene);
            camera.setTarget(BABYLON.Vector3.Zero());
            camera.attachControl(canvas, true);
            camera.speed = 0.5;
            camera.angularSensibility = 3000;
            camera.applyGravity = true;
            camera.ellipsoid = new BABYLON.Vector3(0.5, 1, 0.5);
            scene.collisionsEnabled = true;
            camera.checkCollisions = true;

            // Lighting
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // Ground material
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.8, 0.2);

            // Block material
            const blockMat = new BABYLON.StandardMaterial("blockMat", scene);
            blockMat.diffuseColor = new BABYLON.Color3(0.6, 0.4, 0.2);

            // World parameters
            const worldSize = 16;
            const worldHeight = 8;
            const blocks = {};

            // Generate terrain
            for (let x = -worldSize / 2; x < worldSize / 2; x++) {
                for (let z = -worldSize / 2; z < worldSize / 2; z++) {
                    const height = Math.floor(Math.sin(x * 0.1) + Math.cos(z * 0.1) * 2 + 4);
                    for (let y = 0; y < height; y++) {
                        const key = `${x},${y},${z}`;
                        const block = BABYLON.MeshBuilder.CreateBox(key, { size: 1 }, scene);
                        block.position = new BABYLON.Vector3(x, y, z);
                        block.material = y === height - 1 ? groundMat : blockMat;
                        block.checkCollisions = true;
                        blocks[key] = block;
                    }
                }
            }

            // Player interaction
            scene.onPointerDown = (evt) => {
                if (evt.button === 0 || evt.button === 2) {
                    const pickResult = scene.pick(scene.pointerX, scene.pointerY);
                    if (pickResult.hit) {
                        const pickedPoint = pickResult.pickedPoint;
                        const normal = pickResult.getNormal(true);
                        const blockPos = new BABYLON.Vector3(
                            Math.round(pickedPoint.x - normal.x * 0.5),
                            Math.round(pickedPoint.y - normal.y * 0.5),
                            Math.round(pickedPoint.z - normal.z * 0.5)
                        );

                        if (evt.button === 0) {
                            // Remove block
                            const key = `${blockPos.x},${blockPos.y},${blockPos.z}`;
                            if (blocks[key]) {
                                blocks[key].dispose();
                                delete blocks[key];
                            }
                        } else if (evt.button === 2) {
                            // Place block
                            const newPos = blockPos.add(normal);
                            const key = `${newPos.x},${newPos.y},${newPos.z}`;
                            if (!blocks[key]) {
                                const block = BABYLON.MeshBuilder.CreateBox(key, { size: 1 }, scene);
                                block.position = newPos;
                                block.material = blockMat;
                                block.checkCollisions = true;
                                blocks[key] = block;
                            }
                        }
                    }
                }
            };

            // Simple physics for jumping
            let isJumping = false;
            scene.onKeyboardObservable.add((kbInfo) => {
                if (kbInfo.type === BABYLON.KeyboardEventTypes.KEYDOWN) {
                    if (kbInfo.event.key === " " && !isJumping) {
                        camera.cameraDirection.y += 0.5;
                        isJumping = true;
                        setTimeout(() => { isJumping = false; }, 500);
                    }
                }
            });

            return scene;
        }

        const scene = createScene();
        engine.runRenderLoop(() => {
            scene.render();
        });

        window.addEventListener("resize", () => {
            engine.resize();
        });
    </script>
</body>
</html>
