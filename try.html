<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple 3D Game - Minecraft Style</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
  <script>
    const socket = io();
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    let isDay = true;
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    const moon = new THREE.PointLight(0xaaaaaa, 1, 200);
    moon.position.set(-50, 100, -50);
    moon.visible = false;
    scene.add(moon);

    function updateSky() {
      if (isDay) {
        scene.background = new THREE.Color(0x87CEEB);
        sun.visible = true;
        moon.visible = false;
      } else {
        scene.background = new THREE.Color(0x000000);
        sun.visible = false;
        moon.visible = true;
      }
    }

    function toggleDayNight() {
      isDay = !isDay;
      updateSky();
      setTimeout(toggleDayNight, 300000);
    }

    updateSky();
    setTimeout(toggleDayNight, 300000);

    function createGround(x, z, color) {
      const geometry = new THREE.PlaneGeometry(100, 100);
      const material = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(geometry, material);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(x, 0, z);
      scene.add(plane);
    }

    // Creating grass, sand, and water areas
    for (let i = -2; i <= 2; i++) {
      for (let j = -2; j <= 2; j++) {
        const isWater = j > 1;
        const isSand = j === 1;
        createGround(i * 100, j * 100, isWater ? 0x0000ff : isSand ? 0xFFD700 : 0x00ff00);
      }
    }

    // Create water plane
    const waterGeometry = new THREE.PlaneGeometry(100, 100);
    const waterMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 });
    const water = new THREE.Mesh(waterGeometry, waterMaterial);
    water.rotation.x = -Math.PI / 2;
    water.position.set(0, 0.1, 100); // Slightly above ground
    scene.add(water);

    // Function to create a fish model (represented by spheres for simplicity)
    function createFish(x, y, z) {
      const geometry = new THREE.SphereGeometry(1, 6, 6);
      const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
      const fish = new THREE.Mesh(geometry, material);
      fish.position.set(x, y, z);
      scene.add(fish);
      return fish;
    }

    // Create fish under the water
    const fishGroup = [];
    for (let i = 0; i < 5; i++) {
      const fish = createFish(Math.random() * 50 - 25, -2, Math.random() * 50 - 25); // Random positions under water
      fishGroup.push(fish);
    }

    // Function to simulate the water depth effect
    function updateWaterDepth() {
      // Check if the camera is underwater
      if (camera.position.y < 0) {
        // Make the camera appear deeper in the water
        camera.position.y = Math.max(camera.position.y, -5); // Limit max depth
      }
    }

    // Camera setup
    camera.position.set(0, 2, 5);
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let cameraRotationY = 0;

    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyD': moveRight = true; break;
        case 'ArrowLeft': cameraRotationY = 0.05; break;
        case 'ArrowRight': cameraRotationY = -0.05; break;
      }
    });

    document.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyD': moveRight = false; break;
        case 'ArrowLeft':
        case 'ArrowRight': cameraRotationY = 0; break;
      }
    });

    const players = {};

    socket.on('updatePlayers', (serverPlayers) => {
      for (let id in serverPlayers) {
        if (!players[id]) {
          const cube = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
          );
          scene.add(cube);
          players[id] = cube;
        }
        players[id].position.set(
          serverPlayers[id].x,
          serverPlayers[id].y,
          serverPlayers[id].z
        );
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      direction.y = 0;
      direction.normalize();

      const rightVector = new THREE.Vector3();
      camera.getWorldDirection(rightVector);
      rightVector.y = 0;
      rightVector.cross(new THREE.Vector3(0, 1, 0)).normalize();

      if (moveForward) camera.position.addScaledVector(direction, 0.1);
      if (moveBackward) camera.position.addScaledVector(direction, -0.1);
      if (moveLeft) camera.position.addScaledVector(rightVector, -0.1);
      if (moveRight) camera.position.a
