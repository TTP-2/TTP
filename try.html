<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minecraft-like Game with Babylon.js</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100vh; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
        }
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px;
            border: 2px solid gray;
        }
        .hotbar-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #555;
            margin: 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        .hotbar-slot.selected {
            border-color: yellow;
        }
        #inventory {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            display: none;
            color: white;
            font-family: Arial, sans-serif;
            border: 2px solid gray;
            max-height: 80vh;
            overflow-y: auto;
        }
        .inventory-slot {
            width: 60px;
            height: 60px;
            border: 2px solid #555;
            margin: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px;
        }
        #inventory-search {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
            background: #333;
            color: white;
            border: 1px solid #555;
        }
    </style>
</head>
<body>
    <div id="ui">
        Left-click: Break block<br>
        Right-click: Place block<br>
        E: Toggle Inventory<br>
        1-4: Select Hotbar Slot<br>
        Space: Jump
    </div>
    <div id="hotbar">
        <div class="hotbar-slot selected" data-index="0">Dirt</div>
        <div class="hotbar-slot" data-index="1">Stone</div>
        <div class="hotbar-slot" data-index="2">Grass</div>
        <div class="hotbar-slot" data-index="3">Sand</div>
    </div>
    <div id="inventory">
        <h2>Inventory</h2>
        <input type="text" id="inventory-search" placeholder="Search blocks...">
        <div id="inventory-slots"></div>
    </div>
    <canvas id="renderCanvas"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/ammo.js"></script>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        function createScene() {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.5, 0.8, 1, 1);

            // Enable physics
            scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), new BABYLON.AmmoJSPlugin());

            // Camera
            const camera = new BABYLON.FreeCamera("camera", new BABYLON.Vector3(0, 5, -10), scene);
            camera.setTarget(BABYLON.Vector3.Zero());
            camera.attachControl(canvas, true);
            camera.speed = 0.2;
            camera.angularSensibility = 4000;
            camera.ellipsoid = new BABYLON.Vector3(0.5, 1, 0.5);
            camera.checkCollisions = true;
            camera.applyGravity = true;

            // Lighting
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // Block types and materials
            const blockTypes = [
                'dirt', 'stone', 'grass', 'sand', 'wood', 'coal', 'iron', 'gold', 'diamond', 'redstone',
                'clay', 'gravel', 'obsidian', 'brick', 'cobblestone'
            ];
            const materials = {};
            blockTypes.forEach(type => {
                materials[type] = new BABYLON.StandardMaterial(`${type}Mat`, scene);
            });
            materials.dirt.diffuseColor = new BABYLON.Color3(0.5, 0.3, 0.1);
            materials.stone.diffuseColor = new BABYLON.Color3(0.4, 0.4, 0.4);
            materials.grass.diffuseColor = new BABYLON.Color3(0.2, 0.6, 0.2);
            materials.sand.diffuseColor = new BABYLON.Color3(0.8, 0.7, 0.4);
            materials.wood.diffuseColor = new BABYLON.Color3(0.6, 0.4, 0.2);
            materials.coal.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);
            materials.iron.diffuseColor = new BABYLON.Color3(0.7, 0.7, 0.7);
            materials.gold.diffuseColor = new BABYLON.Color3(0.9, 0.7, 0.2);
            materials.diamond.diffuseColor = new BABYLON.Color3(0.3, 0.8, 0.8);
            materials.redstone.diffuseColor = new BABYLON.Color3(0.8, 0.1, 0.1);
            materials.clay.diffuseColor = new BABYLON.Color3(0.6, 0.5, 0.5);
            materials.gravel.diffuseColor = new BABYLON.Color3(0.5, 0.5, 0.5);
            materials.obsidian.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.2);
            materials.brick.diffuseColor = new BABYLON.Color3(0.7, 0.3, 0.2);
            materials.cobblestone.diffuseColor = new BABYLON.Color3(0.3, 0.3, 0.3);

            // Generate terrain
            const worldSize = 20;
            const blocks = [];
            for (let x = -worldSize / 2; x < worldSize / 2; x++) {
                for (let z = -worldSize / 2; z < worldSize / 2; z++) {
                    const height = Math.floor(Math.sin(x * 0.1) + Math.cos(z * 0.1) + 2);
                    for (let y = 0; y < height; y++) {
                        const block = BABYLON.MeshBuilder.CreateBox(`block_${x}_${y}_${z}`, { size: 1 }, scene);
                        block.position = new BABYLON.Vector3(x, y, z);
                        block.material = y === height - 1 ? materials.grass : materials.stone;
                        block.checkCollisions = true;
                        block.physicsImpostor = new BABYLON.PhysicsImpostor(
                            block,
                            BABYLON.PhysicsImpostor.BoxImpostor,
                            { mass: 0, restitution: 0 },
                            scene
                        );
                        blocks.push(block);
                    }
                }
            }

            // Add physics to camera
            camera.physicsImpostor = new BABYLON.PhysicsImpostor(
                camera,
                BABYLON.PhysicsImpostor.SphereImpostor,
                { mass: 1, restitution: 0 },
                scene
            );

            // Hotbar and Inventory
            let selectedHotbarIndex = 0;
            const hotbarSlots = document.querySelectorAll('.hotbar-slot');
            const inventoryDiv = document.getElementById('inventory');
            const inventorySlotsDiv = document.getElementById('inventory-slots');
            const searchInput = document.getElementById('inventory-search');
            let isInventoryOpen = false;

            function updateHotbarSelection() {
                hotbarSlots.forEach((slot, index) => {
                    slot.classList.toggle('selected', index === selectedHotbarIndex);
                });
            }

            function updateInventory(searchTerm = '') {
                inventorySlotsDiv.innerHTML = '';
                blockTypes
                    .filter(type => type.toLowerCase().includes(searchTerm.toLowerCase()))
                    .forEach(type => {
                        const slot = document.createElement('div');
                        slot.className = 'inventory-slot';
                        slot.textContent = type.charAt(0).toUpperCase() + type.slice(1);
                        slot.addEventListener('click', () => {
                            // Replace first hotbar slot with clicked block
                            hotbarSlots[0].textContent = type.charAt(0).toUpperCase() + type.slice(1);
                            selectedHotbarIndex = 0;
                            updateHotbarSelection();
                        });
                        inventorySlotsDiv.appendChild(slot);
                    });
            }

            // Initial inventory population
            updateInventory();

            // Search functionality
            searchInput.addEventListener('input', () => {
                updateInventory(searchInput.value);
            });

            // Block interaction
            scene.onPointerDown = (evt) => {
                if (isInventoryOpen) return;
                const pickResult = scene.pick(scene.pointerX, scene.pointerY);
                if (pickResult.hit && pickResult.pickedMesh.name.startsWith("block_")) {
                    const mesh = pickResult.pickedMesh;
                    if (evt.button === 0) { // Left-click: Break block
                        mesh.dispose();
                        blocks.splice(blocks.indexOf(mesh), 1);
                    } else if (evt.button === 2) { // Right-click: Place block
                        const normal = pickResult.getNormal(true);
                        const newPos = pickResult.pickedPoint.add(normal);
                        newPos.x = Math.round(newPos.x);
                        newPos.y = Math.round(newPos.y);
                        newPos.z = Math.round(newPos.z);
                        const newBlock = BABYLON.MeshBuilder.CreateBox(`block_${newPos.x}_${newPos.y}_${newPos.z}`, { size: 1 }, scene);
                        newBlock.position = newPos;
                        newBlock.material = materials[blockTypes[selectedHotbarIndex]];
                        newBlock.checkCollisions = true;
                        newBlock.physicsImpostor = new BABYLON.PhysicsImpostor(
                            newBlock,
                            BABYLON.PhysicsImpostor.BoxImpostor,
                            { mass: 0, restitution: 0 },
                            scene
                        );
                        blocks.push(newBlock);
                    }
                }
            };

            // Keyboard controls
            document.addEventListener('keydown', (evt) => {
                if (evt.key === 'e' || evt.key === 'E') {
                    isInventoryOpen = !isInventoryOpen;
                    inventoryDiv.style.display = isInventoryOpen ? 'block' : 'none';
                    searchInput.focus();
                    scene.activeCamera.detachControl(canvas);
                    if (!isInventoryOpen) {
                        scene.activeCamera.attachControl(canvas, true);
                        engine.enterPointerlock();
                    }
                } else if (!isInventoryOpen && evt.key >= '1' && evt.key <= '4') {
                    selectedHotbarIndex = parseInt(evt.key) - 1;
                    updateHotbarSelection();
                } else if (!isInventoryOpen && evt.key === ' ' && camera.position.y <= camera.position.y + 0.1) {
                    // Jump by applying upward impulse
                    camera.physicsImpostor.applyImpulse(new BABYLON.Vector3(0, 5, 0), camera.position);
                    evt.preventDefault(); // Prevent scrolling
                }
            });

            // Lock pointer for FPS controls
            canvas.addEventListener("click", () => {
                if (!isInventoryOpen) {
                    engine.enterPointerlock();
                }
            });

            // Initialize hotbar
            updateHotbarSelection();

            return scene;
        }

        const scene = createScene();

        engine.runRenderLoop(() => {
            scene.render();
        });

        window.addEventListener("resize", () => {
            engine.resize();
        });
    </script>
</body>
</html>
