<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waving Face and Hand</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #008080;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
        }

        #videoElement {
            transform: scaleX(-1);
            width: 100%;
            height: auto;
        }

        .ai-face {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: transparent;
            z-index: 2;
            transition: transform 0.5s ease;
        }

        .eye {
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 50%;
            position: absolute;
            transition: transform 0.3s ease;
        }

        #left-eye {
            left: 40px;
            top: 50px;
        }

        #right-eye {
            right: 40px;
            top: 50px;
        }

        .mouth {
            width: 50px;
            height: 20px;
            background-color: #333;
            border-radius: 50%;
            position: absolute;
            bottom: 30px;
            transition: all 0.3s ease;
        }

        #hand {
            position: absolute;
            top: 60%;
            left: 60%;
            width: 80px;
            height: 80px;
            background-image: url('https://image.shutterstock.com/image-vector/hand-gesture-sign-isolated-on-white-260nw-1613142457.jpg');
            background-size: cover;
            animation: wave 1s infinite alternate;
            display: none; /* Initially hidden */
        }

        @keyframes wave {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
            100% { transform: rotate(0deg); }
        }

    </style>
</head>
<body>
    <div class="container">
        <video id="videoElement" autoplay></video>
        <div class="ai-face">
            <div class="eye" id="left-eye"></div>
            <div class="eye" id="right-eye"></div>
            <div class="mouth" id="mouth"></div>
        </div>
        <div id="hand"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <script>
        const video = document.getElementById('videoElement');
        const hand = document.getElementById('hand');
        const aiFace = document.querySelector('.ai-face');

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: true
            });
            video.srcObject = stream;
        }

        async function detectFace() {
            await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('/models');

            const detections = await faceapi.detectAllFaces(video)
                .withFaceLandmarks()
                .withFaceDescriptors();

            if (detections.length > 0) {
                // If the face is detected, adjust the AI face accordingly
                const { align } = detections[0].landmarks;
                aiFace.style.transform = `translate(-50%, -50%)`;
            }

            requestAnimationFrame(detectFace);
        }

        async function checkForWave() {
            // Here you would implement a hand detection or gesture recognition logic
            // For now, we'll just simulate it by toggling the wave animation

            // If wave detected (for testing, we'll toggle this every 3 seconds)
            setInterval(() => {
                hand.style.display = 'block'; // Show hand
            }, 3000); // Display hand every 3 seconds

            setInterval(() => {
                hand.style.display = 'none'; // Hide hand after 3 seconds
            }, 3500); // Hide hand after 3.5 seconds
        }

        // Initialize
        setupCamera().then(() => {
            detectFace();
            checkForWave();
        });

    </script>
</body>
</html>
