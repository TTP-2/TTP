<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>White Platform</title>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);

    const createScene = function () {
      const scene = new BABYLON.Scene(engine);

      const camera = new BABYLON.FreeCamera("camera1", new BABYLON.Vector3(0, 5, -10), scene);
      camera.setTarget(BABYLON.Vector3.Zero());
      camera.attachControl(canvas, true);

      const light = new BABYLON.HemisphericLight("light1", new BABYLON.Vector3(0, 1, 0), scene);
      light.intensity = 0.9;

      const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 1000, height: 1000}, scene);
      const groundMaterial = new BABYLON.StandardMaterial("groundMat", scene);
      groundMaterial.diffuseColor = new BABYLON.Color3(1, 1, 1); // white
      ground.material = groundMaterial;

      // Sky dome with single image
      const skyDome = BABYLON.MeshBuilder.CreateSphere("skyDome", {diameter: 1000, sideOrientation: BABYLON.Mesh.BACKSIDE}, scene);
      const skyMaterial = new BABYLON.StandardMaterial("skyMat", scene);
      skyMaterial.diffuseTexture = new BABYLON.Texture("sky.png", scene);
      skyMaterial.emissiveColor = new BABYLON.Color3(1, 1, 1); // full brightness
      skyMaterial.backFaceCulling = false;
      skyDome.material = skyMaterial;

      return scene;
    };

    const scene = createScene();
    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());
  </script>
</body>
</html>
