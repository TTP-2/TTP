<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Line Mask</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #eee;
        }
        canvas {
            position: absolute;
        }
    </style>
</head>
<body>
    <video id="video" width="640" height="480" autoplay muted></video>
    <canvas id="overlay"></canvas>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');

        // Load face-api.js models
        async function loadModels() {
            await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
            startVideo();
        }

        // Start the video
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then((stream) => {
                    video.srcObject = stream;
                    video.play();
                });
        }

        // Detect faces and draw lines
        video.addEventListener('play', async () => {
            overlay.width = video.width;
            overlay.height = video.height;

            while (true) {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks();
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                if (detections.length > 0) {
                    detections.forEach((detection) => {
                        const landmarks = detection.landmarks.positions;

                        // Draw lines from mouth to nose
                        drawLinesBetweenPoints(landmarks[48], landmarks[33]); // Mouth to Nose
                        drawLinesBetweenPoints(landmarks[54], landmarks[33]); // Other side of mouth to nose

                        // You can add more lines or customize this as needed
                    });
                }
                await faceapi.tf.nextFrame();
            }
        });

        // Function to draw lines
        function drawLinesBetweenPoints(point1, point2) {
            ctx.beginPath();
            ctx.moveTo(point1.x, point1.y);
            ctx.lineTo(point2.x, point2.y);
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Load models and start the video
        loadModels();
    </script>
</body>
</html>
