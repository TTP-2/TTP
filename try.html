<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple 3D Game - Minecraft Style</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
  <script>
    const socket = io();

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Sun as a circle
    const sunGeometry = new THREE.SphereGeometry(10, 32, 32);
    const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    sun.position.set(50, 50, 50); // Position the sun
    scene.add(sun);

    let isDay = true;
    const moon = new THREE.PointLight(0xaaaaaa, 1, 200);
    moon.position.set(-50, 100, -50);
    moon.visible = false;
    scene.add(moon);

    function updateSky() {
      if (isDay) {
        scene.background = new THREE.Color(0x87CEEB);
        sun.visible = true;
        moon.visible = false;
      } else {
        scene.background = new THREE.Color(0x000000);
        sun.visible = false;
        moon.visible = true;
      }
    }

    function toggleDayNight() {
      isDay = !isDay;
      updateSky();
      setTimeout(toggleDayNight, 300000);
    }

    updateSky();
    setTimeout(toggleDayNight, 300000);

    // Function to create ground
    function createGround(x, z, color) {
      const geometry = new THREE.PlaneGeometry(100, 100);
      const material = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(geometry, material);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(x, 0, z);
      scene.add(plane);
    }

    // Create ground and grass
    for (let i = -2; i <= 2; i++) {
      for (let j = -2; j <= 2; j++) {
        createGround(i * 100, j * 100, 0x00ff00); // Grass color
      }
    }

    // Function to create a McDonald's building
    function createMcdonaldsBuilding(x, z) {
      // Main building body (red color)
      const buildingGeometry = new THREE.BoxGeometry(30, 15, 20);
      const buildingMaterial = new THREE.MeshBasicMaterial({ color: 0xFF0000 });
      const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
      building.position.set(x, 7.5, z);
      scene.add(building);

      // Roof (yellow color)
      const roofGeometry = new THREE.CylinderGeometry(10, 10, 5, 32);
      const roofMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
      const roof = new THREE.Mesh(roofGeometry, roofMaterial);
      roof.rotation.x = Math.PI / 2;
      roof.position.set(x, 15, z);
      scene.add(roof);

      // Golden Arches (arches on the roof)
      const archGeometry = new THREE.TorusGeometry(5, 1, 16, 100);
      const archMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
      const arch1 = new THREE.Mesh(archGeometry, archMaterial);
      arch1.rotation.x = Math.PI / 2;
      arch1.position.set(x - 8, 15, z + 5);
      scene.add(arch1);

      const arch2 = new THREE.Mesh(archGeometry, archMaterial);
      arch2.rotation.x = Math.PI / 2;
      arch2.position.set(x + 8, 15, z + 5);
      scene.add(arch2);
    }

    // Create McDonald's building
    createMcdonaldsBuilding(0, 0);

    // Create NPCs (as cubes)
    function createNPC(x, z) {
      const geometry = new THREE.BoxGeometry(5, 10, 5); // NPC is a cube
      const material = new THREE.MeshBasicMaterial({ color: 0x0000ff }); // Blue color
      const npc = new THREE.Mesh(geometry, material);
      npc.position.set(x, 5, z);
      scene.add(npc);
      return npc;
    }

    // Create some NPCs in the world
    const npcs = [];
    for (let i = -2; i <= 2; i++) {
      for (let j = -2; j <= 2; j++) {
        if (Math.random() < 0.5) { // Randomly place NPCs
          npcs.push(createNPC(i * 100, j * 100));
        }
      }
    }

    camera.position.set(0, 2, 5);
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let cameraRotationY = 0;

    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyD': moveRight = true; break;
        case 'ArrowLeft': cameraRotationY = 0.05; break;
        case 'ArrowRight': cameraRotationY = -0.05; break;
      }
    });

    document.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyD': moveRight = false; break;
        case 'ArrowLeft':
        case 'ArrowRight': cameraRotationY = 0; break;
      }
    });

    const players = {};

    socket.on('updatePlayers', (serverPlayers) => {
      for (let id in serverPlayers) {
        if (!players[id]) {
          const cube = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
          );
          scene.add(cube);
          players[id] = cube;
        }
        players[id].position.set(
          serverPlayers[id].x,
          serverPlayers[id].y,
          serverPlayers[id].z
        );
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      direction.y = 0;
      direction.normalize();

      const rightVector = new THREE.Vector3();
      camera.getWorldDirection(rightVector);
      rightVector.y = 0;
      rightVector.cross(new THREE.Vector3(0, 1, 0)).normalize();

      if (moveForward) camera.position.addScaledVector(direction, 0.1);
      if (moveBackward) camera.position.addScaledVector(direction, -0.1);
      if (moveLeft) camera.position.addScaledVector(rightVector, -0.1);
      if (moveRight) camera.position.addScaledVector(rightVector, 0.1);

      camera.rotation.y += cameraRotationY;

      // NPC behavior (simple random movement)
      npcs.forEach(npc => {
        npc.position.x += (Math.random() - 0.5) * 0.5; // Random movement in X
        npc.position.z += (Math.random() - 0.5) * 0.5; // Random movement in Z
      });

      socket.emit('move', {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      });

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
