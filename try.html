<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Game Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin-bottom: 20px;
        }
        .games-list {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
        }
        input {
            padding: 10px;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Game Platform</h1>

    <!-- Sign In Form -->
    <div id="sign-in">
        <input type="text" id="username" placeholder="Enter your username" />
        <button onclick="signIn()">Sign In</button>
    </div>

    <!-- Games List -->
    <div id="games-list" class="games-list" style="display:none;">
        <h2>Available Games</h2>
        <button onclick="startGame('game1')">Play Game 1</button>
        <button onclick="startGame('game2')">Play Game 2</button>
        <button onclick="startGame('game3')">Play Game 3</button>
    </div>

    <!-- Game Area -->
    <div id="game-area" style="display:none;">
        <h2>Game is loading...</h2>
        <button onclick="exitGame()">Exit Game</button>
    </div>
</div>

<script>
    function signIn() {
        const username = document.getElementById("username").value;
        if (username) {
            document.getElementById("sign-in").style.display = 'none';
            document.getElementById("games-list").style.display = 'block';
            alert(`Welcome, ${username}!`);
        } else {
            alert('Please enter a username.');
        }
    }

    function startGame(game) {
        document.getElementById("games-list").style.display = 'none';
        document.getElementById("game-area").style.display = 'block';
        document.getElementById("game-area").innerHTML = `<h2>Starting ${game}...</h2><button onclick="exitGame()">Exit Game</button>`;
    }

    function exitGame() {
        document.getElementById("game-area").style.display = 'none';
        document.getElementById("games-list").style.display = 'block';
    }
</script>

</body>
</html>
