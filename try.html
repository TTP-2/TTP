<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Platform Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100% }
    </style>
</head>
<body>
    <!-- Include Babylon.js -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>

    <canvas id="renderCanvas"></canvas> <!-- Canvas for the game -->
    
    <script>
        // Get the canvas element
        const canvas = document.getElementById("renderCanvas");

        // Create a Babylon.js engine
        const engine = new BABYLON.Engine(canvas, true);

        // Create a basic scene
        const scene = new BABYLON.Scene(engine);

        // Set up the camera
        const camera = new BABYLON.ArcRotateCamera("camera1", Math.PI / 2, Math.PI / 2, 10, BABYLON.Vector3.Zero(), scene);
        camera.attachControl(canvas, true); // Allows camera control with mouse

        // Create lighting (Hemisphere light)
        const light = new BABYLON.HemisphericLight("light1", new BABYLON.Vector3(0, 1, 0), scene);
        light.intensity = 1.0; // Set the light intensity
        light.diffuse = new BABYLON.Color3(1, 1, 1); // Bright white light

        // Add shadows to the ground (for realism)
        const shadowGenerator = new BABYLON.ShadowGenerator(1024, light);
        scene.shadowMapEnabled = true;
        scene.shadowsEnabled = true;

        // Create a simple platform with wood texture
        const platform = BABYLON.MeshBuilder.CreateBox("platform", { width: 10, height: 1, depth: 10 }, scene);
        const platformMaterial = new BABYLON.StandardMaterial("platformMaterial", scene);
        platformMaterial.diffuseTexture = new BABYLON.Texture("https://www.babylonjs.com/assets/wood.jpg", scene); // Example wood texture
        platform.material = platformMaterial;
        platform.position.y = -2;
        platform.receiveShadows = true; // Ground should receive shadows

        // Load a realistic human model (GLTF format)
        BABYLON.SceneLoader.ImportMesh("", "https://models.babylonjs.com/", "scene.gltf", scene, function (meshes) {
            const human = meshes[0]; // Assuming the first mesh is the human model
            human.position.y = 1; // Set the human's height
            human.scaling = new BABYLON.Vector3(1, 1, 1); // Scale the human model if necessary

            // Set human material (you can customize with textures for more realism)
            human.material = new BABYLON.StandardMaterial("humanMaterial", scene);
            human.material.diffuseColor = new BABYLON.Color3(1, 1, 1); // Use a white color for now

            // Enable shadows for the human
            human.receiveShadows = true;

            // Set up the human's animation or rig (if available)
            if (human.skeleton) {
                human.skeleton.beginAnimation("walk", true, 1.0); // Play walking animation
            }
        });

        // Set gravity and collision properties
        scene.gravity = new BABYLON.Vector3(0, -0.1, 0); // Gravity downwards
        scene.collisionsEnabled = true;

        // Start the render loop
        engine.runRenderLoop(() => {
            scene.render();
        });

        // Adjust the scene on window resize
        window.addEventListener("resize", () => {
            engine.resize();
        });
    </script>
</body>
</html>
