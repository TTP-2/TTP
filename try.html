<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Massive Mall with Grass and Entrance</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
  <script>
    const socket = io();

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Create the blue sky with a square hole (window)
    function createSky() {
      const skyGeometry = new THREE.SphereGeometry(100, 32, 32);
      const skyMaterial = new THREE.MeshBasicMaterial({ color: 0x87CEEB, side: THREE.BackSide });
      const sky = new THREE.Mesh(skyGeometry, skyMaterial);
      scene.add(sky);

      // Create the square hole (a transparent window in the sky)
      const holeGeometry = new THREE.PlaneGeometry(50, 50);
      const holeMaterial = new THREE.MeshBasicMaterial({ color: 0x87CEEB, transparent: true, opacity: 0 });
      const hole = new THREE.Mesh(holeGeometry, holeMaterial);
      hole.position.set(0, 50, 0);
      hole.rotation.x = Math.PI / 2;
      scene.add(hole);
    }

    createSky();  // Add the sky with the hole

    // Create grass around the mall (green floor)
    function createGrass(x, z) {
      const geometry = new THREE.PlaneGeometry(200, 200);
      const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(geometry, material);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(x, 0, z);
      scene.add(plane);
    }

    createGrass(0, 0);  // Create the grassy area surrounding the mall

    // Create the gray ground inside the mall
    function createMallGround(x, z) {
      const groundGeometry = new THREE.PlaneGeometry(100, 100);
      const groundMaterial = new THREE.MeshBasicMaterial({ color: 0x808080, side: THREE.DoubleSide });
      const ground = new THREE.Mesh(groundGeometry, groundMaterial);
      ground.rotation.x = -Math.PI / 2;
      ground.position.set(x, 0, z);
      scene.add(ground);
    }

    createMallGround(0, 0);  // Create the gray ground inside the mall

    // Create the mall structure
    function createMall(x, z) {
      // Create the floor of the mall (gray)
      const floorGeometry = new THREE.PlaneGeometry(100, 100);
      const floorMaterial = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, side: THREE.DoubleSide });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(x, 0, z);
      scene.add(floor);

      // Create the walls of the mall (gray color)
      const wallMaterial = new THREE.MeshBasicMaterial({ color: 0x808080 });
      
      // Front wall (with an entrance space for walking through)
      const frontWallGeometry = new THREE.BoxGeometry(100, 20, 1);
      const frontWall = new THREE.Mesh(frontWallGeometry, wallMaterial);
      frontWall.position.set(x, 10, z - 50);
      scene.add(frontWall);

      // Back wall
      const backWallGeometry = new THREE.BoxGeometry(100, 20, 1);
      const backWall = new THREE.Mesh(backWallGeometry, wallMaterial);
      backWall.position.set(x, 10, z + 50);
      scene.add(backWall);

      // Left wall
      const leftWallGeometry = new THREE.BoxGeometry(1, 20, 100);
      const leftWall = new THREE.Mesh(leftWallGeometry, wallMaterial);
      leftWall.position.set(x - 50, 10, z);
      scene.add(leftWall);

      // Right wall
      const rightWallGeometry = new THREE.BoxGeometry(1, 20, 100);
      const rightWall = new THREE.Mesh(rightWallGeometry, wallMaterial);
      rightWall.position.set(x + 50, 10, z);
      scene.add(rightWall);

      // Create the roof of the mall (gray color)
      const roofGeometry = new THREE.PlaneGeometry(100, 100);
      const roofMaterial = new THREE.MeshBasicMaterial({ color: 0x808080 });
      const roof = new THREE.Mesh(roofGeometry, roofMaterial);
      roof.rotation.x = Math.PI / 2;
      roof.position.set(x, 20, z);
      scene.add(roof);

      // Create the entrance (square hole in the front wall)
      const entranceGeometry = new THREE.PlaneGeometry(40, 20);
      const entranceMaterial = new THREE.MeshBasicMaterial({ color: 0x808080, transparent: true, opacity: 0 });
      const entrance = new THREE.Mesh(entranceGeometry, entranceMaterial);
      entrance.position.set(x, 10, z - 50);
      entrance.rotation.x = Math.PI / 2;
      scene.add(entrance);
    }

    // Create the mall structure at (0, 0)
    createMall(0, 0);

    // Camera movement setup
    camera.position.set(0, 2, 10);
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let cameraRotationY = 0;

    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyD': moveRight = true; break;
        case 'ArrowLeft': cameraRotationY = 0.05; break;
        case 'ArrowRight': cameraRotationY = -0.05; break;
      }
    });

    document.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyD': moveRight = false; break;
        case 'ArrowLeft':
        case 'ArrowRight': cameraRotationY = 0; break;
      }
    });

    const players = {};

    socket.on('updatePlayers', (serverPlayers) => {
      for (let id in serverPlayers) {
        if (!players[id]) {
          const cube = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
          );
          scene.add(cube);
          players[id] = cube;
        }
        players[id].position.set(
          serverPlayers[id].x,
          serverPlayers[id].y,
          serverPlayers[id].z
        );
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      direction.y = 0;
      direction.normalize();

      const rightVector = new THREE.Vector3();
      camera.getWorldDirection(rightVector);
      rightVector.y = 0;
      rightVector.cross(new THREE.Vector3(0, 1, 0)).normalize();

      if (moveForward) camera.position.addScaledVector(direction, 0.1);
      if (moveBackward) camera.position.addScaledVector(direction, -0.1);
      if (moveLeft) camera.position.addScaledVector(rightVector, -0.1);
      if (moveRight) camera.position.addScaledVector(rightVector, 0.1);

      camera.rotation.y += cameraRotationY;

      socket.emit('move', {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      });

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
