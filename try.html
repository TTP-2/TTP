<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Chat & Marketplace</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; background: #f0a500; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .messages, .marketplace { height: 200px; overflow-y: scroll; background: #f9f9f9; padding: 10px; border: 1px solid #ddd; border-radius: 5px; text-align: left; margin-top: 10px; }
        .message, .item { background: #f0f0f0; padding: 8px; margin: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Creative Chat & Marketplace</h1>
        
        <!-- Chat Setup -->
        <div id="chatSetup">
            <h2>Enter Chat Code</h2>
            <input type="text" id="chatCode" placeholder="Chat Code">
            <button id="joinChat">Join Chat</button>
        </div>

        <!-- Chat Room -->
        <div id="chatRoom" style="display:none;">
            <h2>Chat Room: <span id="roomCode"></span></h2>
            <div class="messages" id="messages"></div>
            <input type="text" id="messageInput" placeholder="Type a message">
            <button id="sendMessage">Send</button>
        </div>

        <!-- Marketplace -->
        <div id="marketplaceSection" style="display:none;">
            <h2>Creative Marketplace</h2>
            <input type="text" id="itemName" placeholder="Item Name">
            <button id="addItem">Add to Marketplace</button>
            <div class="marketplace" id="marketplace"></div>
        </div>
    </div>

    <script>
        const socket = io("http://localhost:3000");

        let chatRoom = "";
        let marketplaceItems = [];

        document.getElementById("joinChat").addEventListener("click", () => {
            chatRoom = document.getElementById("chatCode").value.trim();
            if (chatRoom !== "") {
                socket.emit("joinRoom", chatRoom);
                document.getElementById("roomCode").innerText = chatRoom;
                document.getElementById("chatSetup").style.display = "none";
                document.getElementById("chatRoom").style.display = "block";
                document.getElementById("marketplaceSection").style.display = "block";
            }
        });

        document.getElementById("sendMessage").addEventListener("click", () => {
            const messageInput = document.getElementById("messageInput");
            const message = messageInput.value.trim();

            if (message !== "") {
                socket.emit("sendMessage", { room: chatRoom, message: `You: ${message}` });
                messageInput.value = "";
            }
        });

        socket.on("receiveMessage", (message) => {
            const messagesDiv = document.getElementById("messages");
            const messageElement = document.createElement("div");
            messageElement.classList.add("message");
            messageElement.innerText = message;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        document.getElementById("addItem").addEventListener("click", () => {
            const itemInput = document.getElementById("itemName");
            const itemName = itemInput.value.trim();

            if (itemName !== "") {
                marketplaceItems.push(itemName);
                updateMarketplace();
                itemInput.value = "";
            }
        });

        function updateMarketplace() {
            const marketplaceDiv = document.getElementById("marketplace");
            marketplaceDiv.innerHTML = "";

            marketplaceItems.forEach(item => {
                const itemElement = document.createElement("div");
                itemElement.classList.add("item");
                itemElement.innerText = item;
                marketplaceDiv.appendChild(itemElement);
            });

            marketplaceDiv.scrollTop = marketplaceDiv.scrollHeight;
        }
    </script>

</body>
</html>
