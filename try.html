<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging Chat</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            font-size: 1rem;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            font-size: 1rem;
            background-color: #f0a500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e08700;
        }

        .messages {
            background-color: #f9f9f9;
            height: 250px;
            overflow-y: scroll;
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .message {
            background: #f0f0f0;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Messaging Chat</h1>

        <!-- Chat Creation Section -->
        <div id="chatCreation">
            <h2>Create a Chat</h2>
            <input type="text" id="chatCode" placeholder="Enter a unique chat code" />
            <button id="createChat">Create Chat</button>
        </div>

        <!-- Chat Section -->
        <div id="chatSection" style="display:none;">
            <h2>Chat Room: <span id="chatRoomCode"></span></h2>
            <div class="messages" id="messages"></div>
            <input type="text" id="messageInput" placeholder="Type your message" />
            <button id="sendMessage">Send</button>
        </div>

        <footer>
            <p>&copy; 2025 Messaging Chat</p>
        </footer>
    </div>

    <script>
        let chatRoomCode = "";
        let chatMessages = [];

        document.getElementById("createChat").addEventListener("click", function () {
            chatRoomCode = document.getElementById("chatCode").value.trim();

            if (chatRoomCode !== "") {
                document.getElementById("chatRoomCode").innerText = chatRoomCode;
                document.getElementById("chatSection").style.display = "block";
                document.getElementById("chatCreation").style.display = "none";
                loadMessages();
            }
        });

        document.getElementById("sendMessage").addEventListener("click", function () {
            const messageInput = document.getElementById("messageInput");
            const newMessage = messageInput.value.trim();

            if (newMessage !== "") {
                chatMessages.push({ sender: "You", message: newMessage });
                messageInput.value = "";
                loadMessages();
            }
        });

        function loadMessages() {
            const messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML = "";

            chatMessages.forEach(msg => {
                const messageElement = document.createElement("div");
                messageElement.classList.add("message");
                messageElement.innerHTML = `<strong>${msg.sender}: </strong>${msg.message}`;
                messagesDiv.appendChild(messageElement);
            });

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>

</body>
</html>
