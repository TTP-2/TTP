<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple 3D Game - Minecraft Style</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #interactionMessage {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: white;
      visibility: hidden;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
  <div id="interactionMessage">Press Y to interact</div>
  <script>
    const socket = io();
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const interactionMessage = document.getElementById('interactionMessage');

    let isDay = true;
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    const moon = new THREE.PointLight(0xaaaaaa, 1, 200);
    moon.position.set(-50, 100, -50);
    moon.visible = false;
    scene.add(moon);

    function updateSky() {
      if (isDay) {
        scene.background = new THREE.Color(0x87CEEB);
        sun.visible = true;
        moon.visible = false;
      } else {
        scene.background = new THREE.Color(0x000000);
        sun.visible = false;
        moon.visible = true;
      }
    }

    function toggleDayNight() {
      isDay = !isDay;
      updateSky();
      setTimeout(toggleDayNight, 300000);
    }

    updateSky();
    setTimeout(toggleDayNight, 300000);

    function createGround(x, z, color) {
      const geometry = new THREE.PlaneGeometry(100, 100);
      const material = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(geometry, material);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(x, 0, z);
      scene.add(plane);
    }

    for (let i = -2; i <= 2; i++) {
      for (let j = -2; j <= 2; j++) {
        const isWater = j > 1;
        const isSand = j === 1;
        createGround(i * 100, j * 100, isWater ? 0x0000ff : isSand ? 0xFFD700 : 0x00ff00);
      }
    }

    function createRocket(x, z) {
      const rocketColor = 0xFF0000; // Red color for the rocket
      const rocketHeight = 5;

      // Create a basic rocket shape using a cylinder and cone
      const rocketBodyGeometry = new THREE.CylinderGeometry(1, 1, rocketHeight, 32);
      const rocketBodyMaterial = new THREE.MeshBasicMaterial({ color: rocketColor });
      const rocketBody = new THREE.Mesh(rocketBodyGeometry, rocketBodyMaterial);
      rocketBody.position.set(x, rocketHeight / 2, z);
      scene.add(rocketBody);

      // Rocket's top (cone part)
      const rocketTopGeometry = new THREE.ConeGeometry(1.5, 2, 32);
      const rocketTopMaterial = new THREE.MeshBasicMaterial({ color: rocketColor });
      const rocketTop = new THREE.Mesh(rocketTopGeometry, rocketTopMaterial);
      rocketTop.position.set(x, rocketHeight + 1, z);
      scene.add(rocketTop);

      return { body: rocketBody, top: rocketTop };
    }

    const rocket = createRocket(0, 0);
    let isInRocket = false;
    let closeToRocket = false;
    let rocketExitTimer;

    camera.position.set(0, 2, 5);
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let cameraRotationY = 0;

    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyD': moveRight = true; break;
        case 'ArrowLeft': cameraRotationY = 0.05; break;
        case 'ArrowRight': cameraRotationY = -0.05; break;
        case 'ShiftLeft':
          if (camera.position.y > 0) { // Prevent going below ground level
            camera.position.y -= 0.1; // Move down
          }
          break;
        case 'KeyY':
          if (closeToRocket && !isInRocket) {
            // Interact with rocket
            interactionMessage.style.visibility = 'hidden'; // Hide message
            document.body.style.backgroundColor = 'black'; // Turn screen black
            setTimeout(() => {
              document.body.style.backgroundColor = ''; // Restore screen
              isInRocket = true; // Player is now inside the rocket
              camera.position.set(0, 5, 5); // Position player in the rocket
            }, 3000);
          } else if (isInRocket) {
            // Player exits the rocket
            isInRocket = false;
            camera.position.set(0, 2, 5); // Return to original position
            scene.background = new THREE.Color(0x808080); // Gray terrain
          }
          break;
      }
    });

    document.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyD': moveRight = false; break;
        case 'ArrowLeft':
        case 'ArrowRight': cameraRotationY = 0; break;
      }
    });

    function checkProximityToRocket() {
      const rocketPos = rocket.body.position;
      const distance = camera.position.distanceTo(rocketPos);
      if (distance < 10) { // Check if the player is close to the rocket
        closeToRocket = true;
        interactionMessage.style.visibility = 'visible'; // Show interaction message
      } else {
        closeToRocket = false;
        interactionMessage.style.visibility = 'hidden'; // Hide interaction message
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      checkProximityToRocket();

      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      direction.y = 0;
      direction.normalize();

      const rightVector = new THREE.Vector3();
      camera.getWorldDirection(rightVector);
      rightVector.y = 0;
      rightVector.cross(new THREE.Vector3(0, 1, 0)).normalize();

      if (moveForward) camera.position.addScaledVector(direction, 0.1);
      if (moveBackward) camera.position.addScaledVector(direction, -0.1);
      if (moveLeft) camera.position.addScaledVector(rightVector, -0.1);
      if (moveRight) camera.position.addScaledVector(rightVector, 0.1);

      camera.rotation.y += cameraRotationY;

      socket.emit('move', {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      });

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
