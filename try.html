<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helicopter Landing - Minecraft Style with Sand Castle</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
  <script>
    const socket = io();

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const helicopter = createHelicopter();
    helicopter.position.set(0, 50, 0); // Start the helicopter above the ground

    // Create a basic ground
    createGround(0, 0, 0x00ff00); 

    // Create a sand castle instead of shells
    createSandCastle(0, 0);

    camera.position.set(0, 2, 5);

    // Landing logic: Move helicopter downward
    let isLanding = false;
    let landingSpeed = 0.2;
    
    function createHelicopter() {
      const helicopterGroup = new THREE.Group();

      // Helicopter body
      const bodyGeometry = new THREE.BoxGeometry(5, 1, 10);
      const bodyMaterial = new THREE.MeshBasicMaterial({ color: 0x555555 });
      const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
      helicopterGroup.add(body);

      // Helicopter rotor
      const rotorGeometry = new THREE.CylinderGeometry(1, 1, 0.2, 10);
      const rotorMaterial = new THREE.MeshBasicMaterial({ color: 0x222222 });
      const rotor = new THREE.Mesh(rotorGeometry, rotorMaterial);
      rotor.rotation.x = Math.PI / 2; // Rotate the rotor to lie flat
      rotor.position.set(0, 1, 0); // Position it on top of the body
      helicopterGroup.add(rotor);

      scene.add(helicopterGroup);
      return helicopterGroup;
    }

    function createGround(x, z, color) {
      const geometry = new THREE.PlaneGeometry(100, 100);
      const material = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(geometry, material);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(x, 0, z);
      scene.add(plane);
    }

    // Create a sand castle using cubes
    function createSandCastle(x, z) {
      const castleMaterial = new THREE.MeshBasicMaterial({ color: 0xFFD700 });

      // Base of the sand castle
      const baseGeometry = new THREE.BoxGeometry(8, 1, 8);
      const base = new THREE.Mesh(baseGeometry, castleMaterial);
      base.position.set(x, 0.5, z);
      scene.add(base);

      // Towers of the sand castle
      const towerGeometry = new THREE.BoxGeometry(2, 6, 2);
      const tower1 = new THREE.Mesh(towerGeometry, castleMaterial);
      tower1.position.set(x - 3, 3.5, z - 3);
      scene.add(tower1);

      const tower2 = new THREE.Mesh(towerGeometry, castleMaterial);
      tower2.position.set(x + 3, 3.5, z - 3);
      scene.add(tower2);

      const tower3 = new THREE.Mesh(towerGeometry, castleMaterial);
      tower3.position.set(x - 3, 3.5, z + 3);
      scene.add(tower3);

      const tower4 = new THREE.Mesh(towerGeometry, castleMaterial);
      tower4.position.set(x + 3, 3.5, z + 3);
      scene.add(tower4);

      // Top of the castle
      const topGeometry = new THREE.BoxGeometry(6, 1, 6);
      const top = new THREE.Mesh(topGeometry, castleMaterial);
      top.position.set(x, 6, z);
      scene.add(top);
    }

    function animate() {
      requestAnimationFrame(animate);

      // Helicopter landing logic
      if (isLanding && helicopter.position.y > 0) {
        helicopter.position.y -= landingSpeed; // Move the helicopter downward
      } else if (helicopter.position.y <= 0) {
        isLanding = false; // Stop landing when the helicopter hits the ground
      }

      renderer.render(scene, camera);
    }

    // Start landing the helicopter when 'L' is pressed
    document.addEventListener('keydown', (event) => {
      if (event.code === 'KeyL') {
        isLanding = true;
      }
    });

    animate();
  </script>
</body>
</html>
