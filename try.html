<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Time Warp Scan</title>
  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    .wrapper {
      position: relative;
      width: 480px;
      height: 360px;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #canvas {
      z-index: 2;
    }

    #scanLine {
      position: absolute;
      width: 100%;
      height: 2px;
      background: cyan;
      z-index: 3;
      top: 0;
      display: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: cyan;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Time Warp Scan</h2>
  <div class="wrapper">
    <video id="video" autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div id="scanLine"></div>
  </div>
  <button onclick="startScan()">Start Scan</button>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const scanLine = document.getElementById("scanLine");

    navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
      video.srcObject = stream;
    });

    function startScan() {
      const width = canvas.width = video.videoWidth || 480;
      const height = canvas.height = video.videoHeight || 360;
      let y = 0;

      scanLine.style.display = 'block';
      scanLine.style.top = '0px';

      // This interval grabs 1px height from the webcam and draws it to canvas
      const interval = setInterval(() => {
        ctx.drawImage(video, 0, y, width, 1, 0, y, width, 1); // copy 1 line of pixels
        scanLine.style.top = `${y}px`;
        y++;

        if (y >= height) {
          clearInterval(interval);
          scanLine.style.display = 'none';
        }
      }, 16); // ~60 lines per second, 6s total scan duration
    }
  </script>
</body>
</html>
