<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facial Expression Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        #camera-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 1px solid #ddd;
        }
        video {
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror the video feed */
        }
        #expression {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="camera-container">
        <video id="video" autoplay></video>
        <div id="expression">Looking for expression...</div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <script>
        const video = document.getElementById("video");
        const expressionDiv = document.getElementById("expression");

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
            } catch (error) {
                console.error("Error accessing webcam:", error);
                alert("Please allow camera access or check if your webcam is working.");
            }
        }

        async function loadModels() {
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri('models');
                await faceapi.nets.faceExpressionNet.loadFromUri('models');
            } catch (error) {
                console.error("Error loading models:", error);
                alert("Failed to load face detection models. Please check if they are in the 'models' directory.");
            }
        }

        async function detectExpression() {
            const detections = await faceapi.detectAllFaces(video).withFaceExpressions();
            if (detections.length > 0) {
                const expression = detections[0].expressions;
                const maxExpression = Object.keys(expression).reduce((a, b) => expression[a] > expression[b] ? a : b);
                expressionDiv.textContent = `Expression: ${maxExpression} (${Math.round(expression[maxExpression] * 100)}%)`;
            } else {
                expressionDiv.textContent = 'No face detected';
            }
        }

        window.onload = async () => {
            await loadModels();
            await setupCamera();
            video.onplay = () => {
                setInterval(detectExpression, 100); // Detect every 100ms
            };
        };
    </script>
</body>
</html>
