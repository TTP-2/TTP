<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Call</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
    }

    .container {
      text-align: center;
    }

    video {
      width: 300px;
      height: 200px;
      margin: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="container">
    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
    <button id="startCall">Start Call</button>
    <button id="endCall">End Call</button>
  </div>

  <script>
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const startCallButton = document.getElementById('startCall');
    const endCallButton = document.getElementById('endCall');
    let localStream;
    let peerConnection;
    let remoteStream;

    // Set up local video stream
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(stream => {
        localStream = stream;
        localVideo.srcObject = stream;
      }).catch(error => {
        console.error('Error accessing media devices.', error);
      });

    // Start Call Button
    startCallButton.onclick = () => {
      // Example: Initialize peer connection and start WebRTC
      peerConnection = new RTCPeerConnection();
      
      // Add local stream to peer connection
      localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
      
      peerConnection.ontrack = (event) => {
        remoteStream = event.streams[0];
        remoteVideo.srcObject = remoteStream;
      };
      
      peerConnection.createOffer()
        .then(offer => {
          peerConnection.setLocalDescription(offer);
          // Normally, signaling would be done via a server here
          // For demo purposes, just log the offer to the console
          console.log("Offer created: ", offer);
        })
        .catch(error => {
          console.error('Error creating offer:', error);
        });
    };

    // End Call Button
    endCallButton.onclick = () => {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
    };

    // Simulate receiving an offer and responding with an answer
    // This would normally come from the server via WebSocket or similar
    function simulateAnswer(offer) {
      peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
      peerConnection.createAnswer()
        .then(answer => {
          peerConnection.setLocalDescription(answer);
          console.log("Answer created: ", answer);
        })
        .catch(error => {
          console.error('Error creating answer:', error);
        });
    }

    // Simulate receiving an answer and handling ICE candidates
    // This would normally come from the server as well
    function simulateAnswerReceived(answer) {
      peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
    }
  </script>
</body>
</html>
