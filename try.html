<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sandbox Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/PointerLockControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; text-align: center; }
        #block-selector { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 5px; }
        .block-btn { padding: 10px; margin: 5px; cursor: pointer; border: none; font-size: 16px; color: white; }
        .grass { background-color: green; }
        .stone { background-color: gray; }
        .wood { background-color: brown; }
    </style>
</head>
<body>

    <div id="block-selector">
        <button class="block-btn grass" onclick="selectBlock('grass')">Grass</button>
        <button class="block-btn stone" onclick="selectBlock('stone')">Stone</button>
        <button class="block-btn wood" onclick="selectBlock('wood')">Wood</button>
    </div>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let selectedBlock = "grass";
        const blocks = [];

        // Block Textures
        const textures = {
            grass: new THREE.MeshLambertMaterial({ color: "green" }),
            stone: new THREE.MeshLambertMaterial({ color: "gray" }),
            wood: new THREE.MeshLambertMaterial({ color: "brown" })
        };

        function init() {
            // Create Scene
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 10, 10);
            scene.add(light);

            // Controls
            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener("click", () => controls.lock());

            // Raycaster for placing blocks
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: "darkgreen", side: THREE.DoubleSide });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Set Camera Start Position
            camera.position.set(0, 2, 5);

            // Event Listeners
            document.addEventListener("mousedown", onMouseClick);

            // Start Game Loop
            animate();
        }

        function onMouseClick(event) {
            if (event.button === 0) { // Left Click - Place Block
                placeBlock();
            } else if (event.button === 2) { // Right Click - Remove Block
                event.preventDefault();
                removeBlock();
            }
        }

        function placeBlock() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(scene.children);
            if (intersects.length > 0) {
                const point = intersects[0].point;
                const block = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), textures[selectedBlock]);
                block.position.set(Math.round(point.x), Math.round(point.y) + 0.5, Math.round(point.z));
                scene.add(block);
                blocks.push(block);
            }
        }

        function removeBlock() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(blocks);
            if (intersects.length > 0) {
                const targetBlock = intersects[0].object;
                scene.remove(targetBlock);
                blocks.splice(blocks.indexOf(targetBlock), 1);
            }
        }

        function selectBlock(blockType) {
            selectedBlock = blockType;
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>

</body>
</html>
