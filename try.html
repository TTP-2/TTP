<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D World Movement</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // Step 2: Set up scene, camera, and renderer
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Step 3: Create a cube to represent something in the world
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Step 4: Set the camera position
    camera.position.z = 5;

    // Step 5: Handle user input for movement (arrow keys)
    let velocity = new THREE.Vector3();
    const speed = 0.1;

    function handleKeyboardInput(event) {
      if (event.key === "ArrowUp") {
        velocity.z = -speed;
      } else if (event.key === "ArrowDown") {
        velocity.z = speed;
      } else if (event.key === "ArrowLeft") {
        velocity.x = -speed;
      } else if (event.key === "ArrowRight") {
        velocity.x = speed;
      }
    }

    function stopMovement(event) {
      if (event.key === "ArrowUp" || event.key === "ArrowDown") {
        velocity.z = 0;
      }
      if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
        velocity.x = 0;
      }
    }

    // Step 6: Add event listeners for keyboard input
    window.addEventListener('keydown', handleKeyboardInput);
    window.addEventListener('keyup', stopMovement);

    // Step 7: Create the animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Move the camera based on user input
      camera.position.add(velocity);

      // Render the scene from the camera's perspective
      renderer.render(scene, camera);
    }

    animate();
  </script>

</body>
</html>
