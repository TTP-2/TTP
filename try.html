<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystery Digger Game</title>
    <style>
      body { margin: 0; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // Game setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Tile parameters
      const tileSize = 1;
      const gridWidth = 10;
      const gridHeight = 10;
      const tiles = [];
      let playerPosition = { x: 0, y: 0 };

      // Create a 10x10 grid of tiles
      const tileGeometry = new THREE.BoxGeometry(tileSize, tileSize, tileSize);
      const dirtMaterial = new THREE.MeshBasicMaterial({ color: 0x8B4513 });
      const treasureMaterial = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
      const obstacleMaterial = new THREE.MeshBasicMaterial({ color: 0xFF0000 });

      function createTile(x, y, material) {
        const tile = new THREE.Mesh(tileGeometry, material);
        tile.position.set(x * tileSize, 0, y * tileSize);
        scene.add(tile);
        return tile;
      }

      // Initialize the grid with tiles
      function initializeGrid() {
        for (let x = 0; x < gridWidth; x++) {
          tiles[x] = [];
          for (let y = 0; y < gridHeight; y++) {
            const randomTile = Math.random();
            let material;
            if (randomTile < 0.1) material = obstacleMaterial;  // 10% chance for obstacle
            else if (randomTile < 0.2) material = treasureMaterial; // 10% chance for treasure
            else material = dirtMaterial; // 80% chance for dirt
            tiles[x][y] = createTile(x, y, material);
          }
        }
      }

      // Player setup
      const playerGeometry = new THREE.SphereGeometry(0.5);
      const playerMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
      const player = new THREE.Mesh(playerGeometry, playerMaterial);
      player.position.set(playerPosition.x * tileSize, 0.5, playerPosition.y * tileSize);
      scene.add(player);

      // Camera setup
      camera.position.z = 15;
      camera.position.y = 5;
      camera.lookAt(0, 0, 0);

      // Handle player movement
      function movePlayer(dx, dy) {
        const newX = playerPosition.x + dx;
        const newY = playerPosition.y + dy;
        if (newX >= 0 && newX < gridWidth && newY >= 0 && newY < gridHeight) {
          playerPosition.x = newX;
          playerPosition.y = newY;
          player.position.set(playerPosition.x * tileSize, 0.5, playerPosition.y * tileSize);
        }
      }

      // Handle digging action
      function dig() {
        const tile = tiles[playerPosition.x][playerPosition.y];
        if (tile.material === obstacleMaterial) {
          alert("Game Over! You hit an obstacle.");
          resetGame();
        } else if (tile.material === treasureMaterial) {
          alert("You found a treasure!");
          resetGame();
        } else {
          tile.material = new THREE.MeshBasicMaterial({ color: 0xeeeeee }); // Empty space after digging
        }
      }

      // Reset game
      function resetGame() {
        scene.clear();
        tiles.length = 0;
        playerPosition = { x: 0, y: 0 };
        initializeGrid();
        player.position.set(playerPosition.x * tileSize, 0.5, playerPosition.y * tileSize);
      }

      // Keyboard controls
      document.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowUp') movePlayer(0, -1);
        if (event.key === 'ArrowDown') movePlayer(0, 1);
        if (event.key === 'ArrowLeft') movePlayer(-1, 0);
        if (event.key === 'ArrowRight') movePlayer(1, 0);
        if (event.key === ' ') dig();  // Dig when spacebar is pressed
      });

      // Game loop
      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }

      initializeGrid();
      animate();
    </script>
  </body>
</html>
