<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Game: Avoid Falling Obstacles</title>
  <style>
    body { margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background-color: #222; }
  </style>
</head>
<body>

  <canvas id="gameCanvas" width="600" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game variables
    const playerWidth = 40;
    const playerHeight = 40;
    let playerX = canvas.width / 2 - playerWidth / 2;
    let playerY = canvas.height - playerHeight - 10;
    let playerSpeed = 5;

    const obstacles = [];
    const obstacleWidth = 40;
    const obstacleHeight = 40;
    let obstacleSpeed = 2;
    let gameOver = false;

    // Key presses
    let keys = {
      left: false,
      right: false
    };

    // Listen for key presses
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") keys.left = true;
      if (event.key === "ArrowRight") keys.right = true;
    });

    document.addEventListener("keyup", (event) => {
      if (event.key === "ArrowLeft") keys.left = false;
      if (event.key === "ArrowRight") keys.right = false;
    });

    // Create obstacles
    function createObstacle() {
      const x = Math.random() * (canvas.width - obstacleWidth);
      obstacles.push({ x, y: 0 });
    }

    // Move player
    function movePlayer() {
      if (keys.left && playerX > 0) playerX -= playerSpeed;
      if (keys.right && playerX < canvas.width - playerWidth) playerX += playerSpeed;
    }

    // Move obstacles
    function moveObstacles() {
      for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].y += obstacleSpeed;

        // Check collision
        if (obstacles[i].y + obstacleHeight >= playerY && 
            obstacles[i].y <= playerY + playerHeight && 
            obstacles[i].x + obstacleWidth >= playerX && 
            obstacles[i].x <= playerX + playerWidth) {
          gameOver = true;
        }

        // Remove obstacles that are off the screen
        if (obstacles[i].y > canvas.height) {
          obstacles.splice(i, 1);
          i--;
        }
      }
    }

    // Draw everything
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear the canvas

      // Draw player
      ctx.fillStyle = "blue";
      ctx.fillRect(playerX, playerY, playerWidth, playerHeight);

      // Draw obstacles
      ctx.fillStyle = "red";
      for (let i = 0; i < obstacles.length; i++) {
        ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacleWidth, obstacleHeight);
      }

      // Draw game over text if game is over
      if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("Game Over!", canvas.width / 2 - 90, canvas.height / 2);
        return;
      }

      requestAnimationFrame(draw); // Redraw the game frame
    }

    // Game loop
    function gameLoop() {
      if (!gameOver) {
        movePlayer();
        moveObstacles();
      }
      draw();
    }

    // Spawn obstacles at intervals
    setInterval(() => {
      if (!gameOver) {
        createObstacle();
      }
    }, 1500); // Create an obstacle every 1.5 seconds

    gameLoop(); // Start the game loop

  </script>

</body>
</html>
