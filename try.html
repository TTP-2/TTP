<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI with Memory & Voice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }
        h1 {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
        #answer {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI with Memory & Voice</h1>
        <input type="text" id="userInput" placeholder="Ask me something or teach me!">
        <button onclick="processInput()">Ask or Teach</button>
        <button onclick="startListening()">🎤 Speak</button>
        <div id="answer"></div>
    </div>

    <script>
        // Memory object to store learned facts
        let memory = {};

        // Function to process user input
        function processInput() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) {
                alert("Please enter or say something!");
                return;
            }

            // Teaching AI facts
            if (userInput.toLowerCase().includes(" is ")) {
                const parts = userInput.split(" is ");
                if (parts.length === 2) {
                    const fact = parts[0].trim();
                    const answer = parts[1].trim();
                    memory[fact] = answer;
                    document.getElementById('answer').textContent = `Got it! I'll remember that ${fact} is ${answer}.`;
                } else {
                    document.getElementById('answer').textContent = "Try: 'The sky is blue.'";
                }
            }
            // Answering questions
            else if (userInput.toLowerCase().startsWith("what is")) {
                const question = userInput.slice(8).trim();
                if (memory[question]) {
                    document.getElementById('answer').textContent = `${question} is ${memory[question]}.`;
                } else {
                    document.getElementById('answer').textContent = "I don't know that yet!";
                }
            } else {
                document.getElementById('answer').textContent = "Tell me facts like 'Water is wet' or ask 'What is water?'.";
            }
            document.getElementById('userInput').value = ''; // Clear input field
        }

        // Speech Recognition Function
        function startListening() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Your browser doesn't support voice recognition.");
                return;
            }

            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.start();

            recognition.onresult = function(event) {
                const spokenText = event.results[0][0].transcript;
                document.getElementById('userInput').value = spokenText;
                processInput(); // Automatically process voice input
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event);
            };
        }
    </script>

</body>
</html>
