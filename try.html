// Full updated HTML code for park-style benches around the fountain without pavement
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle of Buildings - Babylon.js</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<script>
    const canvas = document.getElementById('renderCanvas');
    const engine = new BABYLON.Engine(canvas, true);

    const createScene = function () {
        const scene = new BABYLON.Scene(engine);

        const camera = new BABYLON.UniversalCamera("camera1", new BABYLON.Vector3(0, 2, -60), scene);
        camera.attachControl(canvas, true);
        camera.speed = 0.5;
        camera.applyGravity = true;
        camera.checkCollisions = true;

        const light = new BABYLON.HemisphericLight("light1", new BABYLON.Vector3(0, 1, 0), scene);

        // Ground without pavement (just gray platform)
        const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 200, height: 200 }, scene);
        const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
        groundMat.diffuseColor = new BABYLON.Color3(0.7, 0.7, 0.7);
        ground.material = groundMat;
        ground.checkCollisions = true;

        scene.gravity = new BABYLON.Vector3(0, -0.5, 0);
        scene.collisionsEnabled = true;

        const buildingCount = 12;
        const radius = 50;

        for (let i = 0; i < buildingCount; i++) {
            const angle = (i / buildingCount) * 2 * Math.PI;
            const x = radius * Math.cos(angle);
            const z = radius * Math.sin(angle);
            const height = Math.random() * 10 + 10;
            const width = Math.random() * 3 + 5;
            const depth = Math.random() * 3 + 5;

            const building = BABYLON.MeshBuilder.CreateBox("building", {
                width: width,
                height: height,
                depth: depth
            }, scene);

            building.position = new BABYLON.Vector3(x, height / 2, z);

            const mat = new BABYLON.StandardMaterial("buildingMat", scene);
            mat.diffuseColor = new BABYLON.Color3(0.5, 0.5, 0.5);
            building.material = mat;

            building.checkCollisions = true;
        }

        // Fountain
        const base = BABYLON.MeshBuilder.CreateCylinder("fountainBase", { diameter: 10, height: 1 }, scene);
        base.position.y = 0.5;
        const pool = BABYLON.MeshBuilder.CreateCylinder("fountainPool", { diameter: 6, height: 0.5 }, scene);
        pool.position.y = 1;
        const column = BABYLON.MeshBuilder.CreateCylinder("fountainColumn", { diameter: 1.2, height: 4 }, scene);
        column.position.y = 3;
        const topBowl = BABYLON.MeshBuilder.CreateSphere("topBowl", { diameter: 2, slice: 0.5 }, scene);
        topBowl.position.y = 5;
        const water = BABYLON.MeshBuilder.CreateCylinder("fountainWater", { diameter: 5.5, height: 0.1 }, scene);
        water.position.y = 1.25;

        const matStone = new BABYLON.StandardMaterial("matStone", scene);
        matStone.diffuseColor = new BABYLON.Color3(0.6, 0.6, 0.6);
        const matWater = new BABYLON.StandardMaterial("matWater", scene);
        matWater.diffuseColor = new BABYLON.Color3(0.2, 0.6, 1);
        matWater.alpha = 0.7;

        base.material = matStone;
        pool.material = matStone;
        column.material = matStone;
        topBowl.material = matStone;
        water.material = matWater;

        const particleSystem = new BABYLON.ParticleSystem("waterSpray", 1000, scene);
        particleSystem.particleTexture = new BABYLON.Texture("https://www.babylonjs-playground.com/textures/flare.png", scene);
        particleSystem.emitter = topBowl;
        particleSystem.minEmitBox = new BABYLON.Vector3(0, 0, 0);
        particleSystem.maxEmitBox = new BABYLON.Vector3(0, 0, 0);
        particleSystem.color1 = new BABYLON.Color4(0.6, 0.8, 1, 1);
        particleSystem.color2 = new BABYLON.Color4(0.2, 0.6, 1, 1);
        particleSystem.colorDead = new BABYLON.Color4(0.2, 0.6, 1, 0);
        particleSystem.minSize = 0.1;
        particleSystem.maxSize = 0.3;
        particleSystem.minLifeTime = 0.3;
        particleSystem.maxLifeTime = 0.7;
        particleSystem.emitRate = 800;
        particleSystem.direction1 = new BABYLON.Vector3(-1, 4, -1);
        particleSystem.direction2 = new BABYLON.Vector3(1, 4, 1);
        particleSystem.gravity = new BABYLON.Vector3(0, -9.8, 0);
        particleSystem.minEmitPower = 1;
        particleSystem.maxEmitPower = 3;
        particleSystem.updateSpeed = 0.01;
        particleSystem.start();

        // Park-style benches
        const benchMat = new BABYLON.StandardMaterial("benchMat", scene);
        benchMat.diffuseColor = new BABYLON.Color3(0.4, 0.2, 0);

        const benchCount = 8;
        const benchDistance = 9;

        for (let i = 0; i < benchCount; i++) {
            const angle = (i / benchCount) * 2 * Math.PI;
            const x = benchDistance * Math.cos(angle);
            const z = benchDistance * Math.sin(angle);

            const seat = BABYLON.MeshBuilder.CreateBox(`seat_${i}`, { width: 2, height: 0.15, depth: 0.6 }, scene);
            seat.position = new BABYLON.Vector3(x, 0.2, z);
            seat.rotation.y = -angle + Math.PI / 2;
            seat.material = benchMat;

            const backrest = BABYLON.MeshBuilder.CreateBox(`backrest_${i}`, { width: 2, height: 0.5, depth: 0.1 }, scene);
            backrest.position = new BABYLON.Vector3(x, 0.6, z - 0.25 * Math.cos(angle));
            backrest.rotation.y = seat.rotation.y;
            backrest.material = benchMat;

            const leg1 = BABYLON.MeshBuilder.CreateBox(`leg1_${i}`, { width: 0.1, height: 0.4, depth: 0.1 }, scene);
            leg1.position = new BABYLON.Vector3(x - 0.9 * Math.sin(angle), 0.2, z + 0.3 * Math.cos(angle));
            leg1.material = benchMat;

            const leg2 = BABYLON.MeshBuilder.CreateBox(`leg2_${i}`, { width: 0.1, height: 0.4, depth: 0.1 }, scene);
            leg2.position = new BABYLON.Vector3(x + 0.9 * Math.sin(angle), 0.2, z + 0.3 * Math.cos(angle));
            leg2.material = benchMat;
        }

        return scene;
    };

    const scene = createScene();
    engine.runRenderLoop(function () {
        scene.render();
    });
    window.addEventListener("resize", function () {
        engine.resize();
    });
</script>
</body>
</html>
