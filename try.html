<!DOCTYPE html>
<html>
<head>
  <title>2D Platformer Game</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
    canvas { border: 2px solid #fff; }
  </style>
</head>
<body>
<script>
let player;
let platforms = [];
let coins = [];
let gravity = 0.6;
let jumpForce = -12;
let groundY;
let jumpCount = 0;
let maxJumps = 2;
let score = 0;
let jumpSound, coinSound;
let bgOffset = 0;

function preload() {
  // Load sound effects
  jumpSound = loadSound('https://www.xai.com/sounds/jump.mp3');
  coinSound = loadSound('https://www.xai.com/sounds/coin.mp3');
}

function setup() {
  createCanvas(800, 600);
  groundY = height - 50;
  player = {
    x: 100,
    y: groundY,
    w: 30,
    h: 40,
    vx: 0,
    vy: 0,
    speed: 5,
    isJumping: false
  };
  // Create platforms (some moving)
  platforms.push({ x: 200, y: height - 150, w: 150, h: 20, vx: 0 });
  platforms.push({ x: 400, y: height - 250, w: 150, h: 20, vx: 2 });
  platforms.push({ x: 600, y: height - 350, w: 150, h: 20, vx: -2 });
  // Create coins
  coins.push({ x: 250, y: height - 180, r: 10 });
  coins.push({ x: 450, y: height - 280, r: 10 });
  coins.push({ x: 650, y: height - 380, r: 10 });
}

function draw() {
  // Parallax background
  background(50, 50, 100);
  bgOffset -= 0.5;
  if (bgOffset < -width) bgOffset = 0;
  fill(80, 80, 150);
  for (let i = -1; i < 2; i++) {
    rect(bgOffset + i * width, height - 100, width, 50);
  }
  
  // Update player
  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;
  
  // Ground collision
  if (player.y > groundY) {
    player.y = groundY;
    player.vy = 0;
    player.isJumping = false;
    jumpCount = 0;
  }
  
  // Update and draw moving platforms
  for (let platform of platforms) {
    if (platform.vx) {
      platform.x += platform.vx;
      if (platform.x < 0 || platform.x + platform.w > width) platform.vx *= -1;
    }
    fill(200, 100, 50);
    rect(platform.x, platform.y, platform.w, platform.h);
    
    // Platform collision
    if (player.x + player.w > platform.x && player.x < platform.x + platform.w &&
        player.y + player.h > platform.y && player.y + player.h < platform.y + platform.h + 10 &&
        player.vy > 0) {
      player.y = platform.y - player.h;
      player.vy = 0;
      player.isJumping = false;
      jumpCount = 0;
    }
  }
  
  // Handle movement with arrow keys
  if (keyIsDown(LEFT_ARROW)) {
    player.vx = -player.speed;
  } else if (keyIsDown(RIGHT_ARROW)) {
    player.vx = player.speed;
  } else {
    player.vx = 0;
  }
  
  // Coin collection
  for (let i = coins.length - 1; i >= 0; i--) {
    let coin = coins[i];
    fill(255, 255, 0);
    ellipse(coin.x, coin.y, coin.r * 2);
    if (dist(player.x + player.w / 2, player.y + player.h / 2, coin.x, coin.y) < coin.r + player.w / 2) {
      coins.splice(i, 1);
      score += 10;
      if (coinSound) coinSound.play();
    }
  }
  
  // Draw ground
  fill(100, 200, 100);
  rect(0, groundY + 10, width, height - groundY - 10);
  
  // Draw player
  fill(255, 100, 100);
  rect(player.x, player.y, player.w, player.h);
  
  // UI: Score and instructions
  fill(255);
  textSize(16);
  text(`Score: ${score}`, 10, 50);
  text("Arrow keys to move, Space to double jump", 10, 30);
}

function keyPressed() {
  if (keyCode === 32 && jumpCount < maxJumps) { // Space key for jumping
    player.vy = jumpForce;
    jumpCount++;
    player.isJumping = true;
    if (jumpSound) jumpSound.play();
  }
}

function keyReleased() {
  if (keyCode === LEFT_ARROW || keyCode === RIGHT_ARROW) {
    player.vx = 0;
  }
}
</script>
</body>
</html>
