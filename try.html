<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Clicker Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f5f5f5;
    }
    #cookie {
      width: 200px;
      height: 200px;
      background-color: #f7c831;
      border-radius: 50%;
      cursor: pointer;
      margin: 50px auto;
      display: block;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
    }
    #cookie h2 {
      margin-top: 65px;
      color: white;
      font-size: 2rem;
    }
    .button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1.2rem;
      cursor: pointer;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 5px;
    }
    .button:hover {
      background-color: #45a049;
    }
    .upgrade {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .upgrade div {
      padding: 10px;
      background-color: #ffcc00;
      border-radius: 5px;
      cursor: pointer;
    }
    .upgrade div:hover {
      background-color: #ffbb33;
    }
  </style>
</head>
<body>
  <h1>Cookie Clicker Game</h1>
  <div id="cookie">
    <h2 id="cookieCount">0 Cookies</h2>
  </div>

  <button class="button" id="clickButton">Click me!</button>

  <div class="upgrade">
    <div id="upgrade1">
      <h3>Auto-clicker (Cost: 100 cookies)</h3>
    </div>
    <div id="upgrade2">
      <h3>Cookie Factory (Cost: 500 cookies)</h3>
    </div>
  </div>

  <script>
    let cookieCount = 0;
    let autoClickerEnabled = false;
    let cookieFactoryEnabled = false;

    // Update the cookie count on the screen
    function updateCookieDisplay() {
      document.getElementById('cookieCount').innerText = `${cookieCount} Cookies`;
    }

    // Handle clicking the cookie to earn cookies
    document.getElementById('clickButton').addEventListener('click', () => {
      cookieCount++;
      updateCookieDisplay();
    });

    // Auto-clicker logic
    function autoClicker() {
      if (autoClickerEnabled) {
        cookieCount += 1;
        updateCookieDisplay();
      }
    }

    // Cookie factory logic
    function cookieFactory() {
      if (cookieFactoryEnabled) {
        cookieCount += 5;
        updateCookieDisplay();
      }
    }

    // Periodically call auto-clicker and cookie factory functions
    setInterval(autoClicker, 1000);
    setInterval(cookieFactory, 5000);

    // Handle purchasing upgrades
    document.getElementById('upgrade1').addEventListener('click', () => {
      if (cookieCount >= 100 && !autoClickerEnabled) {
        cookieCount -= 100;
        autoClickerEnabled = true;
        updateCookieDisplay();
        alert('You bought an Auto-clicker!');
      }
    });

    document.getElementById('upgrade2').addEventListener('click', () => {
      if (cookieCount >= 500 && !cookieFactoryEnabled) {
        cookieCount -= 500;
        cookieFactoryEnabled = true;
        updateCookieDisplay();
        alert('You bought a Cookie Factory!');
      }
    });
  </script>
</body>
</html>
