<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Face Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        #camera-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 1px solid #ddd;
        }
        video {
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror the video feed */
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="camera-container">
        <video id="video" autoplay></video>
        <canvas id="canvas"></canvas>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const displaySize = { width: 640, height: 480 };

        async function setupCamera() {
            // Access the webcam
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                // Set the canvas size to match video
                canvas.width = displaySize.width;
                canvas.height = displaySize.height;
            };
        }

        async function loadModels() {
            // Load face-api.js models for face detection and face landmarks
            await faceapi.nets.ssdMobilenetv1.loadFromUri('models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('models');
        }

        async function detectFace() {
            // Detect faces and landmarks
            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();

            // Clear previous detections
            canvas?.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            if (detections.length > 0) {
                // Draw face detections and landmarks
                faceapi.draw.drawDetections(canvas, detections);
                faceapi.draw.drawLandmarks(canvas, detections);
            }

            // Call detectFace every animation frame to keep it continuous
            requestAnimationFrame(detectFace);
        }

        // Load models, setup camera, and start face detection
        window.onload = async () => {
            await loadModels();
            await setupCamera();
            video.onplay = () => {
                detectFace();
            };
        };
    </script>
</body>
</html>
