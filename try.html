<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Finder</title>
  <style>
    /* Global Styles */
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #f8f8f8;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 20px;
      color: #333;
    }

    /* Form Styling */
    #search-form {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    #query {
      width: 300px;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid #ddd;
      outline: none;
      transition: border-color 0.3s ease;
    }

    #query:focus {
      border-color: #4e90e8;
    }

    button {
      padding: 12px 18px;
      font-size: 1rem;
      background-color: #4e90e8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #357bb7;
    }

    /* Image Grid Styling */
    #result {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      justify-items: center;
      max-width: 90%;
      margin: 0 auto;
    }

    #result img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #result img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      #search-form {
        flex-direction: column;
        gap: 10px;
      }

      #query {
        width: 250px;
      }

      button {
        width: 250px;
      }
    }

    @media (max-width: 480px) {
      #query {
        width: 200px;
      }

      button {
        width: 200px;
      }
    }
  </style>
</head>
<body>
  <div>
    <h1>AI Image Finder</h1>
    <div id="search-form">
      <input type="text" id="query" placeholder="Type something..." required />
      <button onclick="searchImage()">Search</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    const API_KEY = 'YOUR_UNSPLASH_API_KEY'; // Replace with your Unsplash API Key

    async function searchImage() {
      const query = document.getElementById('query').value;
      if (!query) return;

      const response = await fetch(`https://api.unsplash.com/search/photos?query=${query}&client_id=${API_KEY}`);
      const data = await response.json();

      const resultContainer = document.getElementById('result');
      resultContainer.innerHTML = ''; // Clear previous results

      if (data.results.length > 0) {
        data.results.forEach(image => {
          const imgElement = document.createElement('img');
          imgElement.src = image.urls.small;
          imgElement.alt = image.alt_description;
          resultContainer.appendChild(imgElement);
        });
      } else {
        resultContainer.innerHTML = '<p style="color: #999; font-size: 1.2rem;">No images found. Try another search.</p>';
      }
    }
  </script>
</body>
</html>
