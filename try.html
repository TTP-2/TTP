<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Cube Game</title>
    <style>
      body { margin: 0; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // Scene setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Platform and Cube setup
      const platformGeometry = new THREE.BoxGeometry(10, 0.5, 10);
      const platformMaterial = new THREE.MeshBasicMaterial({ color: 0x808080 });
      const platform = new THREE.Mesh(platformGeometry, platformMaterial);
      scene.add(platform);

      const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
      const cubeMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
      cube.position.y = 1;
      scene.add(cube);

      // Lighting
      const light = new THREE.PointLight(0xffffff, 1, 100);
      light.position.set(5, 5, 5);
      scene.add(light);

      // Camera Position
      camera.position.z = 15;

      // Movement variables
      let speed = 0.1;
      let jumpSpeed = 0.2;
      let isJumping = false;
      let velocityY = 0;
      let isOnGround = true;

      // Keyboard controls
      let moveForward = false;
      let moveBackward = false;
      let moveLeft = false;
      let moveRight = false;
      let jump = false;

      document.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowUp' || event.key === 'w') moveForward = true;
        if (event.key === 'ArrowDown' || event.key === 's') moveBackward = true;
        if (event.key === 'ArrowLeft' || event.key === 'a') moveLeft = true;
        if (event.key === 'ArrowRight' || event.key === 'd') moveRight = true;
        if (event.key === ' ' && isOnGround) jump = true;
      });

      document.addEventListener('keyup', (event) => {
        if (event.key === 'ArrowUp' || event.key === 'w') moveForward = false;
        if (event.key === 'ArrowDown' || event.key === 's') moveBackward = false;
        if (event.key === 'ArrowLeft' || event.key === 'a') moveLeft = false;
        if (event.key === 'ArrowRight' || event.key === 'd') moveRight = false;
      });

      // Game loop and physics
      function animate() {
        requestAnimationFrame(animate);

        // Handle movement
        if (moveForward) cube.position.z -= speed;
        if (moveBackward) cube.position.z += speed;
        if (moveLeft) cube.position.x -= speed;
        if (moveRight) cube.position.x += speed;

        // Handle jumping
        if (jump && isOnGround) {
          isJumping = true;
          velocityY = jumpSpeed;
          jump = false;
        }

        // Apply gravity
        if (!isOnGround) {
          velocityY -= 0.01;
        }

        cube.position.y += velocityY;

        // Prevent falling off the platform
        if (cube.position.y <= 1) {
          cube.position.y = 1;
          velocityY = 0;
          isOnGround = true;
        } else {
          isOnGround = false;
        }

        // Rotate the cube
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;

        // Render scene
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
