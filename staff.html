<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection with Webcam</title>
    <style>
        /* Ensure the body takes up the full height of the screen */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Style the centered div */
        .center-div {
            width: 500px;  /* Increased size */
            height: 400px; /* Increased size */
            background-color: lightblue;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            overflow: hidden; /* Hide anything outside the div */
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* To make sure it doesn't interfere with the video */
        }
    </style>
</head>
<body>
    <div class="center-div">
        <video id="video" autoplay></video>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Include Face-api.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

    <script>
        // Set up webcam and face detection
        async function setupWebcam() {
            // Load face-api.js models
            await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('/models');

            // Set up webcam
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            // Set up canvas to draw the detected faces
            const canvas = document.getElementById('canvas');
            canvas.width = video.width;
            canvas.height = video.height;

            // Call the face detection loop
            detectFaces(video, canvas);
        }

        // Detect faces in the video feed
        async function detectFaces(video, canvas) {
            const detections = await faceapi.detectAllFaces(video)
                .withFaceLandmarks()
                .withFaceDescriptors();

            // Clear previous face detections
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            // Draw detected faces and face landmarks
            faceapi.draw.drawDetections(canvas, detections);
            faceapi.draw.drawFaceLandmarks(canvas, detections);

            // Draw a teal outline around the face
            const context = canvas.getContext('2d');
            detections.forEach(detection => {
                const { x, y, width, height } = detection.detection.box;
                context.beginPath();
                context.lineWidth = 3;
                context.strokeStyle = 'teal';
                context.rect(x, y, width, height);
                context.stroke();
            });

            // Call detectFaces again for continuous detection
            requestAnimationFrame(() => detectFaces(video, canvas));
        }

        // Start the webcam and face detection process
        setupWebcam();
    </script>
</body>
</html>
