<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Web Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #controls {
      display: flex;
      padding: 10px;
      background: #f4f4f4;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    #controls input {
      flex: 1;
      padding: 5px;
      margin-right: 5px;
    }
    #viewer {
      flex: 1;
      border: none;
    }
  </style>
</head>
<body>
  <div id="controls">
    <input type="text" id="url" placeholder="Enter URL here" />
    <button onclick="navigate()">Go</button>
  </div>
  <iframe id="viewer"></iframe>

  <script>
    function navigate() {
      const urlInput = document.getElementById('url').value;
      const viewer = document.getElementById('viewer');
      const url = urlInput.startsWith('http://') || urlInput.startsWith('https://')
        ? urlInput
        : `https://${urlInput}`;
      viewer.src = url;
    }
  </script>
</body>
</html>
