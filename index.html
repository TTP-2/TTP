<!DOCTYPE html>
<html>
<head>
<title>Online HTML Editor</title>
<link rel="icon" href="IMG.png" type="image/png">
<style>
    body {
        align-items: center;
    }
    div {
        border: 1px black solid;
        width: 250px;
        height: 410px;
        margin: auto;
        text-align: center;
        justify-content: center;
    }
    button {
        background-color: #ccc;
        border: none;
        width: 210px;
        height: 40px;
        border-radius: 50px;
        cursor: pointer;
        background-color: teal;
        transition: background-color 1.0s;
    }
    button:hover {
        background-color: #ccc;
    }
    .staff {
        width: 210px;
        height: 125px;
    }
</style>
</head>
<body>
<div>
    <h1>TTP sign up</h1>
    <p>Email</p>
    <input type="email" placeholder="Email" oninput="trigger()">
    <p>password</p>
    <input type="password" placeholder="Password">
    <br>
    <br>
    <button onclick="window.location.href='https://ttp-2.github.io/TTP/'" onclick="function()" id="OKB" disabled>OK</button>
    <hr>
    <h4 id="text"></h4>
</div>
<script>
    function trigger() {
        document.getElementById('OKB').disabled = false;
    }
</script>
</body>
</html>
