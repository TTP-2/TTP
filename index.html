  <head>

      body {
        background-color: black;
      }

        color: teal;

  <body>
    <h1>TTP sign up</h1>
    <form>

      <h4>password:</h4>
      <input type="password" placeholder="password" class="input"> <button><a href="https://TTP-2.github.io/TTP/">OK</a></button>

      <input type="color">
    </form>
