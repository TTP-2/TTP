<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Blank Website</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: white;
      color: black;
      font-family: Arial, sans-serif;
    }
    header {
      background-color: teal;
      color: white;
      padding: 37px;
      text-align: center;
      font-size: 24px;
      position: relative;
    }
    .logo {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: bold;
      font-size: 28px;
    }
    .qr-image {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      height: 40px;
      width: auto;
      cursor: pointer;
      transition: transform 0.5s ease;
    }
    .qr-image.enlarged {
      transform: translateY(-50%) scale(2); /* double size */
      z-index: 10;
      position: absolute;
    }
    .center-content {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80vh;
      flex-direction: column;
      text-align: center;
    }
    .border-box {
      border: 1px solid black;
      border-radius: 5px;
      padding: 15px 25px;
      display: inline-block;
      background-color: white;
    }
    .border-box h1 {
      font-size: 36px;
      font-weight: bold;
      margin: 0;
    }
    .border-box p {
      font-size: 18px;
      margin: 10px 0 0 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">TTP</div>
    <img src="QR.png" alt="QR Code" class="qr-image" id="qrImage" />
  </header>

  <div class="center-content">
    <div class="border-box">
      <h1>Welcome</h1>
      <p>Dream work makes the team work.</p>
    </div>
  </div>

  <script>
    const qrImage = document.getElementById('qrImage');
    let timeoutId;

    qrImage.addEventListener('click', () => {
      // If already enlarged, do nothing
      if (qrImage.classList.contains('enlarged')) return;

      qrImage.classList.add('enlarged');

      // After 20 seconds, shrink back
      timeoutId = setTimeout(() => {
        qrImage.classList.remove('enlarged');
      }, 20000);
    });
  </script>
</body>
</html>
