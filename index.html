<!docktype html>
<html>
  <head>
    <title>TTP sign up</title>
    <style>
      body {
        background-color: white;
      }
      h1 {
        color: teal;
      }
      h4 {
        color: teal;
      }
      a {
          color: teal;
          text-decoration: none;
      }
      button {
          background-color: black;
          border: 1px solid teal;
          width: 40px;
          border-radius: 50px;
          cursor: pointer;
      }
      .input {
          border-radius: 2px;
          border: none;
      }
      p {
        color: teal;
      }
      .button2 {
          width: 100px;
          height: 50px;
      }
      div {
          border: solid black 1px;
          width: 250px;
          padding-left: 5px;
          margin: auto;
          border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div>
    <h1>TTP sign up</h1>
    <form>
      <h4>Email:</h4>
      <input type="email" placeholder="email" class="input">
      <h4>password:</h4>
      <input type="password" placeholder="password" class="input"> <button><a href="https://TTP-2.github.io/TTP/Loading.html">OK</a></button>
      <h4>Favourite colour</h4>
      <input type="color">
      <br>
      <label for="CB"><h4>Save</h4></label>
      <input type="checkbox" id="CB" value="rember me">
      <br>
      <br>
      <button class="button2" onclick="openCustomWindow()"><p>Open in app</p></button>
    </form>
    </div>
      <script>
    function openCustomWindow() {
        const url = "https://ttp-2.github.io/TTP/";
        const windowFeatures = "width=800,height=600,top=100,left=100,scrollbars=yes";
        window.open(url, "_blank", windowFeatures);
    }
    </script>
  </body>
</html>
