<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intergram</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 100%;
            background-color: #D3D3D3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
        }
        .home-icon {
            font-size: 24px;
            color: black;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .home-icon.active {
            color: #FFA500;
        }
        .content {
            display: none;
            position: absolute;
            top: 0;
            left: 60px;
            width: calc(100% - 60px);
            height: 100%;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .plus-box {
            width: 250px;
            height: 300px;
            background-color: #D3D3D3;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: absolute;
            top: 20px;
            left: 20px;
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
        }
        .plus-box:hover {
            transform: scale(1.05);
        }
        .plus {
            font-size: 48px;
            color: #000;
        }
        #videoInput {
            display: none;
        }
        #videoPlayer {
            margin-top: 350px;
            max-width: 80%;
            max-height: 400px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fas fa-home home-icon" onclick="setActive(this)"></i>
    </div>

    <div class="content" id="homeContent">
        <div class="plus-box" onclick="triggerDownload()">
            <span class="plus">+</span>
        </div>
        <input type="file" id="videoInput" accept="video/*" />
        <video id="videoPlayer" controls></video>
    </div>

    <script>
        function setActive(icon) {
            const icons = document.querySelectorAll('.home-icon');
            icons.forEach(i => i.classList.remove('active'));
            icon.classList.add('active');
            const homeContent = document.getElementById('homeContent');
            homeContent.style.display = 'block';
        }

        function triggerDownload() {
            const videoInput = document.getElementById('videoInput');
            videoInput.click();

            videoInput.onchange = () => {
                const file = videoInput.files[0];
                if (file && file.type.startsWith('video/')) {
                    const url = URL.createObjectURL(file);

                    // Set video source and show player
                    const videoPlayer = document.getElementById('videoPlayer');
                    videoPlayer.src = url;
                    videoPlayer.style.display = 'block';

                    // Auto-download
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    alert('Please select a valid video file.');
                }
            };
        }
    </script>
</body>
</html>
