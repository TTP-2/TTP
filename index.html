<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intergram</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"> <!-- Link to Font Awesome -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Hides any overflow */
        }
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 100%;
            background-color: #D3D3D3; /* Light Gray */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
        }
        .home-icon {
            font-size: 24px;
            color: black; /* Default icon color */
            margin-bottom: 20px;
            cursor: pointer;
        }
        .home-icon.active {
            color: #FFA500; /* Orange when active */
        }
        .content {
            display: none; /* Hide the content initially */
            position: absolute;
            top: 0;
            left: 60px; /* Position next to the sidebar */
            width: calc(100% - 60px);
            height: 100%;
            background-color: white;
        }
        .plus-box {
            width: 250px;  /* Width as requested */
            height: 300px; /* Height as requested */
            background-color: #D3D3D3; /* Light Gray background */
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000; /* Optional border for visibility */
            position: absolute;
            top: 20px;
            left: 20px; /* Positioned in the top-left */
        }
        .plus {
            font-size: 48px;  /* Large size for the plus sign */
            color: #000; /* Black color for the plus sign */
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fas fa-home home-icon" onclick="setActive(this)"></i> <!-- Home icon -->
    </div>
    
    <div class="content" id="homeContent">
        <div class="plus-box">
            <span class="plus">+</span> <!-- Plus sign in the middle -->
        </div>
    </div>

    <script>
        function setActive(icon) {
            // Remove active class from all icons
            const icons = document.querySelectorAll('.home-icon');
            icons.forEach(i => i.classList.remove('active'));
            // Add active class to the clicked icon
            icon.classList.add('active');
            
            // Show home content when the home icon is clicked
            const homeContent = document.getElementById('homeContent');
            homeContent.style.display = 'block';  // Change to 'block' to show the content
        }
    </script>
</body>
</html>
