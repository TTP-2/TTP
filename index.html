<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blank Website</title>
    <style>
        /* Remove default margin and padding */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to right, blue, purple);
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            height: 60px;
            width: 100%;
            display: flex;
            align-items: center;
            padding-left: 10px;
            position: relative;
        }
        header img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" />
    </header>
</body>
</html>
