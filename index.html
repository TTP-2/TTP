<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intergram</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 100%;
            background-color: #D3D3D3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
        }
        .icon {
            font-size: 24px;
            color: black;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .icon.active {
            color: #FFA500;
        }
        .content {
            display: none;
            position: absolute;
            top: 0;
            left: 60px;
            width: calc(100% - 60px);
            height: 100%;
            background-color: white;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }
        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .file-list {
            display: flex;
            flex-wrap: wrap;
        }
        .plus-box {
            width: 250px;
            height: 300px;
            background-color: #D3D3D3;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            border-radius: 12px;
            margin: 10px;
            cursor: pointer;
        }
        .plus-box:hover {
            transform: scale(1.05);
        }
        .plus {
            font-size: 48px;
            color: #000;
        }
        #videoInput, #imageInput {
            display: none;
        }
        .file-item {
            width: 250px;
            height: 300px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            border-radius: 12px;
            margin: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .file-item img, .file-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fas fa-home icon" onclick="showContent('home')"></i>
        <i class="fas fa-film icon" onclick="showContent('video')"></i>
        <i class="fas fa-image icon" onclick="showContent('image')"></i>
    </div>

    <div class="content" id="homeContent">
        <div class="section-title">Videos</div>
        <div class="file-list" id="homeVideoList"></div>
        <div class="section-title">Pictures</div>
        <div class="file-list" id="homeImageList"></div>
    </div>

    <div class="content" id="videoContent">
        <div class="plus-box" onclick="triggerVideoDownload()">
            <span class="plus">+</span>
        </div>
        <input type="file" id="videoInput" accept="video/*" multiple />
        <div class="file-list" id="videoList"></div>
    </div>

    <div class="content" id="imageContent">
        <div class="plus-box" onclick="triggerImageDownload()">
            <span class="plus">+</span>
        </div>
        <input type="file" id="imageInput" accept="image/*" multiple />
        <div class="file-list" id="imageList"></div>
    </div>

    <script>
        function showContent(type) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));

            const map = { home: 'homeContent', video: 'videoContent', image: 'imageContent' };
            document.getElementById(map[type]).style.display = 'flex';
            document.querySelectorAll('.icon')[['home', 'video', 'image'].indexOf(type)].classList.add('active');
        }

        function triggerVideoDownload() {
            document.getElementById('videoInput').click();
        }

        function triggerImageDownload() {
            document.getElementById('imageInput').click();
        }

        function saveToLocalStorage(type, base64) {
            const key = type === 'video' ? 'videos' : 'images';
            let items = JSON.parse(localStorage.getItem(key)) || [];
            items.push(base64);
            localStorage.setItem(key, JSON.stringify(items));
        }

        function loadFromLocalStorage() {
            const videos = JSON.parse(localStorage.getItem('videos')) || [];
            const images = JSON.parse(localStorage.getItem('images')) || [];

            videos.forEach(src => addVideoToDOM(src));
            images.forEach(src => addImageToDOM(src));
        }

        function addVideoToDOM(src) {
            const box = document.createElement('div');
            box.className = 'file-item';
            const vid = document.createElement('video');
            vid.src = src;
            vid.controls = true;
            box.appendChild(vid);
            document.getElementById('videoList').appendChild(box);
            document.getElementById('homeVideoList').appendChild(box.cloneNode(true));
        }

        function addImageToDOM(src) {
            const box = document.createElement('div');
            box.className = 'file-item';
            const img = document.createElement('img');
            img.src = src;
            box.appendChild(img);
            document.getElementById('imageList').appendChild(box);
            const clone = box.cloneNode(true);
            document.getElementById('homeImageList').appendChild(clone);
        }

        document.getElementById('videoInput').addEventListener('change', e => {
            Array.from(e.target.files).forEach(file => {
                if (file.type.startsWith('video/')) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        saveToLocalStorage('video', reader.result);
                        addVideoToDOM(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        document.getElementById('imageInput').addEventListener('change', e => {
            Array.from(e.target.files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        saveToLocalStorage('image', reader.result);
                        addImageToDOM(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        window.onload = () => {
            loadFromLocalStorage();
            showContent('home');
        };
    </script>
</body>
</html>
