<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueHorizon - Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out;
    }
    /* Smooth hover effects */
    .hover-scale {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-scale:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    /* Plus button styling */
    .plus-button {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }
    /* Full-screen textarea */
    .full-textarea {
      min-height: calc(100vh - 4rem);
      resize: none;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Navigation Bar -->
  <nav class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">BlueHorizon</h1>
      <div class="space-x-4">
        <a href="#" class="hover:text-blue-200 transition">Home</a>
        <a href="#" class="hover:text-blue-200 transition">About</a>
        <a href="#" class="hover:text-blue-200 transition">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="bg-gradient-to-r from-blue-500 to-blue-700 text-white py-20 text-center">
    <div class="container mx-auto px-4">
      <h1 class="text-5xl font-extrabold mb-4 animate-fadeIn">Welcome to BlueHorizon</h1>
      <p class="text-xl mb-6 animate-fadeIn">Discover a world of possibilities. Log in to start your journey!</p>
    </div>
  </header>

  <!-- Login Section -->
  <section class="py-16" id="login-section">
    <div class="container mx-auto px-4 flex justify-center">
      <div class="bg-white p-10 rounded-xl shadow-2xl w-full max-w-lg animate-fadeIn">
        <h2 class="text-3xl font-semibold text-center text-gray-800 mb-8">Join the Horizon</h2>

        <!-- Login Form -->
        <div id="login-form">
          <div class="mb-6">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
            <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Enter your email" required>
          </div>
          <button onclick="sendVerificationCode()" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 hover-scale transition">Send Verification Code</button>
        </div>

        <!-- Verification Code Form -->
        <div id="verification-form" class="hidden">
          <div class="mb-6">
            <label for="code" class="block text-sm font-medium text-gray-700 mb-2">Verification Code</label>
            <input type="text" id="code" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Enter 6-digit code" maxlength="6" required>
          </div>
          <button onclick="verifyCode()" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 hover-scale transition">Verify Code</button>
        </div>

        <!-- Dashboard with Buttons -->
        <div id="dashboard" class="hidden text-center">
          <p class="mb-6 text-green-600 font-medium text-lg">You're in! Welcome!</p>
          <div class="flex flex-col items-center space-y-6">
            <button onclick="showAppCreationPage()" class="bg-blue-500 text-white plus-button hover:bg-blue-600 hover-scale transition">
              +
            </button>
            <p class="text-sm text-gray-600">Create a New App</p>
            <div class="flex space-x-4">
              <button onclick="alert('View your apps (placeholder action)')" class="bg-gray-200 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-300 hover-scale transition">View Apps</button>
              <button onclick="alert('Open settings (placeholder action)')" class="bg-gray-200 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-300 hover-scale transition">Settings</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- App Creation Page -->
  <section id="app-creation" class="hidden bg-gray-100">
    <div class="relative h-screen">
      <button onclick="runApp()" class="fixed top-4 right-4 bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 hover-scale transition">Run</button>
      <textarea id="app-input" class="full-textarea w-full p-4 text-gray-800 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your app code or configuration here..."></textarea>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-blue-600 text-white py-8 text-center">
    <p class="text-sm">© 2025 BlueHorizon. All rights reserved.</p>
  </footer>

  <script>
    let generatedCode = null;

    function generateCode() {
      // Generate a random 6-digit code
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function sendVerificationCode() {
      const email = document.getElementById('email').value;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert('Please enter a valid email address.');
        return;
      }
      // Generate and "send" verification code
      generatedCode = generateCode();
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('verification-form').classList.remove('hidden');
      alert(`Your verification code is: ${generatedCode}\n(This simulates an email sent to ${email})`);
    }

    function verifyCode() {
      const code = document.getElementById('code').value;
      if (code === generatedCode) {
        document.getElementById('verification-form').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
      } else {
        alert('Invalid code. Please try again.');
      }
    }

    function showAppCreationPage() {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('app-creation').classList.remove('hidden');
      document.querySelector('nav').classList.add('hidden');
      document.querySelector('header').classList.add('hidden');
      document.querySelector('footer').classList.add('hidden');
    }

    function runApp() {
      const input = document.getElementById('app-input').value;
      if (!input.trim()) {
        alert('Please enter some content to run.');
        return;
      }
      alert('Running your app:\n' + input.substring(0, 100) + (input.length > 100 ? '...' : ''));
      // In a real app, this would send the input to a backend for processing
    }
  </script>
</body>
</html>
