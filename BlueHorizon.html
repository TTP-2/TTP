<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueHorizon - Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Prism.js for syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <style>
    /* Custom animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out;
    }
    /* Smooth hover effects */
    .hover-scale {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-scale:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    /* Plus button styling */
    .plus-button {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }
    /* Full-screen textarea */
    .full-textarea {
      min-height: calc(100vh - 8rem);
      resize: none;
      font-family: monospace;
      font-size: 14px;
    }
    /* Full-screen preview */
    .preview-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    /* Prism.js override for textarea */
    .prism-textarea {
      background: #f5f2f0 !important;
      color: #000 !important;
      border: 1px solid #d1d5db !important;
      padding: 16px !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }
    /* OTP input styling */
    .otp-input {
      width: 2.5rem;
      height: 2.5rem;
      text-align: center;
      font-size: 1.25rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .otp-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
  </style>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Navigation Bar -->
  <nav class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">BlueHorizon</h1>
      <div class="space-x-4">
        <a href="#" class="hover:text-blue-200 transition">Home</a>
        <a href="#" class="hover:text-blue-200 transition">About</a>
        <a href="#" class="hover:text-blue-200 transition">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="bg-gradient-to-r from-blue-500 to-blue-700 text-white py-20 text-center">
    <div class="container mx-auto px-4">
      <h1 class="text-5xl font-extrabold mb-4 animate-fadeIn">Welcome to BlueHorizon</h1>
      <p class="text-xl mb-6 animate-fadeIn">Discover a world of possibilities. Log in to start your journey!</p>
    </div>
  </header>

  <!-- Login Section -->
  <section class="py-16" id="login-section">
    <div class="container mx-auto px-4 flex justify-center">
      <div class="bg-white p-10 rounded-xl shadow-2xl w-full max-w-lg animate-fadeIn">
        <h2 class="text-3xl font-semibold text-center text-gray-800 mb-8">Join the Horizon</h2>

        <!-- Login Form -->
        <div id="login-form">
          <div class="mb-6">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
            <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Enter your email" required>
          </div>
          <button onclick="sendVerificationCode()" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 hover-scale transition">Send Verification Code</button>
        </div>

        <!-- Verification Code Form -->
        <div id="verification-form" class="hidden">
          <div class="mb-6">
            <label class="block text-lg font-medium text-gray-700 mb-4 text-center">Enter Verification Code</label>
            <div class="flex justify-center space-x-2">
              <input type="text" class="otp-input" maxlength="1" oninput="handleOtpInput(this, 0)" onkeydown="handleOtpKeydown(event, 0)">
              <input type="text" class="otp-input" maxlength="1" oninput="handleOtpInput(this, 1)" onkeydown="handleOtpKeydown(event, 1)">
              <input type="text" class="otp-input" maxlength="1" oninput="handleOtpInput(this, 2)" onkeydown="handleOtpKeydown(event, 2)">
              <input type="text" class="otp-input" maxlength="1" oninput="handleOtpInput(this, 3)" onkeydown="handleOtpKeydown(event, 3)">
              <input type="text" class="otp-input" maxlength="1" oninput="handleOtpInput(this, 4)" onkeydown="handleOtpKeydown(event, 4)">
              <input type="text" class="otp-input" maxlength="1" oninput="handleOtpInput(this, 5)" onkeydown="handleOtpKeydown(event, 5)">
            </div>
          </div>
        </div>

        <!-- Dashboard with Buttons -->
        <div id="dashboard" class="hidden text-center">
          <p class="mb-6 text-green-600 font-medium text-lg">You're in! Welcome!</p>
          <div class="flex flex-col items-center space-y-6">
            <button onclick="showAppCreationPage()" class="bg-blue-500 text-white plus-button hover:bg-blue-600 hover-scale transition">
              +
            </button>
            <p class="text-sm text-gray-600">Create a New App</p>
            <div class="flex space-x-4">
              <button onclick="alert('View your apps (placeholder action)')" class="bg-gray-200 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-300 hover-scale transition">View Apps</button>
              <button onclick="alert('Open settings (placeholder action)')" class="bg-gray-200 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-300 hover-scale transition">Settings</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- App Creation Page -->
  <section id="app-creation" class="hidden bg-gray-100">
    <div class="relative h-screen">
      <div class="fixed top-4 right-4 flex flex-col space-y-2">
        <button onclick="runApp()" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 hover-scale transition">Run</button>
        <button onclick="launchApp()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 hover-scale transition">Launch</button>
      </div>
      <textarea id="app-input" class="full-textarea prism-textarea language-html" placeholder="Enter your HTML code here..."></textarea>
    </div>
  </section>

  <!-- Preview Overlay -->
  <div id="preview-overlay" class="preview-overlay hidden">
    <button onclick="closePreview()" class="absolute top-4 right-4 bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 hover-scale transition">Close</button>
    <iframe id="preview-iframe" class="w-4/5 h-4/5 bg-white border border-gray-300 rounded-lg"></iframe>
  </div>

  <!-- Footer -->
  <footer class="bg-blue-600 text-white py-8 text-center">
    <p class="text-sm">© 2025 BlueHorizon. All rights reserved.</p>
  </footer>

  <script>
    let generatedCode = null;

    function generateCode() {
      // Generate a random 6-digit code
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function sendVerificationCode() {
      const email = document.getElementById('email').value;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert('Please enter a valid email address.');
        return;
      }
      // Generate and "send" verification code
      generatedCode = generateCode();
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('verification-form').classList.remove('hidden');
      alert(`Your verification code is: ${generatedCode}\n(This simulates an email sent to ${email})`);
    }

    function handleOtpInput(input, index) {
      // Allow only digits
      input.value = input.value.replace(/[^0-9]/g, '');
      // Move to next input if a digit is entered
      if (input.value && index < 5) {
        document.querySelectorAll('.otp-input')[index + 1].focus();
      }
      // Auto-submit if all 6 digits are entered
      const inputs = document.querySelectorAll('.otp-input');
      const code = Array.from(inputs).map(input => input.value).join('');
      if (code.length === 6) {
        verifyCode();
      }
    }

    function handleOtpKeydown(event, index) {
      const inputs = document.querySelectorAll('.otp-input');
      // Move to previous input on backspace if empty
      if (event.key === 'Backspace' && !inputs[index].value && index > 0) {
        inputs[index - 1].focus();
      }
      // Move to next input on any key if current is filled
      if (event.key.length === 1 && inputs[index].value && index < 5) {
        inputs[index + 1].focus();
      }
    }

    function verifyCode() {
      const inputs = document.querySelectorAll('.otp-input');
      const code = Array.from(inputs).map(input => input.value).join('');
      if (code.length !== 6 || !/^\d{6}$/.test(code)) {
        alert('Please enter a valid 6-digit code.');
        return;
      }
      if (code === generatedCode) {
        document.getElementById('verification-form').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        // Clear inputs
        inputs.forEach(input => input.value = '');
      } else {
        alert('Invalid code. Please try again.');
        inputs.forEach(input => input.value = '');
        inputs[0].focus();
      }
    }

    function showAppCreationPage() {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('app-creation').classList.remove('hidden');
      document.querySelector('nav').classList.add('hidden');
      document.querySelector('header').classList.add('hidden');
      document.querySelector('footer').classList.add('hidden');
      // Initialize syntax highlighting
      updateSyntaxHighlighting();
    }

    function updateSyntaxHighlighting() {
      const textarea = document.getElementById('app-input');
      const code = textarea.value;
      // Create a temporary pre/code element for Prism to highlight
      const tempCode = document.createElement('code');
      tempCode.className = 'language-html';
      tempCode.textContent = code;
      Prism.highlightElement(tempCode);
      // Update textarea with highlighted content
      textarea.innerHTML = tempCode.innerHTML;
    }

    function autoCloseTag(textarea, event) {
      // Only trigger on '>' key
      if (event.key !== '>') return;

      const value = textarea.value;
      const cursorPos = textarea.selectionStart;
      const beforeCursor = value.substring(0, cursorPos);
      const afterCursor = value.substring(cursorPos);

      // Match an opening tag that ends with '>'
      const tagMatch = beforeCursor.match(/<([a-zA-Z][a-zA-Z0-9]*)(?:\s+[^>]*)?>$/);
      if (tagMatch) {
        const tagName = tagMatch[1].toLowerCase();
        // List of void elements that don't need closing tags
        const voidElements = [
          'area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input',
          'link', 'meta', 'param', 'source', 'track', 'wbr'
        ];
        if (!voidElements.includes(tagName)) {
          const closingTag = `</${tagName}>`;
          // Insert closing tag and maintain cursor position
          textarea.value = beforeCursor + closingTag + afterCursor;
          textarea.selectionStart = textarea.selectionEnd = cursorPos;
          // Update syntax highlighting after insertion
          updateSyntaxHighlighting();
        }
      }
    }

    // Initialize textarea event listeners
    const textarea = document.getElementById('app-input');
    textarea.addEventListener('input', function(e) {
      updateSyntaxHighlighting();
    });
    textarea.addEventListener('keydown', function(e) {
      autoCloseTag(this, e);
    });

    function runApp() {
      const input = document.getElementById('app-input').value;
      if (!input.trim()) {
        alert('Please enter some HTML code to preview.');
        return;
      }
      // Show preview overlay
      const previewOverlay = document.getElementById('preview-overlay');
      previewOverlay.classList.remove('hidden');
      // Render HTML in iframe
      const iframe = document.getElementById('preview-iframe');
      const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      iframeDoc.open();
      iframeDoc.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <style>
            body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
          </style>
        </head>
        <body>
          ${input}
        </body>
        </html>
      `);
      iframeDoc.close();
    }

    function launchApp() {
      const input = document.getElementById('app-input').value;
      if (!input.trim()) {
        alert('Please enter some HTML code to launch.');
        return;
      }
      // Simulate launching the website and generating a URL
      const randomId = Math.random().toString(36).substring(2, 8);
      const liveUrl = `https://bluehorizon.example.com/app/${randomId}`;
      alert(`Your website is now live!\nAccess it at: ${liveUrl}`);
      // In a real app, this would involve deploying the HTML to a hosting service
    }

    function closePreview() {
      document.getElementById('preview-overlay').classList.add('hidden');
      // Clear iframe content
      const iframe = document.getElementById('preview-iframe');
      const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      iframeDoc.open();
      iframeDoc.write('');
      iframeDoc.close();
    }
  </script>
</body>
</html>
