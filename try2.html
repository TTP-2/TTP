<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Display Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            text-align: center;
            margin-top: 50px;
        }
        .message {
            background-color: #00cccc;
            color: white;
            padding: 20px;
            font-size: 24px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="message" class="message"></div>

    <script>
        // Function to get query parameter from URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Display the input value on the page
        const userInput = getQueryParam('input');
        if (userInput) {
            document.getElementById('message').textContent = `You typed: ${userInput}`;
        } else {
            document.getElementById('message').textContent = 'No input received!';
        }
    </script>
</body>
</html>
