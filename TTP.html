<!DOCTYPE html>
<html>
<head>
  <title>Flight Radar - Real Planes</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 10,
    attribution: ''
  }).addTo(map);

  let markers = [];

  async function fetchRealPlanes() {
    try {
      const response = await fetch('https://cors-anywhere.herokuapp.com/https://opensky-network.org/api/states/all');
      const data = await response.json();

      if (!data.states) return;

      // Clear previous dots
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];

      const redIcon = L.divIcon({
        html: '<div class="red-dot"></div>',
        className: '',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });

      data.states.forEach(plane => {
        const lat = plane[6];
        const lon = plane[5];

        if (lat && lon) {
          const marker = L.marker([lat, lon], { icon: redIcon }).addTo(map);
          markers.push(marker);
        }
      });
    } catch (error) {
      console.error("Failed to fetch plane data:", error);
    }
  }

  // Initial and update every second
  fetchRealPlanes();
  setInterval(fetchRealPlanes, 1000);
</script>

</body>
</html>
