<!DOCTYPE html>
<html lang="en">
<head>
  <title>TTP Maps with Routing</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    .leaflet-control-attribution {
      display: none !important;
    }
    #set-location-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }
    #set-location-btn:hover {
      background-color: #0056b3;
    }
    #search-box {
      position: fixed;
      top: 70px;
      right: 20px;
      z-index: 1000;
      width: 280px;
      background: #fff;
      border-radius: 8px;
      padding: 12px 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      font-family: Arial, sans-serif;
      transition: width 0.3s ease, box-shadow 0.3s ease;
    }
    #search-box input {
      width: 100%;
      padding: 8px 15px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    #search-box input:focus {
      border-color: #007bff;
    }
    #search-box input::placeholder {
      color: #999;
    }
  </style>
</head>
<body>

<div id="map"></div>
<button id="set-location-btn">Set Locations</button>
<div id="search-box"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  const geocoderControl = L.Control.geocoder({
    defaultMarkGeocode: false
  }).on('markgeocode', function(e) {
    const bbox = e.geocode.bbox;
    const poly = L.polygon([
      bbox.getSouthEast(),
      bbox.getNorthEast(),
      bbox.getNorthWest(),
      bbox.getSouthWest()
    ]).addTo(map);
    map.fitBounds(poly.getBounds());
    L.marker(e.geocode.center).addTo(map).bindPopup(e.geocode.name).openPopup();
  });

  geocoderControl.addTo(map);
  document.getElementById('search-box').appendChild(geocoderControl.getContainer());

  let startMarker, endMarker, routeControl;
  let isSettingLocation = false;

  const redIcon = L.divIcon({
    html: '<div class="red-dot"></div>',
    className: '',
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });

  function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    speechSynthesis.speak(utterance);
  }

  function locateUser() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        map.setView([lat, lon], 13);
        L.marker([lat, lon], { icon: redIcon }).addTo(map).bindPopup("Your Location").openPopup();
      }, function(error) {
        console.error('Error getting location:', error);
        alert('Could not get your location');
      });
    } else {
      alert('Geolocation is not supported by this browser.');
    }
  }

  document.getElementById('set-location-btn').onclick = function() {
    isSettingLocation = !isSettingLocation;
    if (isSettingLocation) {
      speak("Click on the map to set your start and end locations.");
    } else {
      speak("Click the button to set your start and end locations.");
    }
  };

  map.on('click', function(e) {
    if (!isSettingLocation) return;

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (!startMarker) {
      startMarker = L.marker([lat, lon]).addTo(map);
      speak("Click to set your end location.");
    } else if (!endMarker) {
      endMarker = L.marker([lat, lon]).addTo(map);
      speak("Start and end locations set.");
      highlightShortestRoute();
    }
  });

  function highlightShortestRoute() {
    if (routeControl) {
      map.removeControl(routeControl);
    }

    routeControl = L.Routing.control({
      waypoints: [
        startMarker.getLatLng(),
        endMarker.getLatLng()
      ],
      lineOptions: {
        styles: [{ color: 'blue', weight: 5 }]
      },
      createMarker: () => null,
      addWaypoints: false,
      routeWhileDragging: false,
      draggableWaypoints: false
    }).addTo(map);
  }

  window.onload = () => {
    locateUser();
    speak("Click the button in the top right to set your start and end locations.");
  };
</script>

</body>
</html>
