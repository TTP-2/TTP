<!DOCTYPE html>
<html lang="en">
<head>
  <title>TTP maps</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    .leaflet-control-attribution {
      display: none !important;
    }
    #set-location-btn, #note-mode-btn, #cancel-trip-btn {
      position: absolute;
      padding: 10px 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
      font-size: 16px;
    }
    #set-location-btn:hover, #note-mode-btn:hover, #cancel-trip-btn:hover {
      background-color: #0056b3;
    }
    #set-location-btn, #note-mode-btn {
      right: 20px;
    }
    #cancel-trip-btn {
      left: 20px;
      top: 120px;
    }
    #set-location-btn {
      top: 120px;
    }
    #note-mode-btn {
      top: 170px;
    }
    #cancel-trip-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #search-box {
      position: fixed;
      top: 40px;
      right: 20px;
      z-index: 1000;
      width: 300px;
      background: white;
      border-radius: 4px;
      padding: 5px;
    }
    #search-box input {
      width: 100%;
      padding: 10px 15px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }
    #search-box input:focus {
      border-color: #007bff;
    }
    .note-input {
      position: absolute;
      z-index: 2000;
      transform: translate(-50%, -100%);
      padding: 8px 12px;
      border: 2px solid #007bff;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .delete-btn {
      margin-left: 8px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .delete-btn:hover {
      background-color: #b02a37;
    }

    @media (max-width: 600px) {
      #search-box {
        width: 90%;
        right: 5%;
        top: 20px;
      }

      #set-location-btn, #note-mode-btn, #cancel-trip-btn {
        font-size: 14px;
        padding: 8px 12px;
      }

      #set-location-btn, #note-mode-btn {
        right: 10px;
        width: auto;
        min-width: 120px;
      }

      #cancel-trip-btn {
        left: 10px;
        width: auto;
        min-width: 120px;
      }

      .note-input {
        font-size: 12px;
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>

<div id="map"></div>
<button id="set-location-btn">Set Locations</button>
<button id="note-mode-btn">Add Note</button>
<button id="cancel-trip-btn" disabled>Cancel Trip</button>
<div id="search-box"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
  const map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    minZoom: 2,
    maxZoom: 18,
    zoomAnimation: true,
    zoomAnimationThreshold: 10
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  // Setting up the geocoder to allow city, country, street, etc. searches
  const geocoderControl = L.Control.geocoder({
    placeholder: 'Search for a place...',
    defaultMarkGeocode: false,  // Don't mark the geocode result by default
    geocoder: L.Control.Geocoder.nominatim() // Using Nominatim for geocoding
  }).on('markgeocode', function(e) {
    const latLng = e.geocode.center; // Get the coordinates of the found place
    map.setView(latLng, 13); // Move the map to the found place
    L.marker(latLng).addTo(map).bindPopup(e.geocode.name).openPopup(); // Add marker and popup for the found place
  });

  geocoderControl.addTo(map);
  document.getElementById('search-box').appendChild(geocoderControl.getContainer());

  let startMarker, endMarker, routeControl;
  let isSettingLocation = false;
  let isNoteMode = false;

  const redIcon = L.divIcon({
    html: '<div class="red-dot"></div>',
    className: '',
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });

  function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    speechSynthesis.speak(utterance);
  }

  function locateUser() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        map.setView([lat, lon], 13);
        L.marker([lat, lon], { icon: redIcon }).addTo(map).bindPopup("Your Location").openPopup();
      }, function(error) {
        console.error('Error getting location:', error);
        alert('Could not get your location');
      });
    } else {
      alert('Geolocation is not supported by this browser.');
    }
  }

  // Detect Enter key to trigger search
  const searchInput = document.querySelector("#search-box input");
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const searchQuery = searchInput.value.trim().toLowerCase(); // Make it case-insensitive
      if (searchQuery) {
        geocoderControl.geocoder.geocode(searchQuery, function(results) {
          if (results && results.length > 0) {
            const latLng = results[0].center; // Use the first result from geocoding
            map.setView(latLng, 13); // Move map to the location
            L.marker(latLng).addTo(map).bindPopup(results[0].name).openPopup(); // Show the marker
            searchInput.value = ''; // Clear search field after search
          } else {
            alert("No results found for your query.");
          }
        });
      }
    }
  });

  document.getElementById('set-location-btn').onclick = function() {
    isSettingLocation = !isSettingLocation;
    isNoteMode = false;
    document.getElementById('note-mode-btn').disabled = isSettingLocation;

    if (isSettingLocation) {
      document.getElementById('set-location-btn').style.display = 'none';
      document.getElementById('search-box').style.display = 'none';
      document.getElementById('note-mode-btn').style.display = 'none'; // Hide note button when setting locations
      speak("Click on the map to set your start and end locations.");
    } else {
      document.getElementById('set-location-btn').style.display = 'block';
      document.getElementById('search-box').style.display = 'block';
      document.getElementById('note-mode-btn').style.display = 'block'; // Show note button when not setting locations
      speak("Click the button to set your start and end locations.");
    }
  };

  document.getElementById('note-mode-btn').onclick = function() {
    isNoteMode = !isNoteMode;
    isSettingLocation = false;
    document.getElementById('set-location-btn').disabled = isNoteMode;
  };

  map.on('click', function(e) {
    if (isSettingLocation) {
      const lat = e.latlng.lat;
      const lon = e.latlng.lng;

      if (!startMarker) {
        startMarker = L.marker([lat, lon]).addTo(map);
        speak("Click to set your end location.");
      } else if (!endMarker) {
        endMarker = L.marker([lat, lon]).addTo(map);
        speak("Start and end locations set.");
        highlightShortestRoute();
        enableCancelButton(); // Enable cancel button when locations are set
      }
    } else if (isNoteMode) {
      const mapContainer = document.getElementById('map');
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Enter a label';
      input.className = 'note-input';
      input.style.left = e.originalEvent.clientX + 'px';
      input.style.top = e.originalEvent.clientY + 'px';

      input.onkeydown = function(event) {
        if (event.key === 'Enter' && input.value.trim()) {
          const marker = L.marker(e.latlng).addTo(map);
          marker.bindPopup(input.value).openPopup();
          input.disabled = true;
          setTimeout(() => {
            input.remove();
          }, 100);
        }
      };

      mapContainer.appendChild(input);
    }
  });

  document.getElementById('cancel-trip-btn').onclick = function() {
    if (startMarker && endMarker) {
      map.removeLayer(startMarker);
      map.removeLayer(endMarker);
      if (routeControl) {
        map.removeControl(routeControl);
      }
    }
    document.getElementById('cancel-trip-btn').disabled = true; // Disable cancel button after trip is canceled
    // Make all buttons and inputs visible again after canceling the trip
    document.getElementById('set-location-btn').style.display = 'block';
    document.getElementById('note-mode-btn').style.display = 'block';
    document.getElementById('search-box').style.display = 'block';
  };

  function enableCancelButton() {
    document.getElementById('cancel-trip-btn').disabled = false;
  }
</script>
</body>
</html>
