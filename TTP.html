<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #70c5ce;
        }
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Pop sound (using the sound/pop.wav file)
        const popSound = new Audio('sound/pop.wav'); // Make sure this file is in the "sound" folder

        const bird = {
            x: 50,
            y: 150,
            width: 20,
            height: 20,
            gravity: 0.3, // Reduced gravity for easier gameplay
            lift: -8, // Reduced lift for easier flight control
            velocity: 0,
            draw() {
                ctx.fillStyle = "yellow";
                ctx.fillRect(this.x, this.y, this.width, this.height);
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
            },
            flap() {
                this.velocity = this.lift;
                popSound.play(); // Play pop sound when the bird flaps
            }
        };

        const pipes = [];
        const pipeWidth = 50;
        const pipeGap = 200; // Increased the gap between pipes to make the hole bigger
        const pipeSpeed = 1.5; // Slowed down the pipes for easier navigation
        let score = 0; // Initialize score

        function generatePipe() {
            const pipeHeight = Math.floor(Math.random() * (canvas.height - pipeGap));
            pipes.push({
                x: canvas.width,
                y: pipeHeight,
                width: pipeWidth,
                height: canvas.height - pipeHeight - pipeGap
            });
        }

        function updatePipes() {
            for (let i = 0; i < pipes.length; i++) {
                pipes[i].x -= pipeSpeed;
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                    score++; // Increase score when a pipe passes
                }
            }
        }

        function drawPipes() {
            ctx.fillStyle = "green";
            for (let pipe of pipes) {
                ctx.fillRect(pipe.x, 0, pipe.width, pipe.y); // top pipe
                ctx.fillRect(pipe.x, pipe.y + pipeGap, pipe.width, canvas.height - pipe.y - pipeGap); // bottom pipe
            }
        }

        function checkCollision() {
            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                resetGame();
            }

            for (let pipe of pipes) {
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipe.width) {
                    if (bird.y < pipe.y || bird.y + bird.height > pipe.y + pipeGap) {
                        resetGame();
                    }
                }
            }
        }

        function resetGame() {
            bird.y = 150;
            bird.velocity = 0;
            pipes.length = 0;
            score = 0; // Reset score on game over
        }

        function drawScore() {
            ctx.fillStyle = "black";
            ctx.font = "24px Arial";
            ctx.fillText("Score: " + score, 10, 30); // Display score at top-left corner
        }

        let gameLoop;
        function game() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bird.update();
            bird.draw();
            updatePipes();
            drawPipes();
            drawScore(); // Draw the score on each frame
            checkCollision();

            if (Math.random() < 0.02) {
                generatePipe();
            }

            gameLoop = requestAnimationFrame(game);
        }

        // Make the bird flap when spacebar is pressed
        window.addEventListener("keydown", (event) => {
            if (event.code === "Space") {
                bird.flap();
            }
        });

        game();
    </script>
</body>
</html>
