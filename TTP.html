<!DOCTYPE html>
<html lang="en">
<head>
  <title>TTP maps</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    #set-location-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      z-index: 1000;
      border-radius: 5px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    #search-input {
      position: fixed;
      top: 100px;
      left: 10px;
      z-index: 1000;
      width: 250px;
    }
    #transport-mode {
      position: fixed;
      top: 80px;
      left: 10px;
      z-index: 1000;
      padding: 5px;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .leaflet-control-geocoder {
      margin-top: 70px !important;
    }
    .leaflet-control-geocoder-form input {
      width: 100% !important;
    }
    .leaflet-control-geocoder-form input::placeholder {
      content: "Search country, city, road, street";
      color: #999;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #set-location-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<div id="map"></div>
<button id="set-location-btn">Set Locations</button>
<select id="transport-mode">
  <option value="car">Driving</option>
  <option value="bike">Cycling</option>
  <option value="foot">Walking</option>
</select>
<div id="search-input"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
  const map = L.map('map', { maxZoom: 25 }).setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 25,
    attribution: ''
  }).addTo(map);

  const searchControl = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Search country, city, road, street"
  }).on('markgeocode', function(e) {
    const bbox = e.geocode.bbox;
    const poly = L.polygon([
      bbox.getSouthEast(),
      bbox.getNorthEast(),
      bbox.getNorthWest(),
      bbox.getSouthWest()
    ]).addTo(map);
    map.fitBounds(poly.getBounds());
    L.marker(e.geocode.center).addTo(map).bindPopup(e.geocode.name).openPopup();
  }).addTo(map);

  let startMarker, endMarker;
  let isSettingLocation = false;
  let control = null;

  function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    speechSynthesis.speak(utterance);
  }

  window.onload = () => {
    speak("Click the button in the top right to set your start and end locations.");
  };

  document.getElementById('set-location-btn').onclick = function() {
    isSettingLocation = !isSettingLocation;
    if (isSettingLocation) {
      speak("Click on the map to set your start and end locations.");
    } else {
      speak("Click the button to set your start and end locations.");
    }
  };

  map.on('click', function(e) {
    if (!isSettingLocation) return;

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (!startMarker) {
      startMarker = L.marker([lat, lon]).addTo(map);
      speak("Click to set your end location.");
    } else if (!endMarker) {
      endMarker = L.marker([lat, lon]).addTo(map);
      drawRoute(startMarker.getLatLng(), endMarker.getLatLng());
    }
  });

  function drawRoute(start, end) {
    const mode = document.getElementById('transport-mode').value;  // Get the selected transport mode

    if (control) map.removeControl(control);

    control = L.Routing.control({
      waypoints: [start, end],
      routeWhileDragging: false,
      show: false,
      lineOptions: { styles: [{ color: 'blue', weight: 5 }] },
      createMarker: () => null,
      routeOptions: {
        // Set the transportation mode based on the selection
        vehicular: mode === 'car' ? true : false,
        foot: mode === 'foot' ? true : false,
        bicycle: mode === 'bike' ? true : false
      }
    }).addTo(map);

    control.on('routesfound', function(e) {
      const route = e.routes[0];
      const totalDistanceKm = (route.summary.totalDistance / 1000).toFixed(1);
      const totalTimeMin = Math.round(route.summary.totalTime / 60);
      speak(`The total distance is ${totalDistanceKm} kilometers. Estimated time is ${totalTimeMin} minutes.`);
    });
  }
</script>

</body>
</html>
