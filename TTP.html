<!DOCTYPE html>
<html>
<head>
  <title>Distance & Time Calculator</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    .info {
      position: fixed;
      top: 10px;
      left: 10px;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 10px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div class="info" id="info"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  // Start and end coordinates
  let startLat = 40.748817; // New York (example start)
  let startLon = -73.985428;
  let endLat = 34.052235;   // Los Angeles (example destination)
  let endLon = -118.243683;

  // Add markers for start and end
  const redIcon = L.divIcon({
    html: '<div class="red-dot"></div>',
    className: '',
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });

  L.marker([startLat, startLon], { icon: redIcon }).addTo(map).bindPopup("Start Location");
  L.marker([endLat, endLon], { icon: redIcon }).addTo(map).bindPopup("End Location");

  // Calculate distance between two points using Haversine formula
  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth's radius in km
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    const distance = R * c; // Distance in km
    return distance;
  }

  // Convert degrees to radians
  function toRad(deg) {
    return deg * (Math.PI / 180);
  }

  // Calculate time (assuming 50 km/h speed)
  function calculateTime(distance, speed = 50) {
    const time = distance / speed; // time = distance / speed (in hours)
    return time;
  }

  // Calculate distance and time
  const distance = calculateDistance(startLat, startLon, endLat, endLon);
  const time = calculateTime(distance);

  // Display the result
  document.getElementById('info').innerHTML = `
    <strong>Start Location:</strong> (${startLat}, ${startLon})<br>
    <strong>End Location:</strong> (${endLat}, ${endLon})<br>
    <strong>Distance:</strong> ${distance.toFixed(2)} km<br>
    <strong>Estimated Time:</strong> ${time.toFixed(2)} hours at 50 km/h
  `;
</script>

</body>
</html>
