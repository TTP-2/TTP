<!DOCTYPE html>
<html lang="en">
<head>
  <title>Distance & Time Calculator</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    .info {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 4px 6px;
      font-family: Arial, sans-serif;
      z-index: 1000;
      color: white;
      font-size: 11px;
      max-width: 200px;
    }
    #set-location-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div class="info" id="info">Please click the button to set your start and end locations.</div>
<button id="set-location-btn">Set Locations</button>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  let startMarker, endMarker;
  let isSettingLocation = false;
  let control = null;

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      map.setView([lat, lon], 13);

      const redIcon = L.divIcon({
        html: '<div class="red-dot"></div>',
        className: '',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });

      L.marker([lat, lon], { icon: redIcon }).addTo(map).bindPopup("Your Location");
    }, function(error) {
      console.error('Error getting location:', error);
      alert('Could not get your location');
    });
  } else {
    alert('Geolocation is not supported by this browser.');
  }

  document.getElementById('set-location-btn').onclick = function() {
    isSettingLocation = !isSettingLocation;
    if (isSettingLocation) {
      document.getElementById('info').innerHTML = "Click on the map to set your start and end locations.";
    } else {
      document.getElementById('info').innerHTML = "Please click the button to set your start and end locations.";
    }
  };

  map.on('click', function(e) {
    if (!isSettingLocation) return;

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (!startMarker) {
      startMarker = L.marker([lat, lon]).addTo(map);
      document.getElementById('info').innerHTML = "Click to set your end location.";
    } else if (!endMarker) {
      endMarker = L.marker([lat, lon]).addTo(map);

      if (control) map.removeControl(control);

      control = L.Routing.control({
        waypoints: [
          startMarker.getLatLng(),
          endMarker.getLatLng()
        ],
        routeWhileDragging: false,
        show: false,
        addWaypoints: false
      }).addTo(map);

      document.getElementById('info').innerHTML = `Route set between start and end location.`;
    }
  });
</script>

</body>
</html>
