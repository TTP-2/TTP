<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTP Square Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0fbfb;
    }

    h1 {
      color: #008080;
      margin-bottom: 20px;
    }

    #gameCanvas {
      border: 4px solid #008080;
      border-radius: 12px;
      background-color: white;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #00cccc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #008080;
    }
  </style>
</head>
<body>
  <h1>TTP Square Game</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <button onclick="resetGame()">Reset Game</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const squareSize = 30;
    let squareX = (canvas.width - squareSize) / 2;
    const squareY = canvas.height - squareSize - 10;
    let rightPressed = false;
    let leftPressed = false;
    const speed = 8; // Adjusted speed for faster movement

    const staticSquareX = canvas.width - 100;
    const staticSquareY = canvas.height - squareSize - 10;
    let staticSquareMoved = false;

    document.addEventListener("keydown", keyDownHandler, false);
    document.addEventListener("keyup", keyUpHandler, false);

    function keyDownHandler(e) {
      if (e.key === "Right" || e.key === "ArrowRight") {
        rightPressed = true;
      } else if (e.key === "Left" || e.key === "ArrowLeft") {
        leftPressed = true;
      }
    }

    function keyUpHandler(e) {
      if (e.key === "Right" || e.key === "ArrowRight") {
        rightPressed = false;
      } else if (e.key === "Left" || e.key === "ArrowLeft") {
        leftPressed = false;
      }
    }

    function drawSquare() {
      ctx.beginPath();
      ctx.rect(squareX, squareY, squareSize, squareSize);
      ctx.fillStyle = '#00cccc';
      ctx.fill();
      ctx.closePath();
    }

    function drawStaticSquare() {
      ctx.beginPath();
      ctx.rect(staticSquareX, staticSquareY, squareSize, squareSize);
      ctx.fillStyle = '#008080';
      ctx.fill();
      ctx.closePath();
    }

    function handleCollision() {
      if (squareX + squareSize > staticSquareX && squareX < staticSquareX + squareSize && !staticSquareMoved) {
        staticSquareMoved = true;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSquare();
      drawStaticSquare();
      handleCollision();

      if (staticSquareMoved) {
        staticSquareX -= 50; // Push the static square to the side
      }

      if (rightPressed && squareX < canvas.width - squareSize) {
        squareX += speed;
      } else if (leftPressed && squareX > 0) {
        squareX -= speed;
      }

      requestAnimationFrame(draw); // Smooth animation
    }

    function resetGame() {
      squareX = (canvas.width - squareSize) / 2;
      staticSquareMoved = false;
      staticSquareX = canvas.width - 100;
      requestAnimationFrame(draw); // Restart smooth animation
    }

    requestAnimationFrame(draw); // Start smooth animation
  </script>
</body>
</html>
