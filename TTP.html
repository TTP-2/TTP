<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Solver by Picture</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.1/math.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #e0f7f7, #ccf2f2);
      margin: 0;
      padding: 20px;
      color: #034f4f;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #007d7d;
    }

    input[type="file"], button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin: 10px;
      transition: background 0.3s;
    }

    input[type="file"] {
      background-color: #ffffff;
      color: #007d7d;
      border: 2px solid #00b3b3;
    }

    button {
      background-color: #00b3b3;
      color: white;
    }

    button:hover {
      background-color: #008c8c;
    }

    #preview {
      max-width: 90%;
      max-height: 300px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 30px;
      color: #005555;
    }

    p {
      font-size: 1.2rem;
      color: #003333;
      background-color: #ffffff;
      padding: 10px 15px;
      display: inline-block;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      min-width: 100px;
    }
  </style>
</head>
<body>
  <h1>📸 Math Solver by Picture</h1>
  <input type="file" accept="image/*" id="imageInput" />
  <button onclick="solveImage()">Solve Equation</button>
  <div>
    <img id="preview" />
  </div>
  <h2>📖 Detected Equation:</h2>
  <p id="equation">...</p>
  <h2>✅ Answer:</h2>
  <p id="answer">...</p>

  <script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const equationText = document.getElementById("equation");
    const answerText = document.getElementById("answer");

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    function solveImage() {
      if (!imageInput.files[0]) {
        alert("Please select an image first.");
        return;
      }

      equationText.textContent = "Reading...";
      answerText.textContent = "...";

      Tesseract.recognize(imageInput.files[0], 'eng')
        .then(result => {
          const rawText = result.data.text;
          const cleaned = rawText.replace(/\s/g, "");
          equationText.textContent = cleaned;

          try {
            const answer = math.evaluate(cleaned);
            answerText.textContent = answer;
          } catch (err) {
            answerText.textContent = "Couldn't solve the equation.";
          }
        });
    }
  </script>
</body>
</html>
