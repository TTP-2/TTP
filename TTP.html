<!DOCTYPE html>
<html>
<head>
  <title>Distance & Time Calculator</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    .info {
      position: fixed;
      top: 10px;
      left: 10px;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    #set-location-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div class="info" id="info">Please click the button to set your start and end locations.</div>
<button id="set-location-btn">Set Locations</button>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  let startMarker, endMarker;
  let startLat, startLon, endLat, endLon;
  let isSettingLocation = false;

  // Request location from the user
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      // Center map on the user's location
      map.setView([lat, lon], 13);

      // Create a red dot marker for the user's location
      const redIcon = L.divIcon({
        html: '<div class="red-dot"></div>',
        className: '',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });

      L.marker([lat, lon], { icon: redIcon }).addTo(map).bindPopup("Your Location");
    }, function(error) {
      console.error('Error getting location:', error);
      alert('Could not get your location');
    });
  } else {
    alert('Geolocation is not supported by this browser.');
  }

  // Toggle the ability to set locations
  document.getElementById('set-location-btn').onclick = function() {
    isSettingLocation = !isSettingLocation;
    if (isSettingLocation) {
      document.getElementById('info').innerHTML = "Click on the map to set your start and end locations.";
    } else {
      document.getElementById('info').innerHTML = "Please click the button to set your start and end locations.";
    }
  };

  // Handle clicks on the map
  map.on('click', function(e) {
    if (!isSettingLocation) return;

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (!startMarker) {
      // Set start location
      startLat = lat;
      startLon = lon;
      startMarker = L.marker([lat, lon]).addTo(map);
      document.getElementById('info').innerHTML = "Click to set your end location.";
    } else if (!endMarker) {
      // Set end location
      endLat = lat;
      endLon = lon;
      endMarker = L.marker([lat, lon]).addTo(map);

      // Calculate distance and time
      const distance = calculateDistance(startLat, startLon, endLat, endLon);
      const time = calculateTime(distance);

      // Display results
      document.getElementById('info').innerHTML = `
        <strong>Start Location:</strong> (${startLat.toFixed(4)}, ${startLon.toFixed(4)})<br>
        <strong>End Location:</strong> (${endLat.toFixed(4)}, ${endLon.toFixed(4)})<br>
        <strong>Distance:</strong> ${distance.toFixed(2)} km<br>
        <strong>Estimated Time:</strong> ${time.toFixed(2)} hours at 50 km/h
      `;
    }
  });

  // Calculate distance using the Haversine formula
  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth's radius in km
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    const distance = R * c; // Distance in km
    return distance;
  }

  // Convert degrees to radians
  function toRad(deg) {
    return deg * (Math.PI / 180);
  }

  // Calculate time (assuming 50 km/h speed)
  function calculateTime(distance, speed = 50) {
    const time = distance / speed; // time = distance / speed (in hours)
    return time;
  }

</script>

</body>
</html>
