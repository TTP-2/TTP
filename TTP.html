<!DOCTYPE html>
<html lang="en">
<head>
  <title>TTP maps</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 2000px;
      width: 1187px;
    }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    #set-location-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      z-index: 1000;
    }
    #search-input {
      position: fixed;
      top: 100px;
      left: 10px;
      z-index: 1000;
      width: 250px;
    }
    .leaflet-control-geocoder {
      margin-top: 70px !important;
    }
    .leaflet-control-geocoder-form input {
      width: 100% !important;
    }
    .leaflet-control-geocoder-form input::placeholder {
      content: "Search country, city, road, street";
      color: #999;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #set-location-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<div id="map"></div>
<button id="set-location-btn">Set Locations</button>
<div id="search-input"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  const searchControl = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Search country, city, road, street"
  }).on('markgeocode', function(e) {
    const bbox = e.geocode.bbox;
    const poly = L.polygon([
      bbox.getSouthEast(),
      bbox.getNorthEast(),
      bbox.getNorthWest(),
      bbox.getSouthWest()
    ]).addTo(map);
    map.fitBounds(poly.getBounds());
    L.marker(e.geocode.center).addTo(map).bindPopup(e.geocode.name).openPopup();
  }).addTo(map);

  let startMarker, endMarker;
  let isSettingLocation = false;
  let control = null;
  let routeInstructions = [];
  let currentStep = 0;

  function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    speechSynthesis.speak(utterance);
  }

  window.onload = () => {
    speak("Click the button in the top right to set your start and end locations.");
  };

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      map.setView([lat, lon], 13);

      const redIcon = L.divIcon({
        html: '<div class="red-dot"></div>',
        className: '',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });

      L.marker([lat, lon], { icon: redIcon }).addTo(map).bindPopup("Your Location");
    }, function(error) {
      console.error('Error getting location:', error);
      alert('Could not get your location');
    });
  } else {
    alert('Geolocation is not supported by this browser.');
  }

  document.getElementById('set-location-btn').onclick = function() {
    isSettingLocation = !isSettingLocation;
    if (isSettingLocation) {
      speak("Click on the map to set your start and end locations.");
    } else {
      speak("Click the button to set your start and end locations.");
    }
  };

  map.on('click', function(e) {
    if (!isSettingLocation) return;

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (!startMarker) {
      startMarker = L.marker([lat, lon]).addTo(map);
      speak("Click to set your end location.");
    } else if (!endMarker) {
      endMarker = L.marker([lat, lon]).addTo(map);

      if (control) map.removeControl(control);

      control = L.Routing.control({
        waypoints: [
          startMarker.getLatLng(),
          endMarker.getLatLng()
        ],
        routeWhileDragging: false,
        show: false,
        lineOptions: {
          styles: [{ color: 'blue', weight: 5 }]
        },
        createMarker: () => null
      }).addTo(map);

      control.on('routesfound', function(e) {
        const routes = e.routes;
        if (routes.length > 0) {
          const route = routes[0];
          const totalDistanceKm = (route.summary.totalDistance / 1000).toFixed(1);
          const totalTimeMin = Math.round(route.summary.totalTime / 60);
          speak(`The total distance is ${totalDistanceKm} kilometers. Estimated time is ${totalTimeMin} minutes.`);

          routeInstructions = route.instructions;
          currentStep = 0;
          readNextStep();

          map.on('moveend', () => {
            if (currentStep >= routeInstructions.length) return;
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition(pos => {
              const currentLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
              const stepLatLng = routeInstructions[currentStep].latLng || route.coordinates[currentStep + 1];
              const distance = currentLatLng.distanceTo(stepLatLng);
              if (distance < 50) {
                currentStep++;
                readNextStep();
              }
            });
          });
        }
      });
    }
  });

  function readNextStep() {
    if (currentStep >= routeInstructions.length) return;
    const step = routeInstructions[currentStep];
    let text = step.text;
    const distance = (step.distance / 1000).toFixed(2);

    // Format instruction text
    if (/turn/i.test(text)) {
      text = text.replace(/Turn (left|right)/i, match => match.charAt(0).toUpperCase() + match.slice(1)) + ` in ${distance} kilometers`;
    } else if (/continue/i.test(text)) {
      text = `Continue for ${distance} kilometers`;
    } else {
      text = text + ` for ${distance} kilometers`;
    }

    speak(text);
  }
</script>

</body>
</html>
