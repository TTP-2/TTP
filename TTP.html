<!DOCTYPE html>
<html lang="en">
<head>
  <title>TTP maps</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
    #set-location-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      z-index: 1000;
    }
    #search-input {
      position: fixed;
      top: 100px;
      left: 10px;
      z-index: 1000;
      width: 250px;
    }
    .leaflet-control-geocoder {
      margin-top: 70px !important;
    }
    .leaflet-control-geocoder-form input {
      width: 100% !important;
    }
    .leaflet-control-geocoder-form input::placeholder {
      content: "Search country, city, road, street";
      color: #999;
    }

    /* Improved styling for instructions */
    #instructions {
      position: fixed;
      top: 100px;
      right: 20px;
      z-index: 1000;
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border-radius: 8px;
      width: auto;
      max-width: 300px;
      line-height: 1.4;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
      display: none;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    /* Fade-in animation for instructions */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Optional: Add a slight hover effect to the button */
    #set-location-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<div id="map"></div>
<button id="set-location-btn">Set Locations</button>
<div id="search-input"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  const searchControl = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Search country, city, road, street"
  }).on('markgeocode', function(e) {
    const bbox = e.geocode.bbox;
    const poly = L.polygon([
      bbox.getSouthEast(),
      bbox.getNorthEast(),
      bbox.getNorthWest(),
      bbox.getSouthWest()
    ]).addTo(map);
    map.fitBounds(poly.getBounds());
    L.marker(e.geocode.center).addTo(map).bindPopup(e.geocode.name).openPopup();
  }).addTo(map);

  let startMarker, endMarker;
  let isSettingLocation = false;
  let control = null;
  let currentStepIndex = 0;
  let routeSteps = [];
  let previousPosition = null;

  function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    speechSynthesis.speak(utterance);
  }

  window.onload = () => {
    speak("Click the button in the top right to set your start and end locations.");
  };

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      map.setView([lat, lon], 13);

      const redIcon = L.divIcon({
        html: '<div class="red-dot"></div>',
        className: '',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });

      L.marker([lat, lon], { icon: redIcon }).addTo(map).bindPopup("Your Location");
      previousPosition = L.latLng(lat, lon);
    }, function(error) {
      console.error('Error getting location:', error);
      alert('Could not get your location');
    });
  } else {
    alert('Geolocation is not supported by this browser.');
  }

  document.getElementById('set-location-btn').onclick = function() {
    isSettingLocation = !isSettingLocation;
    if (isSettingLocation) {
      speak("Click on the map to set your start and end locations.");
    } else {
      speak("Click the button to set your start and end locations.");
    }
  };

  function monitorProgress(route) {
    routeSteps = route.instructions;
    currentStepIndex = 0;
    speakCurrentStep();

    map.on('moveend', () => {
      if (currentStepIndex >= routeSteps.length) return;
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(position => {
        const currentLatLng = L.latLng(position.coords.latitude, position.coords.longitude);
        const currentStep = routeSteps[currentStepIndex];

        const stepEndLatLng = currentStep.latLng || L.latLng(route.coordinates[currentStepIndex + 1]);

        const distance = currentLatLng.distanceTo(stepEndLatLng);
        if (distance < 50) {
          currentStepIndex++;
          if (currentStepIndex < routeSteps.length) {
            speakCurrentStep();
          }
        }
      });
    });
  }

  function speakCurrentStep() {
    const step = routeSteps[currentStepIndex];
    if (step) {
      const distanceKm = (step.distance / 1000).toFixed(1);
      const spokenText = `${step.text.replace(/continue onto/i, 'Continue on')} for ${distanceKm} kilometers.`;
      speak(spokenText);
      
      // Show instruction text briefly in the tiny div
      document.getElementById('instructions').style.display = 'block';
      document.getElementById('instructions').innerHTML = spokenText;

      // Hide the instruction after a delay
      setTimeout(() => {
        document.getElementById('instructions').style.display = 'none';
      }, 5000); // Hide after 5 seconds
    }
  }

  map.on('click', function(e) {
    if (!isSettingLocation) return;

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (!startMarker) {
      startMarker = L.marker([lat, lon]).addTo(map);
      speak("Click to set your end location.");
    } else if (!endMarker) {
      endMarker = L.marker([lat, lon]).addTo(map);

      if (control) map.removeControl(control);

      control = L.Routing.control({
        waypoints: [
          startMarker.getLatLng(),
          endMarker.getLatLng()
        ],
        routeWhileDragging: false,
        show: true,
        lineOptions: {
          styles: [{ color: 'blue', weight: 5 }]
        },
        createMarker: () => null
      }).addTo(map);

      control.on('routesfound', function(e) {
        const routes = e.routes;
        if (routes.length > 0) {
          const route = routes[0];
          monitorProgress(route);
        }
      });
    }
  });
</script>

</body>
</html>
