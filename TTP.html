<!DOCTYPE html>
<html>
<head>
  <title>Flight Radar Demo</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
    .leaflet-control-attribution { display: none !important; }
    .red-dot {
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      display: block;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2); // World view

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 10,
    attribution: ''
  }).addTo(map);

  let markers = [];

  async function getFlights() {
    try {
      const response = await fetch('https://opensky-network.org/api/states/all');
      const data = await response.json();

      if (!data.states) return;

      // Remove old markers
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];

      data.states.forEach(plane => {
        const lat = plane[6];
        const lon = plane[5];
        const callsign = plane[1] || "Unknown";
        const altitude = plane[13];

        if (lat && lon) {
          const redIcon = L.divIcon({
            className: 'red-dot',
            iconSize: [10, 10]
          });

          const marker = L.marker([lat, lon], { icon: redIcon })
            .addTo(map)
            .bindPopup(`✈️ <strong>${callsign}</strong><br>Altitude: ${altitude} m`);

          markers.push(marker);
        }
      });
    } catch (error) {
      console.error("Error fetching flight data:", error);
    }
  }

  // Initial load and update every second
  getFlights();
  setInterval(getFlights, 1000);
</script>

</body>
</html>
