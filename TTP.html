<!DOCTYPE html>
<html lang="en">
<head>
  <title>TTP Maps for TTP</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { height: 100%; }
    .leaflet-control-attribution { display: none; }
    #search-box {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      width: 300px;
    }
    #search-box input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .note-input {
      position: absolute;
      z-index: 2000;
      transform: translate(-50%, -100%);
      padding: 8px 12px;
      border: 2px solid #007bff;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .delete-btn {
      margin-left: 8px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .delete-btn:hover {
      background-color: #b02a37;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="search-box">
  <input id="search" type="text" placeholder="Search notes or places..." />
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);

  const geocoderControl = L.Control.geocoder({ defaultMarkGeocode: false });
  geocoderControl.on('markgeocode', function(e) {
    const latLng = e.geocode.center;
    map.setView(latLng, 15);
    L.marker(latLng).addTo(map).bindPopup(e.geocode.name).openPopup();
  });

  const searchInput = document.getElementById('search');

  // Handle searching for both notes and places
  searchInput.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) return;

      const notes = JSON.parse(localStorage.getItem('notes')) || [];
      const matched = notes.find(note => note.label.toLowerCase() === query);

      if (matched) {
        map.setView([matched.latlng.lat, matched.latlng.lng], 15);
        L.popup()
          .setLatLng(matched.latlng)
          .setContent(matched.label)
          .openOn(map);
        speak(`Found ${matched.label}`);
      } else {
        geocoderControl._geocode(query);
      }
    }
  });

  // Voice feedback
  function speak(text) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    speechSynthesis.speak(utter);
  }

  // Notes logic
  map.on('click', function(e) {
    const mapContainer = document.getElementById('map');
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Enter a label';
    input.className = 'note-input';
    input.style.left = e.originalEvent.clientX + 'px';
    input.style.top = e.originalEvent.clientY + 'px';

    input.onkeydown = function(event) {
      if (event.key === 'Enter' && input.value.trim()) {
        const marker = L.marker(e.latlng).addTo(map);
        const popupContent = document.createElement('div');
        popupContent.textContent = input.value;

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.className = 'delete-btn';
        deleteBtn.onclick = function() {
          map.removeLayer(marker);
          deleteNoteFromStorage(marker);
        };

        popupContent.appendChild(deleteBtn);
        marker.bindPopup(popupContent);
        marker.openPopup();
        mapContainer.removeChild(input);

        saveNoteToStorage(input.value, e.latlng);
      } else if (event.key === 'Escape') {
        mapContainer.removeChild(input);
      }
    };

    mapContainer.appendChild(input);
  });

  function saveNoteToStorage(label, latlng) {
    const notes = JSON.parse(localStorage.getItem('notes')) || [];
    notes.push({ label, latlng });
    localStorage.setItem('notes', JSON.stringify(notes));
  }

  function deleteNoteFromStorage(marker) {
    const markerLatLng = marker.getLatLng();
    const notes = JSON.parse(localStorage.getItem('notes')) || [];
    const filtered = notes.filter(note => note.latlng.lat !== markerLatLng.lat || note.latlng.lng !== markerLatLng.lng);
    localStorage.setItem('notes', JSON.stringify(filtered));
  }

  // Load saved notes
  window.addEventListener('load', () => {
    const savedNotes = JSON.parse(localStorage.getItem('notes')) || [];
    savedNotes.forEach(note => {
      const marker = L.marker(note.latlng).addTo(map);
      const popupContent = document.createElement('div');
      popupContent.textContent = note.label;

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.className = 'delete-btn';
      deleteBtn.onclick = function () {
        map.removeLayer(marker);
        deleteNoteFromStorage(marker);
      };

      popupContent.appendChild(deleteBtn);
      marker.bindPopup(popupContent);
    });
  });
</script>

</body>
</html>
