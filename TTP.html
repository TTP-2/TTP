<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Farm with TV Screen, Sky, Roundabout</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Create the ground (a large green plane for the farm)
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = - Math.PI / 2; // Rotate to make it horizontal
        scene.add(ground);

        // Set the sky color (blue sky)
        scene.background = new THREE.Color(0x87CEEB); // Sky blue color

        // Function to create a house
        function createHouse(x, z) {
            const houseGeometry = new THREE.BoxGeometry(4, 4, 4);
            const houseMaterial = new THREE.MeshBasicMaterial({ color: 0x8B0000 }); // Red color for house
            const house = new THREE.Mesh(houseGeometry, houseMaterial);
            house.position.set(x, 2, z); // Position the house
            scene.add(house);

            // Roof (pyramid shape)
            const roofGeometry = new THREE.ConeGeometry(3, 3, 4);
            const roofMaterial = new THREE.MeshBasicMaterial({ color: 0x8B0000 }); // Red for the roof
            const roof = new THREE.Mesh(roofGeometry, roofMaterial);
            roof.position.set(x, 5, z); // Position the roof above the house
            roof.rotation.y = Math.PI / 4; // Rotate roof to make it a pyramid
            scene.add(roof);
        }

        // Function to create a tree
        function createTree(x, z) {
            const trunkGeometry = new THREE.CylinderGeometry(0.5, 0.5, 5);
            const trunkMaterial = new THREE.MeshBasicMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.set(x, 2.5, z); // Position the trunk
            scene.add(trunk);

            const leavesGeometry = new THREE.SphereGeometry(2.5, 16, 16);
            const leavesMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.set(x, 6, z); // Position the leaves on top of the trunk
            scene.add(leaves);
        }

        // Function to create a field of crops (farm field)
        function createField(x, z) {
            const fieldGeometry = new THREE.PlaneGeometry(10, 10);
            const fieldMaterial = new THREE.MeshBasicMaterial({ color: 0x8B8B00 });
            const field = new THREE.Mesh(fieldGeometry, fieldMaterial);
            field.position.set(x, 0.1, z); // Position the field just above the ground
            field.rotation.x = - Math.PI / 2; // Make the field horizontal
            scene.add(field);
        }

        // Function to create a fence
        function createFence(x, z) {
            const fenceGeometry = new THREE.BoxGeometry(0.2, 2, 0.2);
            const fenceMaterial = new THREE.MeshBasicMaterial({ color: 0x8B4513 });
            const fence = new THREE.Mesh(fenceGeometry, fenceMaterial);
            fence.position.set(x, 1, z); // Position the fence
            scene.add(fence);
        }

        // Function to create a TV screen (billboard style)
        function createTVScreen(x, z) {
            const texture = new THREE.TextureLoader().load('tv.png'); // Load the texture from an image
            const screenGeometry = new THREE.PlaneGeometry(6, 12); // Tall rectangular screen (aspect ratio)
            const screenMaterial = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide }); // Use the texture
            const screen = new THREE.Mesh(screenGeometry, screenMaterial);
            screen.position.set(x, 6, z); // Position the screen a bit above the ground
            screen.rotation.y = Math.PI / 2; // Rotate to face the camera
            scene.add(screen);
        }

        // Function to create a roundabout (a circular road in the center)
        function createRoundabout(x, z) {
            const circleGeometry = new THREE.CircleGeometry(8, 32); // Circle with radius 8
            const circleMaterial = new THREE.MeshBasicMaterial({ color: 0x808080 }); // Grey color for the road
            const roundabout = new THREE.Mesh(circleGeometry, circleMaterial);
            roundabout.position.set(x, 0.1, z); // Position the roundabout just above the ground
            roundabout.rotation.x = - Math.PI / 2; // Rotate to make it flat
            scene.add(roundabout);
        }

        // Create farmhouses, fields, trees, fences, and TV screen
        createHouse(-10, -10);
        createHouse(10, -10);
        createHouse(5, 10);
        createHouse(-5, 5);

        createTree(-12, -15);
        createTree(15, -5);
        createTree(10, 15);
        createTree(-8, 8);

        createField(0, 0);
        createField(15, 5);
        createField(-15, -15);

        createFence(-20, 10);
        createFence(20, -10);

        // Create a TV screen in the center of the roundabout
        createTVScreen(0, 0); // Position the TV screen at the center of the roundabout

        // Create a roundabout in the center
        createRoundabout(0, 0); // Position at the center (0, 0)

        // Set initial camera position
        camera.position.z = 10; // Default position along z-axis
        camera.position.y = 1.6; // Keep the camera at a height of 1.6 meters (player height)

        // Movement variables
        const speed = 0.1;
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;

        // Rotation variables
        let rotateLeft = false;
        let rotateRight = false;

        // Keydown event listener for WASD and Arrow keys
        window.addEventListener('keydown', (event) => {
            if (event.key === 'w') moveForward = true;
            if (event.key === 's') moveBackward = true;
            if (event.key === 'a') moveLeft = true;
            if (event.key === 'd') moveRight = true;
            if (event.key === 'ArrowLeft') rotateLeft = true;
            if (event.key === 'ArrowRight') rotateRight = true;
        });

        // Keyup event listener to stop movement and rotation when keys are released
        window.addEventListener('keyup', (event) => {
            if (event.key === 'w') moveForward = false;
            if (event.key === 's') moveBackward = false;
            if (event.key === 'a') moveLeft = false;
            if (event.key === 'd') moveRight = false;
            if (event.key === 'ArrowLeft') rotateLeft = false;
            if (event.key === 'ArrowRight') rotateRight = false;
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Get the camera's rotation and compute direction to move
            const direction = new THREE.Vector3(0, 0, -1); // Default forward direction
            camera.getWorldDirection(direction); // Update the direction based on camera's rotation

            // Move the camera based on the direction and the pressed keys
            if (moveForward) camera.position.addScaledVector(direction, speed); // Move forward in the direction camera is facing
            if (moveBackward) camera.position.addScaledVector(direction, -speed); // Move backward (opposite direction)
            
            if (moveLeft) camera.position.x -= speed;
            if (moveRight) camera.position.x += speed;

            // Lock camera's y-position to 1.6 (the player's height), to simulate walking on the ground
            camera.position.y = 1.6;

            // Camera rotation based on arrow keys
            if (rotateLeft) camera.rotation.y += 0.05; // Rotate left
            if (rotateRight) camera.rotation.y -= 0.05; // Rotate right

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
