<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recorder with Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
        }
        #recordButton, #stopButton, #downloadButton {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        #recordButton:hover, #stopButton:hover, #downloadButton:hover {
            background-color: #45a049;
        }
        #stopButton {
            background-color: #f44336;
        }
        #stopButton:hover {
            background-color: #e53935;
        }
        #downloadButton {
            background-color: #2196F3;
            display: none;
        }
        #downloadButton:hover {
            background-color: #1e88e5;
        }
    </style>
</head>
<body>
    <h1>Voice Recorder</h1>
    <button id="recordButton">Start Recording</button>
    <button id="stopButton" style="display: none;">Stop Recording</button>
    <button id="downloadButton" style="display: none;">Download Audio</button>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;
        let audioUrl;
        let audio;

        // Get the elements for the buttons
        const recordButton = document.getElementById('recordButton');
        const stopButton = document.getElementById('stopButton');
        const downloadButton = document.getElementById('downloadButton');

        // Start recording
        recordButton.addEventListener('click', function() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();

                    // Display the stop button
                    recordButton.style.display = 'none';
                    stopButton.style.display = 'inline-block';

                    // Collect the audio data while recording
                    mediaRecorder.ondataavailable = function(event) {
                        audioChunks.push(event.data);
                    };

                    // When the recording stops, create a downloadable link
                    mediaRecorder.onstop = function() {
                        audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        audioUrl = URL.createObjectURL(audioBlob);
                        audio = new Audio(audioUrl);

                        // Show the download button
                        downloadButton.style.display = 'inline-block';
                    };
                })
                .catch(function(error) {
                    console.log('Error accessing microphone:', error);
                });
        });

        // Stop recording
        stopButton.addEventListener('click', function() {
            mediaRecorder.stop();

            // Hide the stop button and show the record button again
            stopButton.style.display = 'none';
            recordButton.style.display = 'inline-block';
        });

        // Download the recorded audio
        downloadButton.addEventListener('click', function() {
            const link = document.createElement('a');
            link.href = audioUrl;
            link.download = 'recorded_audio.wav';  // Name of the downloaded file
            link.click();
        });
    </script>
</body>
</html>
