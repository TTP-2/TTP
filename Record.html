<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech with Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
        }
        #textArea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        #speakButton {
            padding: 10px 20px;
            background-color: #009688;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        #speakButton:hover {
            background-color: #00796b;
        }
        #downloadButton {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            display: none;
        }
        #downloadButton:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Text-to-Speech with Download</h1>
    <textarea id="textArea" placeholder="Type some text here..."></textarea>
    <button id="speakButton">Read Aloud</button>
    <button id="downloadButton">Download Audio</button>

    <script>
        let recordedAudioBlob = null;
        let mediaRecorder;

        document.getElementById('speakButton').addEventListener('click', function() {
            const text = document.getElementById('textArea').value;
            if (text !== "") {
                const speech = new SpeechSynthesisUtterance(text);

                // Set pitch and rate for the robot-like voice
                speech.pitch = 1; // Neutral pitch
                speech.rate = 0.8; // Slow rate

                // Choose voice (example: try for a friendly robot-like voice)
                const voices = window.speechSynthesis.getVoices();
                let robotVoice = voices.find(voice => voice.name.includes("Google") || voice.name.includes("male") || voice.name.includes("neutral"));
                if (robotVoice) {
                    speech.voice = robotVoice;
                }

                // Set up the audio context for recording
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const mediaStreamDestination = audioContext.createMediaStreamDestination();
                
                // Set up the media recorder to capture the audio
                mediaRecorder = new MediaRecorder(mediaStreamDestination.stream);

                // Collect audio data and store it
                mediaRecorder.ondataavailable = function(event) {
                    recordedAudioBlob = event.data;
                    // Show the download button after recording
                    document.getElementById('downloadButton').style.display = 'inline-block';
                };

                // Start recording
                mediaRecorder.start();

                // Speak the text aloud
                window.speechSynthesis.speak(speech);

                // Stop recording after speech ends
                speech.onend = function() {
                    mediaRecorder.stop();
                };
            } else {
                alert("Please enter some text to read aloud.");
            }
        });

        document.getElementById('downloadButton').addEventListener('click', function() {
            if (recordedAudioBlob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(recordedAudioBlob);
                link.download = 'speech_output.ogg'; // Save as .ogg
                link.click();
            }
        });
    </script>
</body>
</html>
