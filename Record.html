<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech Recorder with Headphones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
        }
        #textArea {
            width: 100%;
            height: 150px;
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        #recordButton, #downloadButton {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        #recordButton:hover, #downloadButton:hover {
            background-color: #45a049;
        }
        #downloadButton {
            display: none;
            background-color: #2196F3;
        }
        #downloadButton:hover {
            background-color: #1e88e5;
        }
    </style>
</head>
<body>
    <h1>Text-to-Speech Recorder with Headphones</h1>
    <textarea id="textArea" placeholder="Type some text here..."></textarea>
    <button id="recordButton">Start Recording</button>
    <button id="downloadButton">Download Audio</button>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;
        let audioUrl;

        // Elements for buttons
        const recordButton = document.getElementById('recordButton');
        const downloadButton = document.getElementById('downloadButton');
        const textArea = document.getElementById('textArea');

        // Function to handle start recording
        recordButton.addEventListener('click', function() {
            const text = textArea.value;

            if (text !== "") {
                // Start recording audio when the button is pressed
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(function(stream) {
                        // Ensure the correct audio source is being used by forcing microphone capture
                        const audioTracks = stream.getAudioTracks();
                        if (audioTracks.length === 0) {
                            alert("No microphone detected.");
                            return;
                        }

                        // Set up MediaRecorder to record audio
                        mediaRecorder = new MediaRecorder(stream);
                        mediaRecorder.start();

                        // Collect the audio data while recording
                        mediaRecorder.ondataavailable = function(event) {
                            audioChunks.push(event.data);
                        };

                        // Stop recording after the speech has finished
                        mediaRecorder.onstop = function() {
                            audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                            audioUrl = URL.createObjectURL(audioBlob);

                            // Show the download button
                            downloadButton.style.display = 'inline-block';
                        };

                        // Use SpeechSynthesis API to read aloud
                        const speech = new SpeechSynthesisUtterance(text);
                        speech.pitch = 1;  // Set pitch
                        speech.rate = 1;   // Set speed

                        // Select voice (optional)
                        const voices = window.speechSynthesis.getVoices();
                        const selectedVoice = voices.find(voice => voice.name.includes("Google") || voice.name.includes("male"));
                        if (selectedVoice) {
                            speech.voice = selectedVoice;
                        }

                        // Play the speech and stop recording once done
                        window.speechSynthesis.speak(speech);
                        speech.onend = function() {
                            mediaRecorder.stop();  // Stop recording after speech ends
                        };

                        // Update button states
                        recordButton.style.display = 'none'; // Hide record button while speaking
                    })
                    .catch(function(error) {
                        console.log("Error accessing microphone:", error);
                    });
            } else {
                alert("Please enter some text to read aloud.");
            }
        });

        // Function to download the recorded audio
        downloadButton.addEventListener('click', function() {
            if (audioBlob) {
                const link = document.createElement('a');
                link.href = audioUrl;
                link.download = 'recorded_speech.ogg';  // Download as .ogg file
                link.click();
            }
        });
    </script>
</body>
</html>
