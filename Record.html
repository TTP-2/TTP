<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaging App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .messages {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .message {
      background-color: #e1f5fe;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .message-input {
      display: flex;
      gap: 10px;
    }

    #messageInput {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #sendButton {
      padding: 10px;
      background-color: #009688;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #sendButton:hover {
      background-color: #00796b;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <h2>Messaging App</h2>
    </div>
    <div id="messageList" class="messages"></div>
    <div class="message-input">
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script>
    // Function to load messages from localStorage and display them
    function loadMessages() {
      const messages = JSON.parse(localStorage.getItem('messages')) || [];
      const messageList = document.getElementById('messageList');
      messageList.innerHTML = ''; // Clear previous messages
      
      messages.forEach(message => {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.textContent = message;
        messageList.appendChild(messageDiv);
      });
    }

    // Function to send a new message
    function sendMessage() {
      const messageInput = document.getElementById('messageInput');
      const newMessage = messageInput.value.trim();

      if (newMessage === '') {
        return;
      }

      // Retrieve existing messages from localStorage or create an empty array
      const messages = JSON.parse(localStorage.getItem('messages')) || [];

      // Add the new message to the array
      messages.push(newMessage);

      // Save the updated message list back to localStorage
      localStorage.setItem('messages', JSON.stringify(messages));

      // Clear the input field
      messageInput.value = '';

      // Reload the messages to update the UI
      loadMessages();
    }

    // Add event listener to the send button
    document.getElementById('sendButton').addEventListener('click', sendMessage);

    // Load existing messages when the page is loaded
    window.onload = loadMessages;
  </script>
</body>
</html>
